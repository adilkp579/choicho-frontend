<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Sign Up · Choicho</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="CSS/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
      padding: 1.5rem;
    }
    
    .auth-box {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1.5rem;
      padding: 2rem 1.8rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
    }
    
    .auth-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
      font-size: 1.6rem;
      color: #fff;
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
    }
    
    .auth-brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    
    .auth-brand h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      font-family: 'Segoe Script', 'Brush Script MT', 'Apple Chancery', cursive;
      font-style: italic;
    }
    
    .auth-brand p {
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.2rem;
    }
    
    .input-group {
      position: relative;
      margin-bottom: 1rem;
    }
    
    .input-group .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      font-size: 0.85rem;
      z-index: 2;
    }
    
    .password-toggle {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      font-size: 0.85rem;
      cursor: pointer;
      z-index: 2;
      transition: color 0.3s;
      background: transparent;
      border: none;
      padding: 0.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .password-toggle:hover {
      color: #aaa;
    }
    
    .password-toggle:active {
      transform: scale(0.9);
    }
    
    .input-group input {
      width: 100%;
      padding: 0.8rem 0.8rem 0.8rem 2.8rem;
      border-radius: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s;
    }
    
    .input-group input:focus {
      border-color: rgba(102, 126, 234, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.05);
    }
    
    .input-group input::placeholder {
      color: #555;
    }
    
    .auth-error {
      color: #ef4444;
      font-size: 0.75rem;
      min-height: 1.2rem;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .auth-success {
      color: #4ade80;
      font-size: 0.75rem;
      min-height: 1.2rem;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .auth-btn {
      width: 100%;
      padding: 0.8rem;
      border-radius: 0.8rem;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.3rem;
    }
    
    .auth-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
    }
    
    .auth-btn:active:not(:disabled) {
      transform: scale(0.98);
    }
    
    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .auth-btn .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    
    .auth-btn.loading .spinner {
      display: block;
    }
    
    .auth-btn.loading .btn-text {
      display: none;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .alt-link {
      display: block;
      text-align: center;
      color: #667eea;
      font-size: 0.85rem;
      margin-top: 1.2rem;
      text-decoration: none;
      transition: color 0.3s;
    }
    
    .alt-link:hover {
      color: #8b7cf7;
    }
    
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      z-index: 999;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
    }
    
    .toast.show {
      display: block;
      animation: slideUp 0.3s ease;
    }
    
    @media (max-width: 480px) {
      .auth-box { padding: 1.5rem 1.2rem; }
      .auth-brand h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="auth-page">
      <div class="auth-box">
        <div class="auth-icon">
          <i class="fas fa-user-plus"></i>
        </div>
        
        <div class="auth-brand">
          <h1>Choicho</h1>
          <p>Create your account</p>
        </div>
        
        <!-- ===== FULL NAME FIELD ===== -->
        <div class="input-group">
          <i class="fas fa-user-circle input-icon"></i>
          <input type="text" id="signupFullName" placeholder="Full Name" autocomplete="name">
        </div>
        
        <!-- ===== USERNAME FIELD (No restrictions) ===== -->
        <div class="input-group">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="signupUsername" placeholder="Username" autocomplete="username">
        </div>
        
        <!-- ===== EMAIL FIELD ===== -->
        <div class="input-group">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="signupEmail" placeholder="Email" autocomplete="email">
        </div>
        
        <!-- ===== PASSWORD FIELD ===== -->
        <div class="input-group">
          <button type="button" class="password-toggle" id="togglePassword1" onclick="togglePassword('signupPassword', 'togglePassword1')">
            <i class="fas fa-eye"></i>
          </button>
          <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" autocomplete="new-password">
        </div>
        
        <!-- ===== CONFIRM PASSWORD FIELD ===== -->
        <div class="input-group">
          <button type="button" class="password-toggle" id="togglePassword2" onclick="togglePassword('signupConfirm', 'togglePassword2')">
            <i class="fas fa-eye"></i>
          </button>
          <input type="password" id="signupConfirm" placeholder="Confirm Password" autocomplete="new-password">
        </div>
        
        <div class="auth-error" id="signupError"></div>
        <div class="auth-success" id="signupSuccess"></div>
        
        <button class="auth-btn" id="signupBtn" onclick="handleSignup()">
          <span class="spinner"></span>
          <span class="btn-text">Create Account</span>
        </button>
        
        <a href="login.html" class="alt-link">Already have an account? <strong>Sign In</strong></a>
      </div>
    </div>
    
    <div class="toast" id="toast"></div>
  </div>
  
  <script type="module">
    // ================================================================
    // SIGNUP - Full Name + Username (no restrictions) + Email + Password
    // ================================================================
    
    import { register } from './js/auth.js';
    
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show';
      toast.style.borderColor = isError ? 'rgba(239,68,68,0.3)' : 'rgba(74,222,128,0.3)';
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }
    
    // ===== PASSWORD TOGGLE FUNCTION =====
    window.togglePassword = function(inputId, toggleId) {
      const input = document.getElementById(inputId);
      const toggle = document.getElementById(toggleId);
      
      if (input.type === 'password') {
        input.type = 'text';
        toggle.innerHTML = '<i class="fas fa-eye-slash"></i>';
      } else {
        input.type = 'password';
        toggle.innerHTML = '<i class="fas fa-eye"></i>';
      }
    };
    
    window.handleSignup = async function() {
      const fullName = document.getElementById('signupFullName').value.trim();
      const username = document.getElementById('signupUsername').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const confirm = document.getElementById('signupConfirm').value;
      const errorEl = document.getElementById('signupError');
      const successEl = document.getElementById('signupSuccess');
      const btn = document.getElementById('signupBtn');
      
      // Clear previous messages
      errorEl.textContent = '';
      successEl.textContent = '';
      
      // ===== VALIDATION =====
      // Check all fields are filled
      if (!fullName || !username || !email || !password || !confirm) {
        errorEl.textContent = '❌ All fields are required';
        showToast('All fields are required', true);
        return;
      }
      
      // Full Name validation
      if (fullName.length < 2) {
        errorEl.textContent = '❌ Please enter your full name';
        showToast('Please enter your full name', true);
        return;
      }
      
      // Username - no restrictions, just check not empty
      // (already checked above)
      
      // Email validation
      if (!email || !email.includes('@') || !email.includes('.')) {
        errorEl.textContent = '❌ Please enter a valid email address';
        showToast('Please enter a valid email address', true);
        return;
      }
      
      // Password validation
      if (password.length < 6) {
        errorEl.textContent = '❌ Password must be at least 6 characters';
        showToast('Password must be at least 6 characters', true);
        return;
      }
      
      if (password !== confirm) {
        errorEl.textContent = '❌ Passwords do not match';
        showToast('Passwords do not match', true);
        return;
      }
      
      // ===== CREATE ACCOUNT =====
      btn.classList.add('loading');
      btn.disabled = true;
      
      try {
        console.log('📝 Creating account for:', { fullName, username, email });
        
        // Note: register expects (name, username, email, password)
        const result = await register(fullName, username, email, password);
        
        console.log('📝 Register result:', result);
        
        btn.classList.remove('loading');
        btn.disabled = false;
        
        if (result.success) {
          successEl.textContent = '✅ Account created! Redirecting...';
          showToast(`Welcome ${fullName}! 🎉`);
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 1500);
        } else {
          let errorMsg = result.error || 'Unknown error occurred';
          errorEl.textContent = '❌ ' + errorMsg;
          showToast(errorMsg, true);
        }
      } catch (error) {
        console.error('❌ Signup error:', error);
        btn.classList.remove('loading');
        btn.disabled = false;
        errorEl.textContent = '❌ ' + (error.message || 'Something went wrong');
        showToast(error.message || 'Something went wrong', true);
      }
    };
    
    // Keyboard shortcut - Enter key to submit
    document.getElementById('signupConfirm').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        window.handleSignup();
      }
    });
    
    // Enter key navigation
    document.getElementById('signupFullName').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('signupUsername').focus();
      }
    });
    
    document.getElementById('signupUsername').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('signupEmail').focus();
      }
    });
    
    document.getElementById('signupEmail').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('signupPassword').focus();
      }
    });
    
    document.getElementById('signupPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('signupConfirm').focus();
      }
    });
  </script>
</body>
</html>
