<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Live Streams · Choicho Live</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: hidden;
    }
    
    /* Main Page */
    .page {
      width: 100%;
      height: 100vh;
      height: 100dvh;
      background: #000;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    
    /* ===== WHATSAPP-STYLE GLASS HEADER ===== */
    .glass-header-wrapper {
      position: sticky;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      flex-shrink: 0;
      
      /* Default - completely transparent */
      background: transparent;
      transition: background 0.3s ease, backdrop-filter 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, padding 0.3s ease;
    }
    
    /* WhatsApp-style glass effect on scroll */
    .glass-header-wrapper.scrolled {
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(25px) saturate(180%);
      -webkit-backdrop-filter: blur(25px) saturate(180%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 1px 20px rgba(0, 0, 0, 0.3);
    }
    
    /* Heavier glass effect when scrolled more */
    .glass-header-wrapper.heavy-scroll {
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(35px) saturate(200%);
      -webkit-backdrop-filter: blur(35px) saturate(200%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 2px 30px rgba(0, 0, 0, 0.4);
    }
    
    /* ===== TOP HEADER - Moves up on scroll ===== */
    .top-header {
      padding: 0.8rem 1rem 0.3rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      background: transparent;
      transition: padding 0.3s ease, transform 0.3s ease;
    }
    
    /* Header shrinks and moves up on scroll */
    .glass-header-wrapper.scrolled .top-header {
      padding: 0.4rem 1rem 0.1rem 1rem;
    }
    
    .glass-header-wrapper.heavy-scroll .top-header {
      padding: 0.2rem 1rem 0.05rem 1rem;
    }
    
    /* Back Button - WhatsApp style */
    .back-btn {
      width: 2.4rem;
      height: 2.4rem;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 50%;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
      flex-shrink: 0;
      text-decoration: none;
    }
    
    .back-btn:active {
      transform: scale(0.92);
      background: rgba(255, 255, 255, 0.15);
    }
    
    .glass-header-wrapper.scrolled .back-btn {
      width: 2.2rem;
      height: 2.2rem;
      font-size: 0.9rem;
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
    }
    
    .glass-header-wrapper.heavy-scroll .back-btn {
      width: 2rem;
      height: 2rem;
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.2);
    }
    
    /* Page Title - Moves up and shrinks */
    .page-title {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #FFFC00, #FFD700, #FFA500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
      font-family: 'Segoe Script', 'Brush Script MT', 'Apple Chancery', cursive;
      text-shadow: 0 0 40px rgba(255, 252, 0, 0.1);
      transition: font-size 0.3s ease, transform 0.3s ease;
    }
    
    .glass-header-wrapper.scrolled .page-title {
      font-size: 1.2rem;
    }
    
    .glass-header-wrapper.heavy-scroll .page-title {
      font-size: 1rem;
    }
    
    /* Live Count Badge - WhatsApp style */
    .live-count-badge {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(239, 68, 68, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 0.3rem 0.7rem;
      border-radius: 2rem;
      border: 1px solid rgba(239, 68, 68, 0.12);
      flex-shrink: 0;
      transition: all 0.3s;
    }
    
    .glass-header-wrapper.scrolled .live-count-badge {
      padding: 0.2rem 0.5rem;
      font-size: 0.65rem;
      background: rgba(239, 68, 68, 0.15);
      border-color: rgba(239, 68, 68, 0.2);
    }
    
    .glass-header-wrapper.heavy-scroll .live-count-badge {
      padding: 0.15rem 0.4rem;
      font-size: 0.55rem;
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.25);
    }
    
    .live-count-badge i {
      font-size: 0.5rem;
      color: #ef4444;
      animation: pulse-dot 1.5s infinite;
      transition: font-size 0.3s;
    }
    
    .glass-header-wrapper.scrolled .live-count-badge i {
      font-size: 0.4rem;
    }
    
    .glass-header-wrapper.heavy-scroll .live-count-badge i {
      font-size: 0.35rem;
    }
    
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }
    
    .live-count-badge span {
      font-size: 0.7rem;
      font-weight: 600;
      color: #ef4444;
      transition: font-size 0.3s;
    }
    
    .glass-header-wrapper.scrolled .live-count-badge span {
      font-size: 0.6rem;
    }
    
    .glass-header-wrapper.heavy-scroll .live-count-badge span {
      font-size: 0.5rem;
    }
    
    /* ===== SEARCH BAR - Moves with header ===== */
    .search-container {
      padding: 0 1rem 0.3rem 1rem;
      background: transparent;
      transition: padding 0.3s ease, transform 0.3s ease, opacity 0.3s ease;
    }
    
    /* Search bar moves up and slightly shrinks */
    .glass-header-wrapper.scrolled .search-container {
      padding: 0 1rem 0.15rem 1rem;
    }
    
    .glass-header-wrapper.heavy-scroll .search-container {
      padding: 0 1rem 0.05rem 1rem;
    }
    
    .search-wrapper {
      position: relative;
      width: 100%;
    }
    
    .search-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.85rem;
      pointer-events: none;
      transition: all 0.3s;
    }
    
    .glass-header-wrapper.scrolled .search-wrapper i {
      font-size: 0.75rem;
      left: 0.8rem;
    }
    
    .search-input {
      width: 100%;
      padding: 0.65rem 1rem 0.65rem 2.5rem;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 2rem;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      transition: all 0.3s;
    }
    
    .glass-header-wrapper.scrolled .search-input {
      padding: 0.5rem 0.8rem 0.5rem 2.2rem;
      font-size: 0.75rem;
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.1);
    }
    
    .glass-header-wrapper.heavy-scroll .search-input {
      padding: 0.4rem 0.7rem 0.4rem 2rem;
      font-size: 0.7rem;
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(255, 255, 255, 0.12);
    }
    
    .search-input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 252, 0, 0.2);
    }
    
    .search-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.8rem;
      transition: font-size 0.3s;
    }
    
    .glass-header-wrapper.scrolled .search-input::placeholder {
      font-size: 0.7rem;
    }
    
    .glass-header-wrapper.heavy-scroll .search-input::placeholder {
      font-size: 0.65rem;
    }
    
    .clear-search {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.8rem;
      cursor: pointer;
      display: none;
      transition: all 0.3s;
    }
    
    .glass-header-wrapper.scrolled .clear-search {
      right: 0.8rem;
      font-size: 0.7rem;
    }
    
    .clear-search.show {
      display: block;
    }
    
    .clear-search:hover {
      color: #fff;
    }
    
    /* ===== SCROLL CONTAINER ===== */
    .scroll-container {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 1rem 2rem 1rem;
      min-height: 0;
      scrollbar-width: none !important;
      -ms-overflow-style: none !important;
      position: relative;
      z-index: 1;
    }
    
    .scroll-container::-webkit-scrollbar {
      display: none !important;
      width: 0 !important;
      height: 0 !important;
      -webkit-appearance: none;
    }
    
    ::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }
    * {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    
    /* ===== LIVE USERS GRID ===== */
    .live-users-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
      padding-top: 0.5rem;
    }
    
    .live-user-card {
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .live-user-card:active {
      transform: scale(0.96);
    }
    
    .live-avatar-container {
      position: relative;
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 1rem;
      overflow: hidden;
      background: linear-gradient(135deg, #1a1a1a, #0a0a0a);
      border: 2px solid rgba(239, 68, 68, 0.5);
    }
    
    .live-avatar-container .avatar-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
    }
    
    .live-avatar-container .avatar-placeholder i {
      font-size: 3rem;
      color: rgba(255, 255, 255, 0.3);
    }
    
    .live-badge-corner {
      position: absolute;
      top: 0.5rem;
      left: 0.5rem;
      background: #ef4444;
      padding: 0.25rem 0.6rem;
      border-radius: 0.5rem;
      font-size: 0.6rem;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    
    .live-badge-corner i {
      font-size: 0.4rem;
    }
    
    .viewer-badge-corner {
      position: absolute;
      bottom: 0.5rem;
      right: 0.5rem;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
      padding: 0.25rem 0.6rem;
      border-radius: 0.5rem;
      font-size: 0.6rem;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    
    .viewer-badge-corner i {
      font-size: 0.45rem;
    }
    
    .live-user-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      text-align: center;
      margin-top: 0.6rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding: 0 0.2rem;
    }
    
    .live-category-tag {
      font-size: 0.55rem;
      color: #888;
      text-align: center;
      margin-top: 0.1rem;
    }
    
    .empty-live {
      text-align: center;
      padding: 2rem;
      color: #555;
    }
    
    .empty-live i {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }
    
    .empty-live p {
      font-size: 0.75rem;
    }
    
    /* ===== STREAM PAGE ===== */
    .stream-page {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      z-index: 200;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    
    .stream-page.active {
      display: flex;
    }
    
    .stream-header {
      position: absolute;
      top: max(1rem, env(safe-area-inset-top, 1rem));
      left: 1rem;
      right: 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 20;
      pointer-events: none;
    }
    
    .stream-header > * {
      pointer-events: auto;
    }
    
    .stream-info {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid rgba(255, 252, 0, 0.3);
    }
    
    .stream-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: blink 1s infinite;
    }
    
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    
    .stream-live-text {
      color: #FFFC00;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    
    .stream-viewers {
      color: #ccc;
      font-size: 0.65rem;
    }
    
    .stream-host-name {
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .stream-close-btn {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .video-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
    }
    
    .host-video-wrapper {
      flex: 1;
      position: relative;
      background: #0a0a0a;
      min-height: 0;
    }
    
    .host-video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }
    
    .video-placeholder {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #555;
    }
    
    .video-placeholder i {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.5rem;
      opacity: 0.5;
    }
    
    .video-placeholder p {
      font-size: 0.7rem;
      opacity: 0.7;
    }
    
    .demo-stream-preview {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #FFFC00;
      background: rgba(0,0,0,0.7);
      padding: 1rem 2rem;
      border-radius: 1rem;
      backdrop-filter: blur(20px);
      z-index: 10;
    }
    
    .demo-stream-preview i {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }
    
    .demo-stream-preview p {
      font-size: 0.8rem;
    }
    
    /* Bottom Bar */
    .bottom-bar {
      position: absolute;
      bottom: 1rem;
      left: 1rem;
      right: 1rem;
      z-index: 25;
      display: flex;
      align-items: flex-end;
      gap: 0.8rem;
      pointer-events: none;
    }
    
    .comment-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      pointer-events: none;
      min-width: 0;
    }
    
    .comment-list {
      max-height: 100px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      padding: 0 0.2rem;
      pointer-events: auto;
      scrollbar-width: none;
    }
    
    .comment-list::-webkit-scrollbar {
      display: none;
    }
    
    .comment-item {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      padding: 0.3rem 0.6rem;
      border-radius: 1rem;
      color: #fff;
      font-size: 0.7rem;
      align-self: flex-start;
      max-width: 100%;
      word-break: break-word;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: baseline;
      gap: 0.3rem;
    }
    
    .comment-username {
      font-weight: 700;
      color: #fbbf24;
      font-size: 0.65rem;
      white-space: nowrap;
    }
    
    .comment-input-row {
      display: flex;
      gap: 0.5rem;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(20px);
      padding: 0.35rem;
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }
    
    .comment-input-row input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      padding: 0.35rem 0.7rem;
      font-size: 0.75rem;
      outline: none;
    }
    
    .comment-input-row input::placeholder {
      color: #888;
      font-size: 0.7rem;
    }
    
    .comment-send-btn {
      background: #FFFC00;
      border: none;
      color: #000;
      width: 1.8rem;
      height: 1.8rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.7rem;
      flex-shrink: 0;
      font-weight: bold;
    }
    
    .comment-send-btn:active {
      transform: scale(0.95);
    }
    
    .action-buttons {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      pointer-events: auto;
      flex-shrink: 0;
    }
    
    .stream-action-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.15rem;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 2rem;
      color: #fff;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 0.5rem 0.6rem;
      transition: all 0.2s;
      width: 3rem;
    }
    
    .stream-action-btn span {
      font-size: 0.5rem;
      font-weight: 500;
      opacity: 0.8;
    }
    
    .stream-action-btn:active {
      transform: scale(0.95);
    }
    
    .stream-action-btn.liked {
      color: #ef4444;
      border-color: rgba(239, 68, 68, 0.5);
    }
    
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 300;
      gap: 0.8rem;
    }
    
    .loading-overlay i {
      font-size: 2rem;
      color: #FFFC00;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .loading-overlay span {
      font-size: 0.8rem;
      color: #ccc;
    }
    
    .loading-overlay button {
      margin-top: 1rem;
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      border: none;
      background: #333;
      color: #fff;
      cursor: pointer;
    }
    
    .toast {
      position: fixed;
      bottom: 8rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      color: #fff;
      padding: 0.4rem 1rem;
      border-radius: 2rem;
      font-size: 0.7rem;
      z-index: 350;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid rgba(255, 252, 0, 0.3);
    }
    
    .toast.show {
      opacity: 1;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .live-users-grid {
        gap: 0.8rem;
      }
      .live-user-name {
        font-size: 0.7rem;
        margin-top: 0.4rem;
      }
      .live-badge-corner {
        font-size: 0.55rem;
        padding: 0.2rem 0.5rem;
      }
      .viewer-badge-corner {
        font-size: 0.55rem;
        padding: 0.2rem 0.5rem;
      }
      .scroll-container {
        padding: 0 0.8rem 1rem 0.8rem;
      }
      .top-header {
        padding: 0.6rem 0.8rem 0.3rem 0.8rem;
      }
      .search-container {
        padding: 0 0.8rem 0.2rem 0.8rem;
      }
      .search-input {
        font-size: 0.75rem;
        padding: 0.55rem 0.8rem 0.55rem 2.2rem;
      }
      .search-wrapper i {
        font-size: 0.75rem;
        left: 0.8rem;
      }
      .back-btn {
        width: 2rem;
        height: 2rem;
        font-size: 0.8rem;
      }
      .page-title {
        font-size: 1.2rem;
      }
      .glass-header-wrapper.scrolled .page-title {

    function sanitizeString(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = sanitizeString(message);
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function updateLiveCount(count) {
      const countElement = document.getElementById('totalLiveCount');
      if (countElement) countElement.textContent = count;
    }

    // ===== WHATSAPP-STYLE SCROLL DETECTION =====
    const scrollContainer = document.getElementById('scrollContainer');
    const glassHeader = document.getElementById('glassHeader');

    scrollContainer.addEventListener('scroll', () => {
      const scrollY = scrollContainer.scrollTop;
      
      glassHeader.classList.remove('scrolled', 'heavy-scroll');
      
      if (scrollY > 80) {
        glassHeader.classList.add('heavy-scroll');
      } else if (scrollY > 10) {
        glassHeader.classList.add('scrolled');
      }
    });

    window.filterLiveStreams = function() {
      const searchInput = document.getElementById('searchInput');
      const searchTerm = sanitizeString(searchInput.value.toLowerCase().replace('@', ''));
      const gridContainer = document.getElementById('liveUsersGrid');
      const emptyLive = document.getElementById('emptyLive');
      
      let filteredStreams = demoStreams;
      if (searchTerm) {
        filteredStreams = demoStreams.filter(stream => 
          stream.username.toLowerCase().includes(searchTerm) ||
          stream.userId.toLowerCase().includes(searchTerm) ||
          stream.category.toLowerCase().includes(searchTerm)
        );
      }
      
      updateLiveCount(filteredStreams.length);
      
      if (filteredStreams.length === 0) {
        gridContainer.innerHTML = '';
        emptyLive.style.display = 'block';
        return;
      }
      
      emptyLive.style.display = 'none';
      
      gridContainer.innerHTML = filteredStreams.map(stream => `
        <div class="live-user-card" onclick="openDemoStream('${sanitizeString(stream.userId)}')">
          <div class="live-avatar-container" style="border-color: ${sanitizeString(stream.color)}80;">
            <div class="avatar-placeholder" style="background: linear-gradient(135deg, ${sanitizeString(stream.color)}40, ${sanitizeString(stream.color)}20);">
              <i class="fas ${getIconForStream(sanitizeString(stream.avatar))}" style="font-size: 3rem; color: ${sanitizeString(stream.color)};"></i>
            </div>
            <div class="live-badge-corner">
              <i class="fas fa-circle"></i>
              <span>LIVE</span>
            </div>
            <div class="viewer-badge-corner">
              <i class="fas fa-eye"></i>
              <span>${formatNumber(stream.viewers)}</span>
            </div>
          </div>
          <div class="live-user-name">${sanitizeString(stream.username)}</div>
          <div class="live-category-tag">${sanitizeString(stream.category)}</div>
        </div>
      `).join('');
      
      const clearBtn = document.getElementById('clearSearch');
      if (searchTerm) {
        clearBtn.classList.add('show');
      } else {
        clearBtn.classList.remove('show');
      }
    };
    
    window.clearSearch = function() {
      document.getElementById('searchInput').value = '';
      filterLiveStreams();
    };
    
    function formatNumber(num) {
      if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
      return num.toString();
    }

    function getIconForStream(avatar) {
      const iconMap = {
        '🎮': 'fa-gamepad', '🎵': 'fa-music', '💻': 'fa-laptop-code',
        '✈️': 'fa-plane', '🎯': 'fa-bullseye', '🍳': 'fa-utensils',
        '💪': 'fa-dumbbell', '✨': 'fa-star', '🕹️': 'fa-gamepad',
        '🏃': 'fa-running', '🎧': 'fa-headphones', '🎹': 'fa-music',
        '👨‍💻': 'fa-code', '🤖': 'fa-robot', '🌄': 'fa-mountain',
        '🏖️': 'fa-umbrella-beach', '🧁': 'fa-cake-candles',
        '🌮': 'fa-utensils', '🧘': 'fa-spa', '🏋️': 'fa-dumbbell',
        '😂': 'fa-laugh-squint', '🎬': 'fa-film', '🎨': 'fa-palette',
        '🖌️': 'fa-paint-brush', '📚': 'fa-book', '🔬': 'fa-flask',
        '🏆': 'fa-trophy', '⛏️': 'fa-hammer', '🎸': 'fa-guitar',
        '🎤': 'fa-microphone-alt', '🔒': 'fa-lock', '🌐': 'fa-globe',
        '🏔️': 'fa-mountain', '🏙️': 'fa-city', '👨‍🍳': 'fa-utensils',
        '🍰': 'fa-cake-candles', '🎙️': 'fa-microphone-alt', '💃': 'fa-dance',
        '📜': 'fa-scroll', '☀️': 'fa-sun', '🌱': 'fa-leaf', '🐾': 'fa-paw'
      };
      return iconMap[avatar] || 'fa-user-circle';
    }

    window.openDemoStream = async function(hostId) {
      const stream = demoStreams.find(s => s.userId === hostId);
      if (!stream) return;
      
      currentStreamHost = hostId;
      isDemoMode = true;
      
      document.getElementById('mainPage').style.display = 'none';
      document.getElementById('streamPage').classList.add('active');
      document.getElementById('streamHostName').textContent = sanitizeString(stream.username);
      document.getElementById('streamViewerCount').textContent = `${formatNumber(stream.viewers)} watching`;
      document.getElementById('demoPreviewText').innerHTML = `${sanitizeString(stream.username)}<br><span style="font-size:0.6rem;">${sanitizeString(stream.category)}</span>`;
      
      document.getElementById('loadingOverlay').style.display = 'none';
      
      const demoPreview = document.getElementById('demoPreview');
      const videoPlaceholder = document.getElementById('videoPlaceholder');
      demoPreview.style.display = 'flex';
      videoPlaceholder.style.display = 'none';
      
      showToast(`Watching ${sanitizeString(stream.username)}'s Choicho Live stream 🔴`);
    };

    window.sendComment = function() {
      const input = document.getElementById('commentInput');
      const text = sanitizeString(input.value.trim());
      if (!text) return;
      
      input.value = '';
      
      const commentList = document.getElementById('commentList');
      const commentDiv = document.createElement('div');
      commentDiv.className = 'comment-item';
      commentDiv.innerHTML = `<span class="comment-username">${sanitizeString(currentUser)}</span> ${text}`;
      commentList.appendChild(commentDiv);
      commentList.scrollTop = commentList.scrollHeight;
      showToast('Comment posted! 💬');
    };

    window.toggleLike = function() {
      const likeBtn = document.getElementById('likeBtn');
      const icon = likeBtn.querySelector('i');
      
      if (!isLiked) {
        isLiked = true;
        likeBtn.classList.add('liked');
        icon.className = 'fas fa-heart';
        const currentLikes = parseInt(document.getElementById('likeCount').textContent) || 0;
        document.getElementById('likeCount').textContent = currentLikes + 1;
        showToast('❤️ You liked this Choicho Live stream!');
      } else {
        isLiked = false;
        likeBtn.classList.remove('liked');
        icon.className = 'far fa-heart';
        const currentLikes = parseInt(document.getElementById('likeCount').textContent) || 0;
        document.getElementById('likeCount').textContent = Math.max(0, currentLikes - 1);
        showToast('Like removed');
      }
    };

    window.shareStream = async function() {
      const host = currentStreamHost || 'live_stream';
      const url = `${window.location.origin}/live.html?user=${encodeURIComponent(host)}`;
      
      if (navigator.share) {
        try {
          await navigator.share({
            title: `🔴 CHOICHO LIVE: ${host}`,
            text: `Watch ${host}'s Choicho Live stream!`,
            url: url
          });
        } catch (e) {}
      } else {
        try {
          await navigator.clipboard.writeText(url);
          showToast('Link copied! 📋');
        } catch (e) {
          showToast('Unable to share');
        }
      }
    };

    window.closeStream = function() {
      document.getElementById('streamPage').classList.remove('active');
      document.getElementById('mainPage').style.display = 'block';
      document.getElementById('remoteVideo').style.display = 'none';
      document.getElementById('videoPlaceholder').style.display = 'flex';
      document.getElementById('demoPreview').style.display = 'none';
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('commentList').innerHTML = '';
      document.getElementById('likeCount').textContent = 'Like';
      isLiked = false;
      document.getElementById('likeBtn').classList.remove('liked');
      document.getElementById('likeBtn').querySelector('i').className = 'far fa-heart';
      
      filterLiveStreams();
    };

    document.addEventListener('DOMContentLoaded', () => {
      const commentInput = document.getElementById('commentInput');
      if (commentInput) {
        commentInput.addEventListener('keypress', (e) => {
          if (e.key === 'Enter') {
            e.preventDefault();
            sendComment();
          }
        });
      }
    });

    window.addEventListener('beforeunload', () => {
      if (pc) pc.close();
    });

    filterLiveStreams();
  </script>
