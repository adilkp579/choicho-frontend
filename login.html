<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Sign In · Choicho</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
  <style>
    .auth-page {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #0a0a0a 0%, #000000 100%);
      padding: 1.5rem;
    }
    
    .auth-box {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 1.5rem;
      padding: 2rem 1.8rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.03) inset;
    }
    
    .auth-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.2rem;
      font-size: 1.6rem;
      color: #fff;
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
    }
    
    .auth-brand {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    
    .auth-brand h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
      font-family: 'Segoe Script', 'Brush Script MT', 'Apple Chancery', cursive;
      font-style: italic;
    }
    
    .auth-brand p {
      font-size: 0.75rem;
      color: #666;
      margin-top: 0.2rem;
    }
    
    .input-group {
      position: relative;
      margin-bottom: 1rem;
    }
    
    .input-group i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      font-size: 0.85rem;
      z-index: 2;
    }
    
    .input-group input {
      width: 100%;
      padding: 0.8rem 0.8rem 0.8rem 2.8rem;
      border-radius: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.04);
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: all 0.3s;
    }
    
    .input-group input:focus {
      border-color: rgba(102, 126, 234, 0.5);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 20px rgba(102, 126, 234, 0.05);
    }
    
    .input-group input::placeholder {
      color: #555;
    }
    
    .input-group .toggle-password {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #555;
      cursor: pointer;
      font-size: 0.85rem;
      z-index: 2;
      transition: color 0.3s;
    }
    
    .input-group .toggle-password:hover {
      color: #aaa;
    }
    
    .auth-error {
      color: #ef4444;
      font-size: 0.75rem;
      min-height: 1.2rem;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .auth-success {
      color: #4ade80;
      font-size: 0.75rem;
      min-height: 1.2rem;
      margin-bottom: 0.3rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    
    .auth-btn {
      width: 100%;
      padding: 0.8rem;
      border-radius: 0.8rem;
      border: none;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 0.3rem;
      position: relative;
      overflow: hidden;
    }
    
    .auth-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.3);
    }
    
    .auth-btn:active:not(:disabled) {
      transform: scale(0.98);
    }
    
    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .auth-btn .spinner {
      display: none;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    
    .auth-btn.loading .spinner {
      display: block;
    }
    
    .auth-btn.loading .btn-text {
      display: none;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.2rem 0;
    }
    
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.06);
    }
    
    .auth-divider span {
      font-size: 0.65rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .saved-users {
      margin-top: 1.2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 1rem;
    }
    
    .saved-users .label {
      font-size: 0.6rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }
    
    .saved-user {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.7rem;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 0.6rem;
      margin-bottom: 0.3rem;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.8rem;
      color: #aaa;
    }
    
    .saved-user:hover {
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
    }
    
    .saved-user i {
      color: #667eea;
      font-size: 0.8rem;
    }
    
    .saved-user .remove-saved {
      margin-left: auto;
      color: #555;
      font-size: 0.6rem;
      cursor: pointer;
      padding: 0.2rem 0.4rem;
      border-radius: 0.3rem;
    }
    
    .saved-user .remove-saved:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
    }
    
    .alt-link {
      display: block;
      text-align: center;
      color: #667eea;
      font-size: 0.85rem;
      margin-top: 1.2rem;
      text-decoration: none;
      transition: color 0.3s;
    }
    
    .alt-link:hover {
      color: #8b7cf7;
    }
    
    .forgot-link {
      display: block;
      text-align: right;
      color: #555;
      font-size: 0.7rem;
      margin-top: 0.2rem;
      margin-bottom: 0.5rem;
      text-decoration: none;
      transition: color 0.3s;
    }
    
    .forgot-link:hover {
      color: #888;
    }
    
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(20px);
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.8rem;
      z-index: 999;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
    }
    
    .toast.show {
      display: block;
      animation: slideUp 0.3s ease;
    }
    
    @media (max-width: 480px) {
      .auth-box { padding: 1.5rem 1.2rem; }
      .auth-brand h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="auth-page">
      <div class="auth-box">
        <div class="auth-icon">
          <i class="fas fa-sign-in-alt"></i>
        </div>
        
        <div class="auth-brand">
          <h1>Choicho</h1>
          <p>Sign in to continue</p>
        </div>
        
        <div class="input-group">
          <i class="fas fa-user"></i>
          <input type="text" id="loginUsername" placeholder="Username or Email" autocomplete="username">
        </div>
        
        <div class="input-group">
          <i class="fas fa-lock"></i>
          <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
          <i class="fas fa-eye toggle-password" id="togglePassword" onclick="togglePasswordVisibility()"></i>
        </div>
        
        <a href="#" class="forgot-link">Forgot password?</a>
        
        <div class="auth-error" id="loginError"></div>
        <div class="auth-success" id="loginSuccess"></div>
        
        <button class="auth-btn" id="loginBtn" onclick="handleLogin()">
          <span class="spinner"></span>
          <span class="btn-text">Sign In</span>
        </button>
        
        <a href="signup.html" class="alt-link">Don't have an account? <strong>Sign Up</strong></a>
        
        <div class="saved-users" id="savedSection" style="display:none;">
          <div class="label">Saved Users</div>
          <div id="savedList"></div>
        </div>
      </div>
    </div>
    
    <div class="toast" id="toast"></div>
  </div>
  
  <script>
    // ================================================================
    // TOGGLE PASSWORD VISIBILITY
    // ================================================================
    
    function togglePasswordVisibility() {
      const input = document.getElementById('loginPassword');
      const icon = document.getElementById('togglePassword');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fas fa-eye-slash toggle-password';
      } else {
        input.type = 'password';
        icon.className = 'fas fa-eye toggle-password';
      }
    }
    
    // ================================================================
    // TOAST NOTIFICATION
    // ================================================================
    
    function showToast(message, isError = false) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show';
      toast.style.borderColor = isError ? 'rgba(239,68,68,0.3)' : 'rgba(74,222,128,0.3)';
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => {
        toast.className = 'toast';
      }, 3000);
    }
    
    // ================================================================
    // SAVED USERS
    // ================================================================
    
    function loadSavedUsers() {
      const saved = JSON.parse(localStorage.getItem('savedUsers') || '[]');
      const section = document.getElementById('savedSection');
      const list = document.getElementById('savedList');
      
      if (saved.length === 0) {
        section.style.display = 'none';
        return;
      }
      
      section.style.display = 'block';
      list.innerHTML = saved.map(u => `
        <div class="saved-user" onclick="quickLogin('${u}')">
          <i class="fas fa-user-circle"></i>
          <span>${u}</span>
          <span class="remove-saved" onclick="event.stopPropagation();removeSavedUser('${u}')">
            <i class="fas fa-times"></i>
          </span>
        </div>
      `).join('');
    }
    
    window.quickLogin = function(username) {
      document.getElementById('loginUsername').value = username;
      document.getElementById('loginPassword').focus();
    };
    
    window.removeSavedUser = function(username) {
      let saved = JSON.parse(localStorage.getItem('savedUsers') || '[]');
      saved = saved.filter(u => u !== username);
      localStorage.setItem('savedUsers', JSON.stringify(saved));
      loadSavedUsers();
      showToast('Removed saved user');
    };
    
    // ================================================================
    // LOGIN
    // ================================================================
    
    async function handleLogin() {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errorEl = document.getElementById('loginError');
      const successEl = document.getElementById('loginSuccess');
      const btn = document.getElementById('loginBtn');
      
      errorEl.textContent = '';
      successEl.textContent = '';
      
      if (!username) {
        errorEl.textContent = '❌ Please enter username or email';
        return;
      }
      
      if (!password) {
        errorEl.textContent = '❌ Please enter password';
        return;
      }
      
      btn.classList.add('loading');
      btn.disabled = true;
      
      try {
        const { initializeApp } = await import('https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js');
        const { getFirestore, collection, query, where, getDocs } = await import('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js');
        const { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously } = await import('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js');
        
        const app = initializeApp({
          apiKey: "AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",
          authDomain: "mychat-a97bf.firebaseapp.com",
          projectId: "mychat-a97bf"
        });
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        function hashPassword(pw) {
          let h = 0;
          for (let i = 0; i < pw.length; i++) {
            const c = pw.charCodeAt(i);
            h = ((h << 5) - h) + c;
            h = h & h;
          }
          return 'h_' + Math.abs(h).toString(16);
        }
        
        // Find user
        let userData = null;
        let userDocId = null;
        let userEmail = null;
        
        try {
          let q = query(
            collection(db, 'users'),
            where('username', '==', username.startsWith('@') ? username : '@' + username)
          );
          let snapshot = await getDocs(q);
          
          if (snapshot.empty) {
            q = query(collection(db, 'users'), where('email', '==', username));
            snapshot = await getDocs(q);
          }
          
          if (!snapshot.empty) {
            const doc = snapshot.docs[0];
            userData = doc.data();
            userDocId = doc.id;
            userEmail = userData.email || username + '@choicho.com';
          }
        } catch (e) {
          console.warn('User lookup failed:', e);
        }
        
        if (!userData) {
          errorEl.textContent = '❌ User not found. Please sign up first.';
          btn.classList.remove('loading');
          btn.disabled = false;
          return;
        }
        
        // Verify password
        if (userData.password !== hashPassword(password)) {
          errorEl.textContent = '❌ Wrong password. Please try again.';
          btn.classList.remove('loading');
          btn.disabled = false;
          return;
        }
        
        // Try Firebase Auth
        let authSuccess = false;
        try {
          if (userEmail && userEmail.includes('@')) {
            try {
              const cred = await signInWithEmailAndPassword(auth, userEmail, password);
              localStorage.setItem('uid', cred.user.uid);
              authSuccess = true;
            } catch (e) {
              if (e.code === 'auth/user-not-found') {
                const cred = await createUserWithEmailAndPassword(auth, userEmail, password);
                localStorage.setItem('uid', cred.user.uid);
                authSuccess = true;
              }
            }
          }
        } catch (e) {
          console.warn('Firebase Auth error:', e);
        }
        
        if (!authSuccess) {
          try {
            const guestCred = await signInAnonymously(auth);
            localStorage.setItem('uid', guestCred.user.uid);
          } catch (e) {
            localStorage.setItem('uid', userDocId || 'firestore_' + Date.now());
          }
        }
        
        localStorage.setItem('currentUser', userData.username);
        localStorage.setItem('userProfile', JSON.stringify(userData));
        
        // Save to saved users
        const saved = JSON.parse(localStorage.getItem('savedUsers') || '[]');
        const cleanUsername = userData.username.replace('@', '');
        if (!saved.includes(cleanUsername)) {
          saved.push(cleanUsername);
          localStorage.setItem('savedUsers', JSON.stringify(saved));
        }
        
        successEl.textContent = '✅ Login successful! Redirecting...';
        showToast('Welcome back! 🎉');
        
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1000);
        
      } catch (error) {
        console.error('Login error:', error);
        errorEl.textContent = '❌ ' + (error.message || 'Login failed. Please try again.');
        showToast(error.message || 'Login failed', true);
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }
    
    // ================================================================
    // KEYBOARD SHORTCUTS
    // ================================================================
    
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        handleLogin();
      }
    });
    
    document.getElementById('loginUsername').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('loginPassword').focus();
      }
    });
    
    // ================================================================
    // INITIALIZE
    // ================================================================
    
    loadSavedUsers();
  </script>
</body>
</html>
