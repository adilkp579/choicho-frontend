<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat · Choicho</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="CSS/main.css">
  <style>
    /* ... (all existing styles remain the same) ... */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    .page {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      position: relative;
    }
    
    .scrollable-content {
      width: 100%;
      max-width: 100%;
      padding-bottom: 80px;
    }
    
    .chat-header {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 1rem;
      background: #000;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      width: 100%;
    }
    .chat-header.show { display: flex; }
    .chat-back {
      width: 2.4rem;
      height: 2.4rem;
      background: #1a1a1a;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #333;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chat-partner-info {
      flex: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chat-partner-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-partner-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .chat-partner-details {
      flex: 1;
      min-width: 0;
    }
    .chat-partner-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }
    .chat-partner-status {
      font-size: 0.65rem;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .chat-partner-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
    }
    .call-btns {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .call-btn {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      position: relative;
    }
    .call-btn:active { transform: scale(0.95); }
    .call-btn.in-call {
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }
    .call-btn .call-dot {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      border: 2px solid #000;
      display: none;
    }
    .call-btn.in-call .call-dot {
      display: block;
    }
    .call-btn.ringing {
      animation: ring 0.8s infinite;
    }
    @keyframes ring {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    
    .chat-settings-btn {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .chat-settings-btn:active { transform: scale(0.95); }
    
    .search-bar-container {
      padding: 0.3rem 1rem 0.4rem;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      width: 100vw;
      max-width: 100vw;
      margin-left: 0;
      margin-right: 0;
      box-sizing: border-box;
      display: block;
      position: relative;
      left: 0;
      right: 0;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: #111;
      border-radius: 2rem;
      padding: 0.2rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.08);
      transition: border 0.25s, background 0.25s;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      min-height: 36px;
    }
    .search-bar:focus-within {
      border-color: #FFFC00;
      background: #0a0a0a;
      box-shadow: 0 0 0 3px rgba(255,252,0,0.08);
    }
    .search-bar i {
      color: #666;
      margin-right: 0.5rem;
      font-size: 0.75rem;
      transition: color 0.25s;
      flex-shrink: 0;
    }
    .search-bar:focus-within i {
      color: #FFFC00;
    }
    .search-bar input {
      background: transparent;
      border: none;
      color: #fff;
      padding: 0.3rem 0;
      width: 100%;
      min-width: 0;
      font-size: 0.75rem;
      outline: none;
      font-weight: 400;
      letter-spacing: 0.2px;
      box-sizing: border-box;
    }
    .search-bar input::placeholder {
      color: #555;
      font-weight: 300;
      letter-spacing: 0.2px;
      font-size: 0.75rem;
    }
    .search-bar input::-webkit-search-cancel-button {
      -webkit-appearance: none;
      appearance: none;
    }
    
    .chat-list-full {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      width: 100%;
    }
    .chat-list-full.hidden { display: none; }
    .chat-list-header {
      padding: 0.5rem 1rem;
      font-size: 0.6rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .user-list-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      transition: background 0.2s;
      width: 100%;
    }
    .user-list-item:active { background: rgba(255,255,255,0.03); }
    .user-list-item.active { background: rgba(255,252,0,0.06); }
    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-info {
      flex: 1;
      min-width: 0;
    }
    .user-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-name {
      font-size: 0.85rem;
      color: #fff;
      font-weight: 500;
    }
    .user-time {
      font-size: 0.6rem;
      color: #555;
    }
    .user-msg-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
    }
    .user-last-msg {
      font-size: 0.7rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .user-last-msg.unread-msg {
      color: #fff;
      font-weight: 500;
    }
    .unread-count {
      background: #FFFC00;
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    .chat-view.show { display: flex; }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: #000;
      width: 100%;
    }
    .messages-container::-webkit-scrollbar { width: 0; }
    .message-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeInUp 0.25s;
      margin-bottom: 0.1rem;
    }
    .message-wrapper.sent {
      align-self: flex-end;
    }
    .message-wrapper.received {
      align-self: flex-start;
    }
    .message-sender-name {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.1rem;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
    }
    .message-wrapper.sent .message-sender-name {
      text-align: right;
      color: rgba(0,0,0,0.5);
    }
    .message-content {
      display: flex;
      flex-direction: column;
    }
    .message-wrapper.sent .message-content {
      align-items: flex-end;
    }
    .message-wrapper.received .message-content {
      align-items: flex-start;
    }
    .message-bubble {
      padding: 0.55rem 0.8rem;
      border-radius: 1.2rem;
      font-size: 0.85rem;
      line-height: 1.3;
      word-break: break-word;
    }
    .sent .message-bubble {
      background: #FFFC00;
      color: #000;
      border-bottom-right-radius: 0.3rem;
    }
    .received .message-bubble {
      background: #111;
      color: #fff;
      border-bottom-left-radius: 0.3rem;
    }
    .message-time {
      font-size: 0.55rem;
      margin-top: 0.1rem;
    }
    .sent .message-time {
      text-align: right;
      color: rgba(0,0,0,0.45);
    }
    .received .message-time {
      color: rgba(255,255,255,0.35);
    }
    .message-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 0.8rem;
      cursor: pointer;
    }
    .voice-message-btn {
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
      padding: 0.2rem 0.5rem;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .voice-message-btn:hover {
      opacity: 0.8;
    }
    .voice-message-btn.recording {
      color: #ef4444;
      animation: pulse 1s infinite;
    }
    .voice-message-player {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.2rem 0.5rem;
    }
    .voice-message-player audio {
      height: 30px;
      max-width: 150px;
    }
    .voice-message-player audio::-webkit-media-controls-panel {
      background: rgba(255,255,255,0.1);
    }
    
    .empty-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 0.8rem;
    }
    .chat-input-area {
      display: none;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.8rem;
      padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0.5rem));
      background: #000;
      border-top: 1px solid rgba(255,255,255,0.06);
      width: 100%;
    }
    .chat-input-area.show { display: flex; }
    .camera-btn-s, .mic-btn-s {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .camera-btn-s:hover, .mic-btn-s:hover {
      background: rgba(255,255,255,0.15);
    }
    .mic-btn-s.recording {
      background: #ef4444;
      border-color: #ef4444;
      animation: pulse 1s infinite;
    }
    .chat-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0a0a0a;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      min-width: 0;
    }
    .chat-input:focus { border-color: #FFFC00; }
    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #FFFC00;
      border: none;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .send-btn:hover {
      transform: scale(1.05);
    }
    .send-btn:active {
      transform: scale(0.95);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fab-container {
      position: fixed;
      bottom: 85px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    
    .fab-main {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #FFFC00;
      color: #000;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,252,0,0.3);
      transition: all 0.3s ease;
      position: relative;
    }
    .fab-main:active {
      transform: scale(0.9);
    }
    .fab-main .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: #fff;
      font-size: 0.5rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #000;
    }
    
    .fab-main i {
      font-size: 0.9rem !important;
    }
    
    /* Call Overlay - Enhanced */
    .call-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
    }
    .call-overlay.show {
      display: flex;
    }
    .call-overlay .call-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #fff;
      margin-bottom: 1.5rem;
      border: 2px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .call-overlay .call-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .call-overlay .call-avatar .call-avatar-status {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4ade80;
      border: 2px solid #000;
    }
    .call-overlay .call-name {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .call-overlay .call-status {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .call-overlay .call-timer {
      color: #fff;
      font-size: 1.2rem;
      margin-bottom: 2rem;
      font-variant-numeric: tabular-nums;
    }
    .call-overlay .call-actions {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .call-overlay .call-action-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .call-overlay .call-action-btn:active {
      transform: scale(0.9);
    }
    .call-overlay .call-action-btn.end-call {
      background: #ef4444;
      color: #fff;
    }
    .call-overlay .call-action-btn.end-call:hover {
      background: #dc2626;
    }
    .call-overlay .call-action-btn.mute-call {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .call-overlay .call-action-btn.mute-call:hover {
      background: rgba(255,255,255,0.2);
    }
    .call-overlay .call-action-btn.mute-call.muted {
      background: #ef4444;
      color: #fff;
    }
    .call-overlay .call-action-btn.video-toggle {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .call-overlay .call-action-btn.video-toggle:hover {
      background: rgba(255,255,255,0.2);
    }
    .call-overlay .call-action-btn.video-toggle.video-off {
      background: #ef4444;
      color: #fff;
    }
    .call-overlay .call-action-btn.speaker-toggle {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .call-overlay .call-action-btn.speaker-toggle:hover {
      background: rgba(255,255,255,0.2);
    }
    .call-overlay .call-action-btn.speaker-toggle.speaker-on {
      background: #FFFC00;
      color: #000;
    }
    .call-overlay .call-action-btn.accept-call {
      background: #4ade80;
      color: #000;
    }
    .call-overlay .call-action-btn.accept-call:hover {
      background: #22c55e;
    }
    
    /* Video call remote stream */
    .call-overlay .remote-video {
      width: 100%;
      max-width: 400px;
      height: auto;
      border-radius: 1rem;
      background: #111;
      margin-bottom: 1rem;
      display: none;
    }
    .call-overlay .remote-video.show {
      display: block;
    }
    .call-overlay .local-video {
      position: absolute;
      bottom: 100px;
      right: 20px;
      width: 120px;
      height: 160px;
      border-radius: 0.8rem;
      background: #111;
      border: 2px solid rgba(255,255,255,0.2);
      object-fit: cover;
      display: none;
    }
    .call-overlay .local-video.show {
      display: block;
    }
    
    /* Incoming call notification */
    .incoming-call {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      padding: 1.5rem 2rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 999;
      display: none;
      align-items: center;
      gap: 1.5rem;
      min-width: 300px;
      max-width: 90%;
    }
    .incoming-call.show {
      display: flex;
      animation: slideUp 0.3s ease;
    }
    .incoming-call .call-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .incoming-call .call-info .caller-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #fff;
      overflow: hidden;
    }
    .incoming-call .call-info .caller-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .incoming-call .call-info .caller-details {
      color: #fff;
    }
    .incoming-call .call-info .caller-details .caller-name {
      font-size: 1rem;
      font-weight: 600;
    }
    .incoming-call .call-info .caller-details .call-type {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
    }
    .incoming-call .call-actions {
      display: flex;
      gap: 0.8rem;
    }
    .incoming-call .call-actions button {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .incoming-call .call-actions button:active {
      transform: scale(0.9);
    }
    .incoming-call .call-actions .accept-btn {
      background: #4ade80;
      color: #000;
    }
    .incoming-call .call-actions .accept-btn:hover {
      background: #22c55e;
    }
    .incoming-call .call-actions .decline-btn {
      background: #ef4444;
      color: #fff;
    }
    .incoming-call .call-actions .decline-btn:hover {
      background: #dc2626;
    }
    
    .new-chat-panel {
      position: fixed;
      bottom: 150px;
      right: 20px;
      width: 350px;
      max-width: calc(100vw - 40px);
      max-height: 60vh;
      background: rgba(255, 255, 255, 0.05) !important;
      backdrop-filter: blur(40px) saturate(1.8) !important;
      -webkit-backdrop-filter: blur(40px) saturate(1.8) !important;
      border-radius: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.15) !important;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1) !important;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 101;
    }
    .new-chat-panel.show {
      display: flex;
      animation: slideUp 0.3s ease;
    }
    
    .new-chat-panel-header {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
    }
    .new-chat-panel-header h3 {
      color: #fff;
      font-size: 0.9rem;

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { timeAgo, cleanUsername, getAvatarHTML, requireAuth } from './js/common.js';
    import { getCurrentUser } from './js/auth.js';
    import { collection, query, orderBy, onSnapshot, doc, getDoc, setDoc, addDoc, updateDoc, increment, serverTimestamp, where, getDocs, deleteDoc, limit, startAfter } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    
    if (!requireAuth()) window.location.replace('login.html');
    
    const currentUser = getCurrentUser();
    const currentUserId = currentUser.uid;
    console.log("✅ Current User ID:", currentUserId);
    
    let currentPartner = null;
    let currentPartnerId = null;
    let currentChatId = null;
    let unsubMessages = null;
    let allUsers = [];
    let pendingRequests = [];
    let activePanelTab = 'users';
    let chatListData = [];
    let isMutedSetting = false;
    let isPanelOpen = false;
    
    // ========== CALL VARIABLES ==========
    let isCallActive = false;
    let callType = null;
    let callTimerInterval = null;
    let callSeconds = 0;
    let isMutedCall = false;
    let isSpeakerOn = false;
    let isVideoOn = true;
    let localStream = null;
    let remoteStream = null;
    let peerConnection = null;
    let mediaRecorderInstance = null;
    let recordedChunks = [];
    let isRecordingVoice = false;
    let callDocumentId = null;
    let unsubCall = null;
    let isCaller = false;
    
    // ========== USERNAME CACHE ==========
    let usernameCache = {};
    let userDisplayNameCache = {};
    let userFetchPromises = {};
    
    // ========== TOAST FUNCTION ==========
    function showToast(message) {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
    
    window.showToast = showToast;
    
    // ========== INFINITE SCROLL VARIABLES ==========
    let lastVisible = null;
    let isLoadingUsers = false;
    let allUsersLoaded = false;
    const PAGE_SIZE = 50;
    
    // ========== INITIALIZE USER DOCUMENT ==========
    async function initializeUserDocument() {
      try {
        const userRef = doc(db, 'users', currentUserId);
        const userSnap = await getDoc(userRef);
        
        let username = currentUser.displayName || currentUser.email || currentUserId;
        if (username.includes('@')) {
          username = username.split('@')[0];
        }
        username = username.replace(/[^a-zA-Z0-9_]/g, '');
        
        if (!username || username.length === 0) {
          username = 'user_' + currentUserId.substring(0, 8);
        }
        
        if (!userSnap.exists()) {
          console.log("🆕 Creating new user document for:", currentUserId);
          await setDoc(userRef, {
            username: username,
            name: currentUser.displayName || username,
            email: currentUser.email || '',
            avatar: '',
            createdAt: serverTimestamp(),
            lastSeen: serverTimestamp()
          });
          usernameCache[currentUserId] = username;
          showToast('User profile created! ✅');
        } else {
          const data = userSnap.data();
          if (!data.username) {
            await updateDoc(userRef, {
              username: username,
              name: currentUser.displayName || username
            });
          }
          usernameCache[currentUserId] = data.username || username;
          console.log("✅ User document exists:", data);
        }
        
        return true;
      } catch (error) {
        console.error("❌ Error initializing user document:", error);
        return false;
      }
    }
    
    // ========== GET USERNAME FROM USER ID ==========
    async function getUsernameFromId(userId) {
      if (usernameCache[userId]) {
        return usernameCache[userId];
      }
      
      if (userFetchPromises[userId]) {
        return await userFetchPromises[userId];
      }
      
      userFetchPromises[userId] = (async () => {
        try {
          const userDoc = await getDoc(doc(db, 'users', userId));
          if (userDoc.exists()) {
            const data = userDoc.data();
            const username = data.username || data.displayName || data.name || data.email || userId;
            usernameCache[userId] = username;
            return username;
          }
          usernameCache[userId] = userId;
          return userId;
        } catch (error) {
          console.error('Error fetching username for', userId, ':', error);
          usernameCache[userId] = userId;
          return userId;
        } finally {
          delete userFetchPromises[userId];
        }
      })();
      
      return await userFetchPromises[userId];
    }

        return userDisplayNameCache[userId];

        userDisplayNameCache[userId] = cleanName;

        console.error('Error getting display name for', userId, ':', error);

            [`unread_${userId2}`]: 0
          });

    // ========== VOICE MESSAGE RECORDING ==========
    window.toggleVoiceRecording = async function() {

        if (mediaRecorderInstance && mediaRecorderInstance.state === 'recording') {
          mediaRecorderInstance.stop();
          document.getElementById('micBtn').classList.remove('recording');
          document.getElementById('micBtn').innerHTML = '<i class="fas fa-microphone"></i>';
          isRecordingVoice = false;
          showToast('⏹️ Recording stopped');
        }
        return;
      }
      
      if (!currentChatId) {
        showToast('No chat selected');
        return;
      }
      
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorderInstance = new MediaRecorder(stream);
        recordedChunks = [];
        
        mediaRecorderInstance.ondataavailable = (event) => {
          if (event.data.size > 0) {
            recordedChunks.push(event.data);
          }
        };
        
        mediaRecorderInstance.onstop = async () => {
          stream.getTracks().forEach(track => track.stop());
          
          if (recordedChunks.length === 0) {
            showToast('No voice recorded');
            return;
          }
          
          const blob = new Blob(recordedChunks, { type: 'audio/webm' });
          const reader = new FileReader();
          reader.onload = async function(ev) {
            try {
              const voiceUrl = ev.target.result;
              
              await ensureChatExists(currentChatId, currentUserId, currentPartnerId);
              
              const chatRef = doc(db, 'chats', currentChatId);
              await setDoc(chatRef, {
                lastMessage: '🎤 Voice message',
                lastTime: serverTimestamp(),
                [`unread_${currentPartnerId}`]: increment(1)
              }, { merge: true });
              
              await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
                voiceUrl: voiceUrl,
                sender: currentUserId,
                createdAt: serverTimestamp()
              });
              
              showToast('🎤 Voice message sent');
            } catch(error) {
              console.error('❌ Voice send error:', error);
              showToast('❌ Failed to send voice');
            }
          };
          reader.readAsDataURL(blob);
        };
        
        mediaRecorderInstance.start();
        isRecordingVoice = true;
        document.getElementById('micBtn').classList.add('recording');
        document.getElementById('micBtn').innerHTML = '<i class="fas fa-stop"></i>';
        showToast('🔴 Recording... tap again to stop');
        
      } catch (error) {
        console.error('❌ Recording error:', error);
        showToast('❌ Cannot access microphone');
      }

    // ========== CALL FUNCTIONS USING FIRESTORE SIGNALING ==========
    const configuration = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },

    // Create a call document in Firestore for signaling
    async function createCallDocument(partnerId, type) {
      const callId = `${currentUserId}_${partnerId}_${Date.now()}`;
      const callRef = doc(db, 'calls', callId);
      await setDoc(callRef, {
        from: currentUserId,
        to: partnerId,
        type: type,
        status: 'calling',
        createdAt: serverTimestamp(),
        offer: null,
        answer: null,
        candidates: []
      });
      return callRef;
    }
    
    // Listen for incoming calls
    function listenForCalls() {
      const q = query(collection(db, 'calls'), where('to', '==', currentUserId), where('status', '==', 'calling'));
      unsubCall = onSnapshot(q, async (snapshot) => {

          console.log("📞 Incoming call from:", data.from);

        });
      }, (error) => {

    function showIncomingCall(fromId, callerName, type, callId) {
      const incomingCall = document.getElementById('incomingCall');
      document.getElementById('incomingCallerName').textContent = cleanUsername('@' + callerName);
      document.getElementById('incomingCallType').textContent = type === 'audio' ? '🔊 Audio call' : '📹 Video call';
      
      const avatar = document.getElementById('incomingCallerAvatar');
      avatar.innerHTML = getAvatarHTML('@' + callerName);
      
      // Store call ID for accept/decline
      incomingCall.dataset.callId = callId;
      incomingCall.dataset.fromId = fromId;
      incomingCall.dataset.callType = type;
      
      incomingCall.classList.add('show');
      
      // Ring sound effect (visual)
      document.getElementById('audioCallBtn').classList.add('ringing');
      document.getElementById('videoCallBtn').classList.add('ringing');
    }
    
    window.acceptIncomingCall = async function() {
      const incomingCall = document.getElementById('incomingCall');
      const callId = incomingCall.dataset.callId;
      const fromId = incomingCall.dataset.fromId;
      const type = incomingCall.dataset.callType;
      
      incomingCall.classList.remove('show');
      document.getElementById('audioCallBtn').classList.remove('ringing');
      document.getElementById('videoCallBtn').classList.remove('ringing');
      
      // Accept the call
      isCaller = false;
      callType = type;
      callDocumentId = callId;
      isCallActive = true;
      
      try {
        // Get user media
        const constraints = {
          audio: true,
          video: type === 'video'
        };
        
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        
        // Show local video if video call
        if (type === 'video') {
          const localVideo = document.getElementById('localVideo');
          localVideo.srcObject = localStream;
          localVideo.classList.add('show');
          document.getElementById('videoToggleBtn').style.display = 'flex';
        }
        
        peerConnection = new RTCPeerConnection(configuration);
        
        localStream.getTracks().forEach(track => {
          peerConnection.addTrack(track, localStream);
        });
        
        // Handle remote stream
        peerConnection.ontrack = (event) => {
          remoteStream = event.streams[0];
          if (type === 'video') {
            const remoteVideo = document.getElementById('remoteVideo');
            remoteVideo.srcObject = remoteStream;
            remoteVideo.classList.add('show');
          }
          document.getElementById('callStatus').textContent = 'Connected';
          startCallTimer();
        };
        
        // Listen for ICE candidates from the caller
        const callRef = doc(db, 'calls', callId);
        onSnapshot(callRef, async (snapshot) => {
          const data = snapshot.data();
          if (data && data.offer && !peerConnection.currentRemoteDescription) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            await updateDoc(callRef, {
              answer: answer,
              status: 'connected'
            });
          }
          if (data && data.candidates) {
            for (const candidate of data.candidates) {
              try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
              } catch (e) {
                console.warn('Error adding ICE candidate:', e);
              }
            }
          }
        });
        
        // Send ICE candidates
        peerConnection.onicecandidate = async (event) => {
          if (event.candidate) {
            const callRef = doc(db, 'calls', callId);
            await updateDoc(callRef, {
              candidates: arrayUnion(event.candidate)
            });
          }
        };
        
        peerConnection.onconnectionstatechange = () => {
          console.log('Connection state:', peerConnection.connectionState);
          if (peerConnection.connectionState === 'failed' || 
              peerConnection.connectionState === 'disconnected' ||
              peerConnection.connectionState === 'closed') {
            endCall();
          }
        };
        
        showCallOverlay(type);
        document.getElementById('callStatus').textContent = 'Connecting...';
        
      } catch (error) {
        console.error('❌ Error accepting call:', error);
        showToast('Failed to accept call: ' + error.message);
        endCall();
      }
    };
    
    window.declineIncomingCall = async function() {
      const incomingCall = document.getElementById('incomingCall');
      const callId = incomingCall.dataset.callId;
      
      incomingCall.classList.remove('show');
      document.getElementById('audioCallBtn').classList.remove('ringing');
      document.getElementById('videoCallBtn').classList.remove('ringing');
      
      // Delete the call document
      try {
        await deleteDoc(doc(db, 'calls', callId));
      } catch (e) {
        console.warn('Error deleting call:', e);
      }
      
      showToast('Call declined');
    };
    
    window.startCall = async function(type) {
      if (!currentPartner) {
        showToast('Please select a chat first');
        return;
      }
      
      if (isCallActive) {
        showToast('Call already in progress');
        return;
      }
      
      isCaller = true;
      callType = type;
      isCallActive = true;
      
      try {
        showToast('Fetching secure connection settings...');
        
        // Fetch TURN credentials
        try {
          const idToken = await currentUser.getIdToken();
          const response = await fetch('https://your-railway-app.railway.app/turn', {
            method: 'GET',
            headers: {
              'Authorization': `Bearer ${idToken}`,
              'Content-Type': 'application/json'
            }
          });
          
          if (response.ok) {
            const turnData = await response.json();
            if (turnData && turnData.iceServers) {
              configuration.iceServers = turnData.iceServers;
              console.log('✅ Secure TURN credentials loaded successfully.');
            }
          }
        } catch (fetchError) {
          console.warn('⚠️ Failed to fetch TURN credentials, using fallback STUN.');
        }
        
        // Create call document
        const callRef = await createCallDocument(currentPartnerId, type);
        callDocumentId = callRef.id;
        
        // Get user media
        const constraints = {
          audio: true,
          video: type === 'video'
        };
        
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        
        // Show local video if video call
        if (type === 'video') {
          const localVideo = document.getElementById('localVideo');
          localVideo.srcObject = localStream;
          localVideo.classList.add('show');
          document.getElementById('videoToggleBtn').style.display = 'flex';
        }
        
        peerConnection = new RTCPeerConnection(configuration);
        
        localStream.getTracks().forEach(track => {
          peerConnection.addTrack(track, localStream);
        });
        
        // Handle remote stream
        peerConnection.ontrack = (event) => {
          remoteStream = event.streams[0];
          if (type === 'video') {
            const remoteVideo = document.getElementById('remoteVideo');
            remoteVideo.srcObject = remoteStream;
            remoteVideo.classList.add('show');
          }
          document.getElementById('callStatus').textContent = 'Connected';
          startCallTimer();
        };
        
        // Create offer
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        // Send offer to Firestore
        await updateDoc(callRef, {
          offer: offer,
          status: 'calling'
        });
        
        // Listen for answer from receiver
        onSnapshot(callRef, async (snapshot) => {
          const data = snapshot.data();
          if (data && data.answer && !peerConnection.currentRemoteDescription) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            document.getElementById('callStatus').textContent = 'Connected';
            startCallTimer();
          }
          if (data && data.candidates) {
            for (const candidate of data.candidates) {
              try {
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
              } catch (e) {
                console.warn('Error adding ICE candidate:', e);
              }
            }
          }
          if (data && data.status === 'ended') {
            endCall();
          }
        });
        
        // Send ICE candidates
        peerConnection.onicecandidate = async (event) => {
          if (event.candidate) {
            await updateDoc(callRef, {
              candidates: arrayUnion(event.candidate)
            });
          }
        };
        
        peerConnection.onconnectionstatechange = () => {
          console.log('Connection state:', peerConnection.connectionState);
          if (peerConnection.connectionState === 'failed' || 
              peerConnection.connectionState === 'disconnected' ||
              peerConnection.connectionState === 'closed') {
            endCall();
          }
        };
        
        showCallOverlay(type);
        document.getElementById('callStatus').textContent = 'Calling...';
        
        document.getElementById('audioCallBtn').classList.add('in-call');
        document.getElementById('videoCallBtn').classList.add('in-call');
        showToast(`${type} call started`);
        
      } catch (error) {
        console.error('❌ Call error:', error);
        isCallActive = false;
        showToast(`Failed to start ${type} call: ${error.message}`);
        endCall();
      }
    };
    
    function showCallOverlay(type) {
      const overlay = document.getElementById('callOverlay');
      const avatar = document.getElementById('callAvatar');
      const name = document.getElementById('callName');
      const status = document.getElementById('callStatus');
      const remoteVideo = document.getElementById('remoteVideo');
      const localVideo = document.getElementById('localVideo');
      
      avatar.innerHTML = currentPartner ? getAvatarHTML(currentPartner) : '<i class="fas fa-user"></i>';
      name.textContent = currentPartner ? cleanUsername(currentPartner) : 'Unknown';
      status.textContent = type === 'audio' ? 'Audio calling...' : 'Video calling...';
      
      if (type === 'video') {
        remoteVideo.classList.add('show');
        localVideo.classList.add('show');
        document.getElementById('videoToggleBtn').style.display = 'flex';
      } else {
        remoteVideo.classList.remove('show');
        localVideo.classList.remove('show');
        document.getElementById('videoToggleBtn').style.display = 'none';
      }
      
      overlay.classList.add('show');
      document.getElementById('floatingNav').style.display = 'none';
    }
    
    function startCallTimer() {
      callSeconds = 0;
      clearInterval(callTimerInterval);
      callTimerInterval = setInterval(() => {
        callSeconds++;
        const mins = String(Math.floor(callSeconds / 60)).padStart(2, '0');
        const secs = String(callSeconds % 60).padStart(2, '0');
        document.getElementById('callTimer').textContent = `${mins}:${secs}`;
      }, 1000);
    }
    
    window.endCall = async function() {
      isCallActive = false;
      clearInterval(callTimerInterval);
      callSeconds = 0;
      document.getElementById('callTimer').textContent = '00:00';
      document.getElementById('callOverlay').classList.remove('show');
      document.getElementById('floatingNav').style.display = 'flex';
      
      // Update call status in Firestore
      if (callDocumentId) {
        try {
          await updateDoc(doc(db, 'calls', callDocumentId), {
            status: 'ended',
            endedAt: serverTimestamp()
          });
        } catch (e) {
          console.warn('Error updating call status:', e);
        }
      }
      
      // Reset video elements
      document.getElementById('remoteVideo').classList.remove('show');
      document.getElementById('remoteVideo').srcObject = null;
      document.getElementById('localVideo').classList.remove('show');
      document.getElementById('localVideo').srcObject = null;
      document.getElementById('videoToggleBtn').style.display = 'none';
      
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      
      remoteStream = null;
      callDocumentId = null;
      
      document.getElementById('audioCallBtn').classList.remove('in-call');
      document.getElementById('videoCallBtn').classList.remove('in-call');
      
      const muteBtn = document.getElementById('muteBtn');
      muteBtn.classList.remove('muted');
      muteBtn.querySelector('i').className = 'fas fa-microphone';
      isMutedCall = false;
      
      document.getElementById('callStatus').textContent = 'Connecting...';
      showToast('Call ended');
    };
    
    window.toggleMute = function() {
      if (!localStream) return;
      
      isMutedCall = !isMutedCall;
      const muteBtn = document.getElementById('muteBtn');
      
      localStream.getAudioTracks().forEach(track => {
        track.enabled = !isMutedCall;
      });
      
      if (isMutedCall) {
        muteBtn.classList.add('muted');
        muteBtn.querySelector('i').className = 'fas fa-microphone-slash';
        showToast('Microphone muted');
      } else {
        muteBtn.classList.remove('muted');
        muteBtn.querySelector('i').className = 'fas fa-microphone';
        showToast('Microphone unmuted');
      }
    };
    
    window.toggleSpeaker = function() {
      isSpeakerOn = !isSpeakerOn;
      const speakerBtn = document.getElementById('speakerBtn');
      
      if (isSpeakerOn) {
        speakerBtn.classList.add('speaker-on');
        speakerBtn.querySelector('i').className = 'fas fa-volume-up';
        showToast('Speaker on');
      } else {
        speakerBtn.classList.remove('speaker-on');
        speakerBtn.querySelector('i').className = 'fas fa-volume-off';
        showToast('Speaker off');
      }
    };
    
    window.toggleVideo = function() {
      if (!localStream) return;
      
      isVideoOn = !isVideoOn;
      const videoBtn = document.getElementById('videoToggleBtn');
      
      localStream.getVideoTracks().forEach(track => {
        track.enabled = isVideoOn;
      });
      
      if (isVideoOn) {
        videoBtn.classList.remove('video-off');
        videoBtn.querySelector('i').className = 'fas fa-video';
        showToast('Video on');
      } else {
        videoBtn.classList.add('video-off');
        videoBtn.querySelector('i').className = 'fas fa-video-slash';
        showToast('Video off');
      }
    };
    
    // Firestore arrayUnion helper
    const arrayUnion = (element) => {
      // Simple helper for Firestore arrayUnion
      return element;
    };
    
    // ========== GO BACK ==========
    window.goBack = function() {
      if (unsubMessages) {
        unsubMessages();
        unsubMessages = null;
      }
      if (unsubCall) {
        unsubCall();
        unsubCall = null;
      }
      if (isCallActive) {
        endCall();
      }
      if (isRecordingVoice) {
        if (mediaRecorderInstance && mediaRecorderInstance.state === 'recording') {
          mediaRecorderInstance.stop();
        }
        isRecordingVoice = false;
        document.getElementById('micBtn').classList.remove('recording');
        document.getElementById('micBtn').innerHTML = '<i class="fas fa-microphone"></i>';
      }
      currentPartner = null;
      currentPartnerId = null;
      currentChatId = null;
      document.getElementById('topIcons').style.display = 'flex';
      document.getElementById('chatHeader').classList.remove('show');
      document.getElementById('chatListFull').classList.remove('hidden');
      document.getElementById('searchBarContainer').classList.remove('hidden');
      document.getElementById('chatView').classList.remove('show');
      document.getElementById('chatInputArea').classList.remove('show');
      document.getElementById('floatingNav').style.display = 'flex';
      document.getElementById('fabContainer').style.display = 'flex';
      document.getElementById('messagesContainer').innerHTML = '<div class="empty-chat">Select a chat to start messaging</div>';
      applySearchFilter();
    };
    
    window.goToPartnerProfile = function() {
      if (currentPartner) window.location.href = `profile.html?user=${encodeURIComponent(currentPartner)}`;
    };
    
    // ========== FLOATING ACTION BUTTON FUNCTIONS ==========
    
    window.toggleNewChatPanel = function() {
      if (isPanelOpen) {
        closeNewChatPanel();
      } else {
        openNewChatPanel();
      }
    };
    
    function openNewChatPanel() {
      isPanelOpen = true;
      document.getElementById('newChatPanel').classList.add('show');
      document.getElementById('fabMain').innerHTML = '<i class="fas fa-times"></i>';
      lastVisible = null;
      allUsersLoaded = false;
      allUsers = [];
      loadPanelUsers();
    }
    
    window.closeNewChatPanel = function() {
      isPanelOpen = false;
      document.getElementById('newChatPanel').classList.remove('show');
      document.getElementById('fabMain').innerHTML = '<i class="fas fa-plus"></i>';
    };
    
    window.switchPanelTab = function(tab) {
      activePanelTab = tab;
      document.querySelectorAll('.new-chat-panel-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      if (tab === 'users') {
        lastVisible = null;
        allUsersLoaded = false;
        allUsers = [];
        loadPanelUsers();
      } else {
        renderPanelList();
      }
    };
    
    window.filterPanelUsers = function() {
      renderPanelList();
    };
    
    // ========== LOAD USERS WITH INFINITE SCROLL ==========
    async function loadPanelUsers() {
      if (activePanelTab !== 'users') return;
      if (isLoadingUsers || allUsersLoaded) return;
      
      isLoadingUsers = true;
      const container = document.getElementById('newChatPanelList');
      
      try {
        let q;
        if (lastVisible) {
          q = query(collection(db, 'users'), orderBy('createdAt', 'desc'), startAfter(lastVisible), limit(PAGE_SIZE));
        } else {
          q = query(collection(db, 'users'), orderBy('createdAt', 'desc'), limit(PAGE_SIZE));
        }
        
        const snapshot = await getDocs(q);
        
        if (snapshot.empty) {
          allUsersLoaded = true;
          if (allUsers.length === 0) {
            container.innerHTML = '<div class="new-chat-panel-empty"><i class="fas fa-user-slash"></i><p>No users found</p></div>';
          }
          return;
        }
        
        const newUsers = [];
        for (const doc of snapshot.docs) {
          const data = doc.data();
          const userId = doc.id;
          if (userId !== currentUserId) {
            const username = data.username || data.displayName || data.name || userId;
            usernameCache[userId] = username;
            newUsers.push({
              id: userId,
              username: username,
              name: data.name || cleanUsername(username),
              avatar: data.avatar
            });
          }
        }
        
        lastVisible = snapshot.docs[snapshot.docs.length - 1];
        allUsers = [...allUsers, ...newUsers];
        
        if (newUsers.length < PAGE_SIZE) {
          allUsersLoaded = true;
        }
        
        renderPanelList();
        
      } catch (error) {
        console.error('❌ Error loading users:', error);
        container.innerHTML = '<div class="new-chat-panel-empty"><i class="fas fa-exclamation-triangle"></i><p>Error loading users</p></div>';
      } finally {
        isLoadingUsers = false;
      }
    }
    
    function setupPanelScroll() {
      const list = document.getElementById('newChatPanelList');
      list.addEventListener('scroll', function() {
        if (activePanelTab !== 'users') return;
        if (isLoadingUsers || allUsersLoaded) return;
        
        const scrollTop = this.scrollTop;
        const scrollHeight = this.scrollHeight;
        const clientHeight = this.clientHeight;
        
        if (scrollTop + clientHeight >= scrollHeight - 100) {
          loadPanelUsers();
        }
      });
    }
    
    // ========== LOAD REQUESTS ==========
    async function loadRequests() {
      try {
        pendingRequests = [];
        const q = query(collection(db, 'message_requests'), where('toId', '==', currentUserId), where('status', '==', 'pending'));
        const snapshot = await getDocs(q);
        snapshot.forEach(doc => {
          const data = doc.data();
          pendingRequests.push({
            id: doc.id,
            from: data.from,
            fromName: data.fromName,
            fromAvatar: data.fromAvatar,
            fromId: data.fromId
          });
        });
        
        const badge = document.getElementById('fabBadge');
        const panelBadge = document.getElementById('panelRequestBadge');
        if (pendingRequests.length > 0) {
          badge.style.display = 'flex';
          badge.textContent = pendingRequests.length;
          panelBadge.style.display = 'inline';
          panelBadge.textContent = pendingRequests.length;
        } else {
          badge.style.display = 'none';
          panelBadge.style.display = 'none';
        }
      } catch (error) {
        console.error('❌ Error loading requests:', error);
      }
    }
    
    // ========== RENDER PANEL LIST ==========
    function renderPanelList() {
      const container = document.getElementById('newChatPanelList');
      const searchTerm = document.getElementById('panelSearchInput').value.toLowerCase();
      
      if (activePanelTab === 'users') {
        let filtered = allUsers;
        if (searchTerm) {
          filtered = allUsers.filter(u => 
            (u.username || '').toLowerCase().includes(searchTerm) || 
            (u.name || '').toLowerCase().includes(searchTerm)
          );
        }
        
        if (filtered.length === 0 && !isLoadingUsers) {
          container.innerHTML = '<div class="new-chat-panel-empty"><i class="fas fa-user-slash"></i><p>No users found</p></div>';
          return;
        }
        
        let html = filtered.map(u => `
          <div class="new-chat-panel-item" onclick="startChatFromPanel('${u.id}')">
            <div class="new-chat-panel-avatar">
              ${u.avatar ? `<img src="${u.avatar}">` : '<i class="fas fa-user"></i>'}
            </div>
            <div class="new-chat-panel-info">
              <div class="new-chat-panel-name">${u.name || cleanUsername(u.username || u.id)}</div>
              <div class="new-chat-panel-sub">@${u.username || u.id}</div>
            </div>
            <button class="new-chat-panel-action" onclick="event.stopPropagation();startChatFromPanel('${u.id}')">
              <i class="fas fa-comment"></i> Chat
            </button>
          </div>
        `).join('');
        
        if (!allUsersLoaded && !isLoadingUsers) {
          html += `<div class="panel-loading" id="panelLoadMore"><i class="fas fa-spinner"></i> Loading more users...</div>`;
        } else if (isLoadingUsers) {
          html += `<div class="panel-loading"><i class="fas fa-spinner"></i> Loading...</div>`;
        }
        
        container.innerHTML = html;
        
      } else {
        if (pendingRequests.length === 0) {
          container.innerHTML = '<div class="new-chat-panel-empty"><i class="fas fa-envelope-open"></i><p>No pending requests</p></div>';
          return;
        }
        
        container.innerHTML = pendingRequests.map(r => `
          <div class="new-chat-panel-item">
            <div class="new-chat-panel-avatar" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'">
              ${r.fromAvatar ? `<img src="${r.fromAvatar}">` : '<i class="fas fa-user"></i>'}
            </div>
            <div class="new-chat-panel-info" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'">
              <div class="new-chat-panel-name">${r.fromName || cleanUsername(r.from)}</div>
              <div class="new-chat-panel-sub">${r.from}</div>
            </div>
            <div style="display:flex;gap:0.3rem;">
              <button class="new-chat-panel-action accept" onclick="event.stopPropagation();acceptRequestFromPanel('${r.id}', '${r.from}')">
                <i class="fas fa-check"></i>
              </button>
              <button class="new-chat-panel-action decline" onclick="event.stopPropagation();declineRequestFromPanel('${r.id}')">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>
        `).join('');
      }
    }
    
    // ========== CHAT ACTIONS FROM PANEL ==========
    window.startChatFromPanel = async function(partnerUserId) {
      closeNewChatPanel();
      
      const chatId = [currentUserId, partnerUserId].sort().join('_');
      
      try {
        await ensureChatExists(chatId, currentUserId, partnerUserId);
        await openChat(partnerUserId, chatId);
      } catch(error) {
        console.error('❌ Error starting chat:', error);
        showToast('Failed to start chat: ' + error.message);
      }
    };
    
    window.acceptRequestFromPanel = async function(requestId, fromUser) {
      try {
        await deleteDoc(doc(db, 'message_requests', requestId));
        await loadRequests();
        renderPanelList();
        showToast(`Accepted request from ${cleanUsername(fromUser)}`);
      } catch(error) {
        console.error('❌ Error accepting request:', error);
        showToast('Failed to accept request');
      }
    };
    
    window.declineRequestFromPanel = async function(requestId) {
      try {
        await deleteDoc(doc(db, 'message_requests', requestId));
        await loadRequests();
        renderPanelList();
        showToast('Request declined');
      } catch(error) {
        console.error('❌ Error declining request:', error);
        showToast('Failed to decline request');
      }
    };
    
    // ========== CHAT SETTINGS ==========
    window.openChatSettings = function() {
      if (!currentPartner) {
        showToast('No chat selected');
        return;
      }
      document.getElementById('chatSettingsOverlay').classList.add('show');
    };
    
    window.closeChatSettings = function() {
      document.getElementById('chatSettingsOverlay').classList.remove('show');
    };
    
    window.viewContact = function() {
      closeChatSettings();
      if (currentPartner) {
        window.location.href = `profile.html?user=${encodeURIComponent(currentPartner)}`;
      }
    };
    
    window.toggleMuteSetting = function() {
      isMutedSetting = !isMutedSetting;
      const muteText = document.getElementById('muteText');
      if (isMutedSetting) {
        muteText.textContent = 'Unmute Notifications';
        showToast('Chat muted 🔕');
      } else {
        muteText.textContent = 'Mute Notifications';
        showToast('Chat unmuted 🔔');
      }
    };
    
    window.clearChat = function() {
      if (confirm('Clear all messages in this chat?')) {
        closeChatSettings();
        showToast('Chat cleared');
      }
    };
    
    window.blockUser = function() {
      if (confirm('Block this user?')) {
        closeChatSettings();
        showToast('User blocked 🚫');
        goBack();
      }
    };
    
    window.deleteChat = function() {
      if (confirm('Delete this chat permanently?')) {
        closeChatSettings();
        showToast('Chat deleted');
        goBack();
      }
    };
    
    // ========== EVENT LISTENERS ==========
    document.getElementById('chatSettingsOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('chatSettingsOverlay')) closeChatSettings();
    });
    
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });
    
    document.addEventListener('click', function(e) {
      const panel = document.getElementById('newChatPanel');
      const fab = document.getElementById('fabMain');
      if (isPanelOpen && panel && fab && !panel.contains(e.target) && !fab.contains(e.target)) {
        closeNewChatPanel();
      }
    });
    
    // ========== INITIALIZE ==========
    console.log("🚀 App Initialized");
    console.log("👤 Current User ID:", currentUserId);
    
    await initializeUserDocument();
    loadChats();
    loadRequests();
    setupPanelScroll();
    
    // Start listening for incoming calls
    listenForCalls();
  </script>
</body>
</html>
