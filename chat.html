<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover" />
    <title>Choicho · Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="CSS/main.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; }
        
        .loading-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 9999; flex-direction: column; gap: 1rem;
        }
        .loading-screen .spinner {
            width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #FFFC00; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-screen p { color: #555; font-size: 0.8rem; }
        
        #mainPage { display: none; flex-direction: column; min-height: 100vh; }
        
        /* ===== HEADER ===== */
        .top-icons {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.8rem 1rem; background: #000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .top-icons.hidden { display: none; }
        .top-icons .top-brand { font-size: 1.1rem; font-weight: 600; color: #fff; }
        .top-icons .corner-btn { color: #fff; font-size: 1.2rem; padding: 0.3rem; transition: opacity 0.2s; background: none; border: none; cursor: pointer; }
        .top-icons .corner-btn:hover { opacity: 0.7; }
        
        /* ===== CHAT HEADER ===== */
        .chat-header {
            display: none; align-items: center; gap: 0.6rem;
            padding: 0.8rem 1rem; background: #000;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .chat-header.show { display: flex; }
        .chat-back {
            width: 2.4rem; height: 2.4rem; background: #1a1a1a;
            border-radius: 50%; color: #fff; display: flex;
            align-items: center; justify-content: center;
            border: 1px solid #333; cursor: pointer; flex-shrink: 0;
        }
        .chat-partner-info { flex: 1; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
        .chat-partner-avatar {
            width: 36px; height: 36px; border-radius: 50%; background: #1a1a1a;
            display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0;
            font-weight: 600; font-size: 0.9rem; color: #fff;
        }
        .chat-partner-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .chat-partner-details { flex: 1; min-width: 0; }
        .chat-partner-name { font-size: 0.95rem; font-weight: 600; color: #fff; }
        .chat-partner-status { font-size: 0.65rem; color: #4ade80; display: flex; align-items: center; gap: 0.2rem; }
        .chat-partner-status .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; display: inline-block; }
        
        .call-btns { display: flex; gap: 0.5rem; flex-shrink: 0; }
        .call-btn {
            width: 2.2rem; height: 2.2rem; border-radius: 50%; background: rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center; color: #fff;
            cursor: pointer; border: none; transition: all 0.2s;
        }
        .call-btn:active { transform: scale(0.95); }
        .call-btn.in-call { background: #ef4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        
        /* ===== SEARCH ===== */
        .search-bar-container {
            padding: 0.3rem 1rem 0.4rem; background: #000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .search-bar-container.hidden { display: none; }
        .search-bar {
            display: flex; align-items: center; background: #111; border-radius: 2rem;
            padding: 0.2rem 0.8rem; border: 1px solid rgba(255,255,255,0.08);
            transition: border 0.25s, background 0.25s;
        }
        .search-bar:focus-within { border-color: #FFFC00; background: #0a0a0a; }
        .search-bar i { color: #666; margin-right: 0.5rem; font-size: 0.75rem; }
        .search-bar:focus-within i { color: #FFFC00; }
        .search-bar input {
            background: transparent; border: none; color: #fff; padding: 0.3rem 0;
            width: 100%; font-size: 0.75rem; outline: none;
        }
        .search-bar input::placeholder { color: #555; }
        
        /* ===== CHAT LIST ===== */
        .chat-list-full { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }
        .chat-list-full.hidden { display: none; }
        .chat-list-header {
            padding: 0.5rem 1rem; font-size: 0.6rem; color: #666;
            text-transform: uppercase; letter-spacing: 1px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .user-list-item {
            display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1rem;
            cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02);
            transition: background 0.2s;
        }
        .user-list-item:active { background: rgba(255,255,255,0.03); }
        .user-list-item.active { background: rgba(255,252,0,0.06); }
        .user-avatar {
            width: 48px; height: 48px; border-radius: 50%; background: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; flex-shrink: 0; font-size: 1.1rem; font-weight: 600; color: #fff;
        }
        .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .user-info { flex: 1; min-width: 0; }
        .user-name-row { display: flex; align-items: center; justify-content: space-between; }
        .user-name { font-size: 0.85rem; color: #fff; font-weight: 500; }
        .user-time { font-size: 0.6rem; color: #555; }
        .user-msg-row { display: flex; align-items: center; justify-content: space-between; margin-top: 2px; }
        .user-last-msg {
            font-size: 0.7rem; color: #666; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis; max-width: 180px;
        }
        .user-last-msg.unread-msg { color: #fff; font-weight: 500; }
        .unread-count {
            background: #FFFC00; color: #000; font-size: 0.6rem; font-weight: 700;
            min-width: 18px; height: 18px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        
        /* ===== CHAT VIEW ===== */
        .chat-view { display: none; flex-direction: column; flex: 1; min-height: 0; }
        .chat-view.show { display: flex; }
        .messages-container {
            flex: 1; overflow-y: auto; padding: 0.8rem;
            display: flex; flex-direction: column; gap: 0.2rem;
            background: #000;
        }
        .messages-container::-webkit-scrollbar { width: 0; }
        
        .message-wrapper {
            display: flex; max-width: 85%; animation: fadeInUp 0.25s;
        }
        .message-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
        .message-wrapper.received { align-self: flex-start; }
        .message-bubble {
            padding: 0.55rem 0.8rem; border-radius: 1.2rem;
            font-size: 0.85rem; line-height: 1.3; word-break: break-word;
        }
        .sent .message-bubble { background: #FFFC00; color: #000; border-bottom-right-radius: 0.3rem; }
        .received .message-bubble { background: #111; color: #fff; border-bottom-left-radius: 0.3rem; }
        .message-time { font-size: 0.55rem; margin-top: 0.1rem; }
        .sent .message-time { text-align: right; color: rgba(0,0,0,0.45); }
        .received .message-time { color: rgba(255,255,255,0.35); }
        .message-image { max-width: 200px; max-height: 200px; border-radius: 0.8rem; cursor: pointer; }
        .empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; color: #333; font-size: 0.8rem; }
        
        .settings-badge {
            font-size: 0.55rem; color: #f59e0b; margin-top: 0.2rem;
            display: flex; align-items: center; gap: 0.2rem;
        }
        .settings-options {
            display: flex; gap: 0.5rem; margin-top: 0.3rem;
        }
        .settings-opt-btn {
            padding: 0.2rem 0.6rem; border-radius: 1rem; border: none;
            font-size: 0.6rem; cursor: pointer; transition: all 0.2s;
        }
        .settings-opt-btn.lock-btn { background: rgba(255,252,0,0.15); color: #FFFC00; border: 1px solid rgba(255,252,0,0.2); }
        .settings-opt-btn.chat-btn { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .settings-opt-btn:active { transform: scale(0.95); }
        
        /* ===== TYPING ===== */
        #typingBubble {
            display: none; padding: 0.3rem 0.8rem; font-size: 0.7rem; color: #666;
        }
        #typingBubble.show { display: block; }
        #typingBubble .dot-typing {
            display: inline-block; width: 4px; height: 4px; border-radius: 50%;
            background: #666; margin: 0 1px; animation: dotTyping 1.4s infinite;
        }
        #typingBubble .dot-typing:nth-child(2) { animation-delay: 0.2s; }
        #typingBubble .dot-typing:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotTyping {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        
        /* ===== VOICE RECORDING ===== */
        #recordingBar {
            display: none; align-items: center; gap: 0.5rem;
            padding: 0.3rem 0.8rem; background: rgba(239,68,68,0.1);
            border-radius: 2rem; border: 1px solid rgba(239,68,68,0.2);
        }
        #recordingBar.show { display: flex; }
        #recordingBar .rec-dot {
            width: 8px; height: 8px; border-radius: 50%; background: #ef4444;
            animation: pulse 0.8s infinite;
        }
        #recordingBar .rec-time { font-size: 0.8rem; color: #ef4444; font-variant-numeric: tabular-nums; }
        #recordingBar .rec-cancel {
            background: none; border: none; color: #666; cursor: pointer; font-size: 1rem;
        }
        #recordingBar .rec-send {
            background: #FFFC00; border: none; color: #000; cursor: pointer;
            width: 30px; height: 30px; border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
        }
        
        /* ===== VOICE MESSAGE ===== */
        .voice-msg {
            display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
            min-width: 180px; max-width: 280px;
        }
        .voice-play-btn {
            width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.08);
            border: none; color: #fff; cursor: pointer; display: flex;
            align-items: center; justify-content: center; flex-shrink: 0;
        }
        .voice-wave-container {
            display: flex; align-items: center; gap: 2px; flex: 1; height: 30px;
        }
        .voice-wave-bar {
            width: 3px; background: #4ade80; border-radius: 2px;
            animation: waveAnim 1s ease-in-out infinite;
        }
        .voice-wave-bar:nth-child(odd) { animation-delay: 0.2s; }
        @keyframes waveAnim {
            0%, 100% { transform: scaleY(0.4); }
            50% { transform: scaleY(1); }
        }
        .voice-duration { font-size: 0.6rem; color: rgba(255,255,255,0.5); font-variant-numeric: tabular-nums; }
        
        /* ===== CHAT INPUT ===== */
        .chat-input-area {
            display: none; align-items: center; gap: 0.4rem;
            padding: 0.5rem 0.8rem; background: #000;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .chat-input-area.show { display: flex; }
        .camera-btn-s, .mic-btn-s {
            width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1); color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .chat-input {
            flex: 1; padding: 0.6rem 1rem; border-radius: 1.5rem;
            border: 1px solid rgba(255,255,255,0.12); background: #0a0a0a;
            color: #fff; font-size: 0.85rem; outline: none; min-width: 0;
        }
        .chat-input:focus { border-color: #FFFC00; }
        .send-btn {
            width: 38px; height: 38px; border-radius: 50%; background: #FFFC00;
            border: none; color: #000; cursor: pointer;
            display: flex; align-items: center; justify-content: center; flex-shrink: 0;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ===== FAB ===== */
        .fab-container {
            position: fixed; bottom: 85px; right: 20px; z-index: 100;
        }
        .fab-main {
            width: 56px; height: 56px; border-radius: 50%; background: #FFFC00;
            color: #000; border: none; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 4px 15px rgba(255,252,0,0.3);
            transition: all 0.3s ease; position: relative;
        }
        .fab-main:active { transform: scale(0.9); }
        .fab-main .badge {
            position: absolute; top: -5px; right: -5px; background: #ef4444;
            color: #fff; font-size: 0.55rem; font-weight: 700; min-width: 20px; height: 20px;
            border-radius: 10px; display: none; align-items: center; justify-content: center;
            border: 2px solid #000;
        }
        .fab-main .badge.show { display: flex; }
        
        /* ===== NEW CHAT OVERLAY ===== */
        .new-chat-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(20px);
            z-index: 200; display: none; align-items: center; justify-content: center;
            padding: 1rem;
        }
        .new-chat-overlay.show { display: flex; }
        .new-chat-modal {
            background: rgba(20,20,20,0.95); border-radius: 1.5rem;
            width: 100%; max-width: 400px; max-height: 80vh;
            display: flex; flex-direction: column; border: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
        }
        .new-chat-header {
            padding: 0.8rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: space-between;
        }
        .new-chat-header h3 { color: #fff; font-size: 0.9rem; font-weight: 600; }
        .new-chat-header .close-btn {
            color: #666; cursor: pointer; font-size: 1.2rem;
            background: none; border: none; transition: color 0.2s;
        }
        .new-chat-header .close-btn:hover { color: #fff; }
        
        .new-chat-tabs {
            display: flex; border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .new-chat-tab {
            flex: 1; text-align: center; padding: 0.6rem;
            color: rgba(255,255,255,0.4); font-size: 0.75rem; font-weight: 600;
            cursor: pointer; border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .new-chat-tab.active { color: #fff; border-bottom-color: #FFFC00; }
        .new-chat-tab .tab-badge {
            background: #ef4444; color: #fff; font-size: 0.5rem;
            border-radius: 10px; padding: 0.05rem 0.4rem; margin-left: 0.3rem;
        }
        
        .new-chat-search {
            padding: 0.6rem 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .new-chat-search input {
            width: 100%; padding: 0.4rem 0.8rem; border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.05);
            color: #fff; font-size: 0.75rem; outline: none;
        }
        .new-chat-search input:focus { border-color: #FFFC00; }
        .new-chat-search input::placeholder { color: #555; }
        
        .new-chat-list {
            flex: 1; overflow-y: auto; padding: 0.3rem 0;
        }
        .new-chat-item {
            display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem 1rem;
            cursor: pointer; transition: background 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .new-chat-item:active { background: rgba(255,255,255,0.05); }
        .new-chat-avatar {
            width: 40px; height: 40px; border-radius: 50%; background: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.9rem; font-weight: 600; color: #fff; overflow: hidden; flex-shrink: 0;
        }
        .new-chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .new-chat-info { flex: 1; min-width: 0; }
        .new-chat-name { font-size: 0.8rem; font-weight: 600; color: #fff; }
        .new-chat-name .new-badge {
            background: #f59e0b; color: #000; font-size: 0.5rem;
            padding: 0.05rem 0.4rem; border-radius: 0.5rem; margin-left: 0.3rem;
        }
        .new-chat-sub { font-size: 0.6rem; color: rgba(255,255,255,0.4); }
        .new-chat-actions { display: flex; gap: 0.3rem; flex-shrink: 0; }
        .new-chat-action {
            padding: 0.25rem 0.8rem; border-radius: 1.5rem; font-size: 0.6rem;
            font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s; background: rgba(255,255,255,0.05); color: #fff;
        }
        .new-chat-action:active { transform: scale(0.95); }
        .new-chat-action.accept { background: rgba(74,222,128,0.15); border-color: rgba(74,222,128,0.3); color: #4ade80; }
        .new-chat-action.decline { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.3); color: #ef4444; }
        .new-chat-action.chat { background: rgba(255,252,0,0.15); border-color: rgba(255,252,0,0.3); color: #FFFC00; }
        .new-chat-action.request-btn { background: rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.3); color: #60a5fa; }
        .requested-label { font-size: 0.6rem; color: #666; padding: 0.25rem 0.5rem; }
        
        /* ===== CALL OVERLAY ===== */
        .call-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95); z-index: 300;
            display: none; align-items: center; justify-content: center;
            flex-direction: column; padding: 2rem;
        }
        .call-overlay.show { display: flex; }
        .call-avatar {
            width: 120px; height: 120px; border-radius: 50%; background: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 600; color: #fff; margin-bottom: 1.5rem;
            border: 2px solid rgba(255,255,255,0.1); overflow: hidden;
        }
        .call-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .call-name { color: #fff; font-size: 1.5rem; font-weight: 600; margin-bottom: 0.3rem; }
        .call-status { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 1.5rem; }
        .call-timer { color: #fff; font-size: 1.2rem; margin-bottom: 2rem; font-variant-numeric: tabular-nums; }
        .call-actions { display: flex; gap: 2rem; }
        .call-action-btn {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; transition: all 0.2s;
        }
        .call-action-btn:active { transform: scale(0.9); }
        .call-action-btn.end-call { background: #ef4444; color: #fff; }
        .call-action-btn.mute-call { background: rgba(255,255,255,0.1); color: #fff; }
        .call-action-btn.mute-call.muted { background: #ef4444; color: #fff; }
        .call-action-btn.video-call { background: rgba(255,255,255,0.1); color: #fff; }
        .call-action-btn.video-call.off { background: #ef4444; color: #fff; }
        .call-action-btn.flip-call { background: rgba(255,255,255,0.1); color: #fff; font-size: 1rem; width: 48px; height: 48px; }
        
        .call-videos {
            position: relative; width: 100%; max-width: 500px; aspect-ratio: 16/9;
            background: #0a0a0a; border-radius: 1rem; overflow: hidden; margin-bottom: 1.5rem;
        }
        .call-videos video {
            position: absolute; width: 100%; height: 100%; object-fit: cover;
        }
        .call-videos #callRemoteVideo { z-index: 1; }
        .call-videos #callLocalVideo {
            z-index: 2; width: 120px; height: 160px; bottom: 10px; right: 10px;
            border-radius: 0.5rem; border: 2px solid rgba(255,255,255,0.2);
            object-fit: cover; background: #111;
        }
        
        /* ===== INCOMING CALL ===== */
        .incoming-call-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px);
            z-index: 250; display: none; align-items: center; justify-content: center;
            flex-direction: column; padding: 2rem;
        }
        .incoming-call-overlay.show { display: flex; }
        .incoming-call-overlay .incoming-avatar {
            width: 120px; height: 120px; border-radius: 50%; background: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 600; color: #fff; margin-bottom: 1.5rem;
            overflow: hidden; border: 2px solid rgba(255,255,255,0.1);
        }
        .incoming-call-overlay .incoming-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .incoming-call-overlay .incoming-name { color: #fff; font-size: 1.5rem; font-weight: 600; margin-bottom: 0.3rem; }
        .incoming-call-overlay .incoming-type { color: rgba(255,255,255,0.5); font-size: 0.9rem; margin-bottom: 2rem; }
        .incoming-call-overlay .incoming-actions { display: flex; gap: 2rem; }
        .incoming-call-overlay .incoming-action-btn {
            width: 60px; height: 60px; border-radius: 50%; border: none;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; cursor: pointer; transition: all 0.2s;
        }
        .incoming-call-overlay .incoming-action-btn:active { transform: scale(0.9); }
        .incoming-call-overlay .incoming-action-btn.accept-call { background: #4ade80; color: #000; }
        .incoming-call-overlay .incoming-action-btn.reject-call { background: #ef4444; color: #fff; }
        
        /* ===== LOCK OPTIONS ===== */
        .lock-options-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;

    <script type="module">
        // ===== FIREBASE IMPORTS =====
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, doc, setDoc, getDoc, getDocs, updateDoc, 
            increment, deleteDoc, arrayUnion, where, runTransaction 
        } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        
        // ===== FIREBASE CONFIG =====
        const app = initializeApp({
            apiKey: "AIzaSyC2JA1K-fvsPUkWUfvSFhkC-ET8dpPOr0M",
            authDomain: "mychat-a97bf.firebaseapp.com",
            projectId: "mychat-a97bf"
        });
        const db = getFirestore(app);
        
        // ===== SECURE AUTH CHECK =====
        if (!sessionStorage.getItem("uid")) {
            window.location.replace("login.html");
        }
        
        // ===== SANITIZATION FUNCTIONS =====
        function sanitizeInput(input) {
            if (!input) return '';
            return String(input)
                .replace(/[<>]/g, '')
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#x27;')
                .replace(/\//g, '&#x2F;')
                .slice(0, 5000);
        }
        
        function sanitizeMessage(text) {
            if (!text) return '';
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#x27;')
                .replace(/\//g, '&#x2F;')
                .slice(0, 5000);
        }
        
        function isValidUsername(username) {
            if (!username) return false;
            return /^[a-zA-Z0-9_@]+$/.test(username);
        }
        
        function isValidMessage(text) {
            if (!text) return false;
            const clean = sanitizeInput(text);
            return clean.length > 0 && clean.length <= 5000;
        }
        
        // ===== USER STATE =====
        const currentUser = sanitizeInput(sessionStorage.getItem('currentUser') || '@anonymous');
        const currentUserId = sanitizeInput(currentUser.replace('@', ''));
        
        // ===== STATE VARIABLES =====
        let chatPartner = null, chatId = null, unsubMessages = null, unsubChatList = null;
        let allUsersList = [], chatListData = [], userProfiles = {};
        let mediaRecorder = null, audioChunks = [], voiceTimer = null, voiceSeconds = 0, isRecording = false;
        let localStream = null, peerConnection = null, callUnsub = null, callDocRef = null;
        let isCallActive = false, isCaller = false, callType = 'audio', isMuted = false, isVideoOff = false, currentCamera = 'user';
        let newChatActiveTab = 'users', messageRequests = [], lockOptionsUser = null, lockOptionsMsgId = null;
        let unsubRequests = null;
        
        // ===== ICE SERVERS =====
        const PROPER_ICE_SERVERS = [
            { urls: "stun:stun.l.google.com:19302" },
            { urls: "stun:stun1.l.google.com:19302" },
            { urls: "stun:stun2.l.google.com:19302" },
            { urls: "stun:stun3.l.google.com:19302" },
            { urls: "stun:stun4.l.google.com:19302" },
            { 
                urls: "turn:standard.relay.metered.ca:80", 
                username: "a6b2ebd89a4174b7f3843634", 
                credential: "xyEoZGCCUl7ZAQ4h" 
            },
            { 
                urls: "turn:standard.relay.metered.ca:443", 
                username: "a6b2ebd89a4174b7f3843634", 
                credential: "xyEoZGCCUl7ZAQ4h" 
            }
        ];
        
        // ===== UTILITY FUNCTIONS =====
        function cleanName(u) {
            if (!u) return '';
            return sanitizeInput(u.replace(/^@/, ''));
        }
        
        function formatDuration(s) {
            const m = Math.floor(s / 60);
            const sec = Math.floor(s % 60);
            return String(m).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
        }
        
        function avatarHTML(u) {
            const p = userProfiles[u];
            if (p && p.avatar && p.avatar !== 'null' && p.avatar !== 'undefined') {
                return `<img src="${p.avatar}" alt="" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='${sanitizeInput(cleanName(u).charAt(0).toUpperCase())}';">`;
            }
            return sanitizeInput(cleanName(u).charAt(0).toUpperCase());
        }
        
        function dispName(u) {
            const p = userProfiles[u];
            return p ? sanitizeInput(p.name) : sanitizeInput(cleanName(u));
        }
        
        function fmtTime(d) {
            if (!d || d.getTime() === 0) return '';
            const n = new Date();
            const df = n - d;
            if (df < 60000) return 'Now';
            if (df < 3600000) return Math.floor(df / 60000) + 'm';
            if (d.toDateString() === n.toDateString()) {
                return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }
            if (n - d < 604800000) {
                return ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
            }
            return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
        }
        
        function scrollToBottom() {
            const c = document.getElementById('messagesContainer');
            setTimeout(() => { if (c) c.scrollTop = c.scrollHeight; }, 100);
        }
        
        function showToast(msg) {
            const sanitizedMsg = sanitizeInput(msg);
            const t = document.getElementById('toast');
            t.textContent = sanitizedMsg;
            t.classList.add('show');
            clearTimeout(t._timeout);
            t._timeout = setTimeout(() => t.classList.remove('show'), 2500);
        }
        
        // ===== PEER CONNECTION =====
        async function createPeerConnection() {
            if (peerConnection) { peerConnection.close(); peerConnection = null; }
            
            peerConnection = new RTCPeerConnection({ 
                iceServers: PROPER_ICE_SERVERS, 
                iceCandidatePoolSize: 10 
            });
            
            peerConnection.ontrack = (event) => { 
                if (event.streams[0]) {
                    document.getElementById('callRemoteVideo').srcObject = event.streams[0]; 
                }
            };
            
            peerConnection.onicecandidate = async (event) => {
                if (event.candidate && callDocRef) {
                    const field = isCaller ? 'callerCandidates' : 'calleeCandidates';
                    try {
                        await updateDoc(callDocRef, { [field]: arrayUnion(event.candidate.toJSON()) });
                    } catch (e) { /* ignore */ }
                }
            };
            
            peerConnection.oniceconnectionstatechange = () => {
                if (peerConnection.iceConnectionState === 'connected') {
                    document.getElementById('callStatus').innerHTML = 'Connected ✓';
                } else if (peerConnection.iceConnectionState === 'failed') { 
                    endCall(); 
                    showToast("Connection failed");
                }
            };
            
            return peerConnection;
        }
        
        // ===== FLIP CAMERA =====
        window.flipCamera = async function() {
            if (!localStream || callType !== 'video' || isVideoOff) return;
            const videoTrack = localStream.getVideoTracks()[0];
            if (!videoTrack) return;
            
            currentCamera = currentCamera === 'user' ? 'environment' : 'user';
            const newConstraints = { video: { facingMode: { exact: currentCamera } }, audio: true };
            
            try {
                const newStream = await navigator.mediaDevices.getUserMedia(newConstraints);
                const newVideoTrack = newStream.getVideoTracks()[0];
                const oldVideoTrack = videoTrack;
                localStream.removeTrack(oldVideoTrack);
                localStream.addTrack(newVideoTrack);
                oldVideoTrack.stop();
                const senders = peerConnection.getSenders();
                const videoSender = senders.find(s => s.track && s.track.kind === 'video');
                if (videoSender) await videoSender.replaceTrack(newVideoTrack);
                document.getElementById('callLocalVideo').srcObject = localStream;
            } catch(e) { 
                showToast("Camera switch failed");
            }
        };
        
        // ===== INIT =====
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('mainPage').style.display = 'flex';
        loadAllUsers();
        setupRealtimeChatList();
        listenForIncomingCalls();
        listenForMessageRequests();
        
        // ===== LISTEN FOR MESSAGE REQUESTS =====
        function listenForMessageRequests() {
            if (unsubRequests) { unsubRequests(); unsubRequests = null; }
            
            const q = query(collection(db, 'message_requests'), orderBy('createdAt', 'desc'));
            unsubRequests = onSnapshot(q, (snap) => {
                messageRequests = [];
                snap.forEach(doc => {
                    const d = doc.data();
                    if (d.to === currentUserId || d.to === currentUser || d.to === currentUser.replace('@','')) {
                        messageRequests.push({ id: doc.id, ...d });
                    }
                });
                updateRequestBadge();
                if (document.getElementById('newChatOverlay').classList.contains('show') && newChatActiveTab === 'requests') {
                    renderNewChatRequests(messageRequests);
                }
            });
        }
        
        function updateRequestBadge() {
            const badge = document.getElementById('requestBadge');
            const tabBadge = document.getElementById('requestTabBadge');
            if (messageRequests.length > 0) {
                badge.className = 'badge show';
                badge.textContent = messageRequests.length;
                tabBadge.style.display = 'inline';
                tabBadge.textContent = messageRequests.length;
            } else {
                badge.className = 'badge';
                badge.textContent = '';
                tabBadge.style.display = 'none';
            }
        }
        
        // ===== LOAD ALL USERS =====
        async function loadAllUsers() {
            allUsersList = [];
            userProfiles = {};
            
            try {
                const q = query(collection(db, 'users'), orderBy('createdAt', 'desc'));
                const snap = await getDocs(q);
                snap.forEach(doc => {
                    const d = doc.data();
                    if (d.username && d.username !== currentUser) {
                        const clean = sanitizeInput(cleanName(d.username));
                        allUsersList.push({
                            username: sanitizeInput(d.username),
                            displayName: clean,
                            avatar: d.avatar || null,
                            createdAt: d.createdAt?.toDate?.() || d.updatedAt?.toDate?.() || new Date(0)
                        });
                        userProfiles[d.username] = { name: clean, avatar: d.avatar || null };
                    }
                });
            } catch(e) { /* ignore */ }
            
            try {
                const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
                [...(profile.friends || []), ...(profile.besties || [])].forEach(f => {
                    const u = f.name;
                    if (u && u !== currentUser && isValidUsername(u)) {
                        if (!allUsersList.find(x => x.username === u)) {
                            allUsersList.push({
                                username: sanitizeInput(u),
                                displayName: sanitizeInput(cleanName(u)),
                                avatar: f.avatar || null,
                                createdAt: new Date(0)
                            });
                        }
                        if (!userProfiles[u]) {
                            userProfiles[u] = { name: sanitizeInput(cleanName(u)), avatar: f.avatar || null };
                        }
                        if (f.avatar) userProfiles[u].avatar = f.avatar;
                    }
                });
            } catch(e) { /* ignore */ }
            
            allUsersList.sort((a, b) => {
                const aT = a.createdAt?.getTime?.() || 0;
                const bT = b.createdAt?.getTime?.() || 0;
                if (aT !== bT) return bT - aT;
                return a.displayName.localeCompare(b.displayName);
            });
        }
        
        // ===== NEW CHAT MODAL =====
        window.showNewChatModal = function() {
            document.getElementById('newChatOverlay').classList.add('show');
            document.getElementById('newChatSearchInput').value = '';
            switchNewChatTab('users', document.querySelector('.new-chat-tab'));
            renderNewChatUsers(allUsersList);
        };
        
        window.closeNewChatModal = function() {
            document.getElementById('newChatOverlay').classList.remove('show');
        };
        
        window.switchNewChatTab = function(tab, el) {
            newChatActiveTab = sanitizeInput(tab);
            document.querySelectorAll('.new-chat-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            
            if (tab === 'users') {
                document.getElementById('newChatSearchInput').placeholder = '🔍 Search users...';
                renderNewChatUsers(allUsersList);
            } else {
                document.getElementById('newChatSearchInput').placeholder = '🔍 Search requests...';
                renderNewChatRequests(messageRequests);
            }
        };
        
        window.filterNewChatList = function() {
            const s = sanitizeInput(document.getElementById('newChatSearchInput').value.toLowerCase());
            if (newChatActiveTab === 'users') {
                renderNewChatUsers(allUsersList.filter(u => u.displayName.toLowerCase().includes(s)));
            } else {
                renderNewChatRequests(messageRequests.filter(r => 
                    (r.fromName || r.from || '').toLowerCase().includes(s)
                ));
            }
        };
        
        function isNewUser(user) {
            if (!user.createdAt || user.createdAt.getTime() === 0) return false;
            return (new Date() - user.createdAt) < 7 * 24 * 60 * 60 * 1000;
        }
        
        function renderNewChatUsers(users) {

                    if (!chatSnap.exists()) {
                        transaction.set(chatRef, {
                            users: [currentUserId, partnerClean],
                            lastMessage: '👋 Chat started!',
                            lastType: 'text',
                            lastTime: serverTimestamp(),

                    text: '👋 Chat started! Say hello!',

                    createdAt: serverTimestamp(),
                    seen: false
                });

        window.playVoice = function(el) {
            const audioUrl = el.getAttribute('data-audio');
            const btn = el.querySelector('.voice-play-btn i');
            const ds = el.querySelector('.voice-duration');
            const td = parseFloat(el.getAttribute('data-duration') || '0');
            
            document.querySelectorAll('.voice-msg').forEach(m => {
                if (m !== el && m._audio) {
                    m._audio.pause();
                    const ob = m.querySelector('.voice-play-btn i');
                    if (ob) ob.className = 'fas fa-play';
                    const od = m.querySelector('.voice-duration');
                    if (od && m._totalDur) od.textContent = '0:00 / ' + formatDuration(m._totalDur);
                }
            });
            
            if (!el._audio) {
                el._audio = new Audio(audioUrl);
                el._totalDur = td;
                if (ds) ds.textContent = '0:00 / ' + formatDuration(td);
                
                el._audio.ontimeupdate = () => {
                    if (ds && el._audio && el._totalDur) {
                        ds.textContent = formatDuration(el._audio.currentTime) + ' / ' + formatDuration(el._totalDur);
                    }
                };
                
                el._audio.onended = () => {
                    btn.className = 'fas fa-play';
                    if (ds && el._totalDur) ds.textContent = '0:00 / ' + formatDuration(el._totalDur);
                };
            }
            
            const audio = el._audio;
            if (audio.paused) {
                audio.play().catch(() => {});
                btn.className = 'fas fa-pause';
            } else {
                audio.pause();
                btn.className = 'fas fa-play';
                if (ds && el._totalDur) ds.textContent = formatDuration(audio.currentTime) + ' / ' + formatDuration(el._totalDur);
            }
        };

        async function startVoice() {
            if (!chatId) return;
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
                });
                
                const opts = { audioBitsPerSecond: 128000 };
                if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) {
                    opts.mimeType = 'audio/webm;codecs=opus';
                } else {
                    opts.mimeType = 'audio/webm';
                }
                
                mediaRecorder = new MediaRecorder(stream, opts);
                audioChunks = [];
                
                mediaRecorder.ondataavailable = e => {
                    if (e.data.size > 0) audioChunks.push(e.data);
                };
                
                mediaRecorder.onstop = () => {
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start(100);
                isRecording = true;
                voiceSeconds = 0;
                
                document.getElementById('recordingBar').classList.add('show');
                document.getElementById('micBtn').style.display = 'none';
                document.getElementById('sendBtn').style.display = 'none';
                document.getElementById('chatInput').style.display = 'none';
                document.getElementById('recTime').textContent = '00:00';
                
                voiceTimer = setInterval(() => {
                    voiceSeconds++;
                    document.getElementById('recTime').textContent = formatDuration(voiceSeconds);
                }, 1000);
                
            } catch(e) {
                showToast('Microphone access denied');
                console.warn(e);
            }
        }
        
        function stopVoice(c) {
            if (mediaRecorder && isRecording) {
                if (c) audioChunks = [];
                if (mediaRecorder.state === 'recording') mediaRecorder.stop();
                isRecording = false;
                clearInterval(voiceTimer);
                document.getElementById('recordingBar').classList.remove('show');
                document.getElementById('micBtn').style.display = 'flex';
                document.getElementById('sendBtn').style.display = 'flex';
                document.getElementById('chatInput').style.display = 'block';
            }
        }
        
        window.cancelVoice = function() {
            stopVoice(true);
        };
        
        window.sendVoice = async function() {
            if (!mediaRecorder || !isRecording) return;
            if (voiceSeconds < 1) {
                stopVoice(true);
                return;
            }
            
            mediaRecorder.onstop = async () => {
                const mimeType = mediaRecorder.mimeType || 'audio/webm';
                const blob = new Blob(audioChunks, { type: mimeType });
                
                if (blob.size > 1024 * 1024) {
                    showToast('Voice message too large');
                    return;
                }
                
                const reader = new FileReader();
                reader.onload = async function(e) {
                    try {
                        await ensureChatDoc();
                        await addDoc(collection(db, 'chats', chatId, 'messages'), {
                            audioUrl: e.target.result,
                            audioDuration: voiceSeconds,
                            audioMime: mimeType,
                            sender: currentUserId,
                            createdAt: serverTimestamp(),
                            seen: false
                        });
                        await updateDoc(doc(db, 'chats', chatId), {
                            lastMessage: '🎤 Voice message',
                            lastType: 'audio',
                            lastTime: serverTimestamp(),
                            ['unread_' + chatPartner.replace('@', '')]: increment(1)
                        });
                    } catch(err) {
                        showToast('Failed to send voice');
                        console.warn(err);
                    }
                };
                reader.readAsDataURL(blob);
            };
            
            mediaRecorder.stop();
            isRecording = false;
            clearInterval(voiceTimer);
            document.getElementById('recordingBar').classList.remove('show');
            document.getElementById('micBtn').style.display = 'flex';
            document.getElementById('sendBtn').style.display = 'flex';
            document.getElementById('chatInput').style.display = 'block';
        };
        
        // ===== TYPING INDICATOR =====
        function listenToTyping() {
            const pid = chatPartner.replace('@', '');
            onSnapshot(doc(db, 'chats', chatId, 'typing', pid), snap => {
                const d = snap.data();
                const st = document.getElementById('partnerStatus');
                const tb = document.getElementById('typingBubble');
                if (d && d.typing) {
                    st.innerHTML = '<span class="dot"></span> typing...';
                    tb.classList.add('show');
                } else {
                    st.innerHTML = '<span class="dot"></span> online';
                    tb.classList.remove('show');
                }
            });
        }
        
        let typingTimeout;
        document.getElementById('chatInput').addEventListener('input', function() {
            if (!chatId) return;
            setDoc(doc(db, 'chats', chatId, 'typing', currentUserId), {
                typing: true,
                updatedAt: serverTimestamp()
            });
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                setDoc(doc(db, 'chats', chatId, 'typing', currentUserId), {
                    typing: false,
                    updatedAt: serverTimestamp()
                });
            }, 2000);
        });
        
        document.getElementById('chatInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        // ===== CALL FUNCTIONS =====
        window.startCall = async function(type) {
            if (!chatPartner || isCallActive) return;
            if (!isValidUsername(chatPartner)) {
                showToast('Invalid user');
                return;
            }
            
            callType = type;
            isCaller = true;
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: type === 'video'
                });
                
                document.getElementById('callLocalVideo').srcObject = localStream;
                document.getElementById('callLocalVideo').style.display = type === 'video' ? 'block' : 'none';
                document.getElementById('callFlipBtn').style.display = type === 'video' ? 'flex' : 'none';
                document.getElementById('callVideos').style.display = type === 'video' ? 'block' : 'none';
                document.getElementById('callAvatar').style.display = type === 'video' ? 'none' : 'flex';
                document.getElementById('callOverlay').classList.add('show');
                document.getElementById('callStatus').textContent = 'Calling...';
                document.getElementById('callVideoBtn').style.display = type === 'video' ? 'flex' : 'none';
                
                const callId = [currentUserId, chatPartner.replace('@', '')].sort().join('_') + '_' + Date.now();
                callDocRef = doc(db, 'calls', callId);
                
                await createPeerConnection();
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);
                
                await setDoc(callDocRef, {
                    caller: currentUserId,
                    callee: chatPartner.replace('@', ''),
                    type: type,
                    status: 'ringing',
                    offer: { type: offer.type, sdp: offer.sdp },
                    createdAt: serverTimestamp(),
                    callerCandidates: [],
                    calleeCandidates: []
                });
                
                callUnsub = onSnapshot(callDocRef, async (snap) => {
                    const data = snap.data();
                    if (!data) return;
                    
                    if (data.status === 'rejected' || data.status === 'ended') {
                        endCall();
                        showToast('Call ended');
                        return;
                    }
                    
                    if (data.status === 'accepted' && data.answer && !peerConnection.currentRemoteDescription) {
                        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                        document.getElementById('callStatus').textContent = 'Connected ✓';
                    }
                    
                    if (data.calleeCandidates && peerConnection.remoteDescription) {
                        for (let cand of data.calleeCandidates) {
                            try { await peerConnection.addIceCandidate(new RTCIceCandidate(cand)); } catch(e) {}
                        }
                    }
                });
                
                isCallActive = true;
                document.getElementById('callName').textContent = sanitizeInput(dispName(chatPartner));
            } catch(e) {
                showToast('Camera/Microphone permission needed');
                endCall();
            }
        };
        
        window.acceptCall = async function() {
            document.getElementById('incomingCallOverlay').classList.remove('show');
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    audio: true,
                    video: callType === 'video'
                });
                
                document.getElementById('callLocalVideo').srcObject = localStream;
                document.getElementById('callLocalVideo').style.display = callType === 'video' ? 'block' : 'none';
                document.getElementById('callFlipBtn').style.display = callType === 'video' ? 'flex' : 'none';
                document.getElementById('callVideos').style.display = callType === 'video' ? 'block' : 'none';
                document.getElementById('callAvatar').style.display = callType === 'video' ? 'none' : 'flex';
                document.getElementById('callOverlay').classList.add('show');
                document.getElementById('callStatus').textContent = 'Connecting...';
                document.getElementById('callVideoBtn').style.display = callType === 'video' ? 'flex' : 'none';
                
                await createPeerConnection();
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
                
                const snap = await getDoc(callDocRef);
                const data = snap.data();
                
                if (data && data.offer) {
                    await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                    const answer = await peerConnection.createAnswer();
                    await peerConnection.setLocalDescription(answer);
                    await updateDoc(callDocRef, {
                        answer: { type: answer.type, sdp: answer.sdp },
                        status: 'accepted'
                    });
                }
                
                if (data.callerCandidates) {
                    for (let cand of data.callerCandidates) {
                        try { await peerConnection.addIceCandidate(new RTCIceCandidate(cand)); } catch(e) {}
                    }
                }
                
                callUnsub = onSnapshot(callDocRef, async (snap) => {
                    const d = snap.data();
                    if (!d) return;
                    if (d.callerCandidates && peerConnection.remoteDescription) {
                        for (let cand of d.callerCandidates) {
                            try { await peerConnection.addIceCandidate(new RTCIceCandidate(cand)); } catch(e) {}
                        }
                    }
                });
                
                document.getElementById('callStatus').textContent = 'Connected ✓';
                isCallActive = true;
                document.getElementById('callName').textContent = sanitizeInput(dispName(chatPartner));
            } catch(e) {
                console.warn(e);
                endCall();
            }
        };
        
        window.rejectCall = function() {
            if (callDocRef) {
                updateDoc(callDocRef, { status: 'rejected' }).catch(() => {});
            }
            document.getElementById('incomingCallOverlay').classList.remove('show');
            endCall();
        };
        
        window.endCall = function() {
            if (localStream) {
                localStream.getTracks().forEach(t => t.stop());
                localStream = null;
            }
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            if (callUnsub) {
                callUnsub();
                callUnsub = null;
            }
            if (callDocRef) {
                updateDoc(callDocRef, { status: 'ended' }).catch(() => {});
                deleteDoc(callDocRef).catch(() => {});
            }
            document.getElementById('callOverlay').classList.remove('show');
            document.getElementById('incomingCallOverlay').classList.remove('show');
            document.getElementById('callRemoteVideo').srcObject = null;
            document.getElementById('callLocalVideo').srcObject = null;
            isCallActive = false;
            isCaller = false;
            callDocRef = null;
            isMuted = false;
            isVideoOff = false;
            document.getElementById('callMuteBtn').classList.remove('muted');
            document.getElementById('callVideoBtn').classList.remove('off');
            document.getElementById('callVideos').style.display = 'none';
            document.getElementById('callAvatar').style.display = 'flex';
            document.getElementById('callTimer').textContent = '00:00';
            clearInterval(callTimerInterval);
        };
        
        let callTimerInterval = null;
        
        function startCallTimer() {
            let seconds = 0;
            clearInterval(callTimerInterval);
            callTimerInterval = setInterval(() => {
                seconds++;
                const m = Math.floor(seconds / 60);
                const s = seconds % 60;
                document.getElementById('callTimer').textContent = 
                    String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
            }, 1000);
        }
        
        window.toggleCallMute = function() {
            if (!localStream) return;
            isMuted = !isMuted;
            localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
            document.getElementById('callMuteBtn').classList.toggle('muted', isMuted);
        };
        
        window.toggleCallVideo = function() {
            if (!localStream || callType !== 'video') return;
            isVideoOff = !isVideoOff;
            localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
            document.getElementById('callVideoBtn').classList.toggle('off', isVideoOff);
            document.getElementById('callLocalVideo').style.display = isVideoOff ? 'none' : 'block';
            document.getElementById('callFlipBtn').style.display = isVideoOff ? 'none' : 'flex';
        };
        
        function listenForIncomingCalls() {
            const q = query(collection(db, 'calls'), orderBy('createdAt', 'desc'));
            onSnapshot(q, (snap) => {
                snap.docChanges().forEach(async (change) => {
                    if (change.type === 'added') {
                        const data = change.doc.data();
                        if (data.callee === currentUserId && data.status === 'ringing' && !isCallActive) {
                            callDocRef = doc(db, 'calls', change.doc.id);
                            showIncomingCall(data);
                        }
                    }
                    if (change.type === 'modified' && callDocRef && change.doc.id === callDocRef.id) {
                        const data = change.doc.data();
                        if (data.status === 'rejected' || data.status === 'ended') {
                            endCall();
                        }
                    }
                });
            });
        }
        
        function showIncomingCall(data) {
            callType = data.type || 'audio';
            isCaller = false;
            document.getElementById('incomingName').textContent = sanitizeInput(dispName('@' + data.caller));
            document.getElementById('incomingType').innerHTML = `<i class="fas ${callType === 'audio' ? 'fa-phone' : 'fa-video'}"></i> Incoming ${callType} call...`;
            document.getElementById('incomingAvatar').innerHTML = avatarHTML('@' + data.caller);
            document.getElementById('incomingCallOverlay').classList.add('show');
        }
        
        window.addEventListener('beforeunload', () => {
            if (isCallActive) endCall();
        });
    </script>
</body>
</html>
