<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat · Choicho</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="CSS/main.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    .page {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      position: relative;
    }
    
    .scrollable-content {
      width: 100%;
      max-width: 100%;
      padding-bottom: 80px;
    }
    
    .chat-header {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 1rem;
      background: #000;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      width: 100%;
    }
    .chat-header.show { display: flex; }
    .chat-back {
      width: 2.4rem;
      height: 2.4rem;
      background: #1a1a1a;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #333;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chat-partner-info {
      flex: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chat-partner-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-partner-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .chat-partner-details {
      flex: 1;
      min-width: 0;
    }
    .chat-partner-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }
    .chat-partner-status {
      font-size: 0.65rem;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .chat-partner-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
    }
    .call-btns {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .call-btn {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .call-btn:active { transform: scale(0.95); }
    
    .chat-settings-btn {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .chat-settings-btn:active { transform: scale(0.95); }
    
    .search-bar-container {
      padding: 0.3rem 1rem 0.4rem;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      width: 100vw;
      max-width: 100vw;
      margin-left: 0;
      margin-right: 0;
      box-sizing: border-box;
      display: block;
      position: relative;
      left: 0;
      right: 0;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: #111;
      border-radius: 2rem;
      padding: 0.2rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.08);
      transition: border 0.25s, background 0.25s;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      min-height: 36px;
    }
    .search-bar:focus-within {
      border-color: #FFFC00;
      background: #0a0a0a;
      box-shadow: 0 0 0 3px rgba(255,252,0,0.08);
    }
    .search-bar i {
      color: #666;
      margin-right: 0.5rem;
      font-size: 0.75rem;
      transition: color 0.25s;
      flex-shrink: 0;
    }
    .search-bar:focus-within i {
      color: #FFFC00;
    }
    .search-bar input {
      background: transparent;
      border: none;
      color: #fff;
      padding: 0.3rem 0;
      width: 100%;
      min-width: 0;
      font-size: 0.75rem;
      outline: none;
      font-weight: 400;
      letter-spacing: 0.2px;
      box-sizing: border-box;
    }
    .search-bar input::placeholder {
      color: #555;
      font-weight: 300;
      letter-spacing: 0.2px;
      font-size: 0.75rem;
    }
    .search-bar input::-webkit-search-cancel-button {
      -webkit-appearance: none;
      appearance: none;
    }
    
    .chat-list-full {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      width: 100%;
    }
    .chat-list-full.hidden { display: none; }
    .chat-list-header {
      padding: 0.5rem 1rem;
      font-size: 0.6rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .user-list-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      transition: background 0.2s;
      width: 100%;
    }
    .user-list-item:active { background: rgba(255,255,255,0.03); }
    .user-list-item.active { background: rgba(255,252,0,0.06); }
    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-info {
      flex: 1;
      min-width: 0;
    }
    .user-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-name {
      font-size: 0.85rem;
      color: #fff;
      font-weight: 500;
    }
    .user-time {
      font-size: 0.6rem;
      color: #555;
    }
    .user-msg-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
    }
    .user-last-msg {
      font-size: 0.7rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .user-last-msg.unread-msg {
      color: #fff;
      font-weight: 500;
    }
    .unread-count {
      background: #FFFC00;
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    .chat-view.show { display: flex; }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: #000;
      width: 100%;
    }
    .messages-container::-webkit-scrollbar { width: 0; }
    .message-wrapper {
      display: flex;
      max-width: 85%;
      animation: fadeInUp 0.25s;
    }
    .message-wrapper.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message-wrapper.received {
      align-self: flex-start;
    }
    .message-bubble {
      padding: 0.55rem 0.8rem;
      border-radius: 1.2rem;
      font-size: 0.85rem;
      line-height: 1.3;
      word-break: break-word;
    }
    .sent .message-bubble {
      background: #FFFC00;
      color: #000;
      border-bottom-right-radius: 0.3rem;
    }
    .received .message-bubble {
      background: #111;
      color: #fff;
      border-bottom-left-radius: 0.3rem;
    }
    .message-time {
      font-size: 0.55rem;
      margin-top: 0.1rem;
    }
    .sent .message-time {
      text-align: right;
      color: rgba(0,0,0,0.45);
    }
    .received .message-time {
      color: rgba(255,255,255,0.35);
    }
    .message-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 0.8rem;
      cursor: pointer;
    }
    .empty-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 0.8rem;
    }
    .chat-input-area {
      display: none;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.8rem;
      padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0.5rem));
      background: #000;
      border-top: 1px solid rgba(255,255,255,0.06);
      width: 100%;
    }
    .chat-input-area.show { display: flex; }
    .camera-btn-s, .mic-btn-s {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0a0a0a;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      min-width: 0;
    }
    .chat-input:focus { border-color: #FFFC00; }
    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #FFFC00;
      border: none;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fab-container {
      position: fixed;
      bottom: 85px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    
    .fab-main {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #FFFC00;
      color: #000;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,252,0,0.3);
      transition: all 0.3s ease;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .fab-main:active {
      transform: scale(0.9);
    }
    .fab-main .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: #fff;
      font-size: 0.55rem;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #000;
    }
    
    .new-chat-panel {
      position: fixed;
      bottom: 150px;
      right: 20px;
      width: 350px;
      max-width: calc(100vw - 40px);
      max-height: 60vh;
      background: rgba(20,20,20,0.95);
      backdrop-filter: blur(30px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 101;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .new-chat-panel.show {
      display: flex;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .new-chat-panel-header {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .new-chat-panel-header h3 {
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .new-chat-panel-close {
      color: #666;
      cursor: pointer;
      font-size: 1.2rem;
      transition: color 0.2s;
      background: none;
      border: none;
    }
    .new-chat-panel-close:hover { color: #fff; }
    
    .new-chat-panel-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .new-chat-panel-tab {
      flex: 1;
      text-align: center;
      padding: 0.6rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .new-chat-panel-tab.active {
      color: #fff;
      border-bottom-color: #FFFC00;
    }
    .new-chat-panel-tab .tab-badge {
      background: #ef4444;
      color: #fff;
      font-size: 0.5rem;
      border-radius: 10px;
      padding: 0.05rem 0.4rem;
      margin-left: 0.3rem;
    }
    
    .new-chat-panel-search {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .new-chat-panel-search input {
      width: 100%;
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 0.75rem;
      outline: none;
      box-sizing: border-box;
    }
    .new-chat-panel-search input:focus {
      border-color: #FFFC00;
    }
    .new-chat-panel-search input::placeholder {
      color: #555;
    }
    
    .new-chat-panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.3rem 0;
    }
    .new-chat-panel-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .new-chat-panel-item:active {
      background: rgba(255,255,255,0.05);
    }
    .new-chat-panel-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #fff;
      overflow: hidden;
      flex-shrink: 0;
    }
    .new-chat-panel-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .new-chat-panel-info {
      flex: 1;
      min-width: 0;
    }
    .new-chat-panel-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
    }
    .new-chat-panel-sub {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.4);
    }
    .new-chat-panel-action {
      padding: 0.25rem 0.8rem;
      border-radius: 1.5rem;
      font-size: 0.6rem;
      font-weight: 600;
      cursor: pointer;
      background: rgba(255,252,0,0.15);
      border: 1px solid rgba(255,252,0,0.3);
      color: #FFFC00;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .new-chat-panel-action:active {
      transform: scale(0.95);
    }
    .new-chat-panel-action.accept {
      background: rgba(74,222,128,0.15);
      border-color: rgba(74,222,128,0.3);
      color: #4ade80;
    }
    .new-chat-panel-action.decline {
      background: rgba(239,68,68,0.15);
      border-color: rgba(239,68,68,0.3);
      color: #ef4444;
    }
    .new-chat-panel-empty {
      text-align: center;
      padding: 2rem;
      color: #555;
      font-size: 0.8rem;
    }
    .panel-loading {
      text-align: center;
      padding: 1rem;
      color: #666;
      font-size: 0.7rem;
    }
    .panel-loading i {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .chat-settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .chat-settings-overlay.show { display: flex; }
    .chat-settings-modal {
      background: rgba(20,20,20,0.95);
      backdrop-filter: blur(30px);
      border-radius: 1.5rem;
      width: 100%;
      max-width: 400px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .chat-settings-header {
      padding: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-settings-header h3 {
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
    }
    .chat-settings-close {
      color: #666;
      cursor: pointer;
      font-size: 1.2rem;
      transition: color 0.2s;
      background: none;
      border: none;
    }
    .chat-settings-close:hover { color: #fff; }
    .chat-settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }
    .chat-settings-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.8rem 1rem;
      cursor: pointer;
      transition: background 0.2s;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .chat-settings-item:active {
      background: rgba(255,255,255,0.05);
    }
    .chat-settings-item i {
      width: 24px;
      color: #666;
      font-size: 1rem;
    }
    .chat-settings-item .item-text {
      flex: 1;
      font-size: 0.85rem;
    }
    .chat-settings-item .item-sub {
      color: #666;
      font-size: 0.7rem;
    }
    .chat-settings-item.danger {
      color: #ef4444;
    }
    .chat-settings-item.danger i {
      color: #ef4444;
    }
    
    @media (min-width: 1024px) {
      .scrollable-content { 
        padding-left: 5.5rem; 
        width: 100%;
        max-width: 100%;
      }
      .chat-list-full, .chat-view { 
        max-width: 100%; 
        margin: 0; 
        width: 100%;
      }
      .search-bar-container {
        max-width: 100vw;
        width: 100vw;
      }
    }
    
    .search-bar-container,
    .search-bar,
    .search-bar input {
      max-width: 100% !important;
      width: 100% !important;
    }
    
    .search-bar-container {
      padding-left: 1rem;
      padding-right: 1rem;
    }
    
    .chat-view.show ~ .fab-container {
      display: none;
    }
    .chat-view.show ~ .new-chat-panel {
      display: none !important;
    }
    
    /* Mobile touch fix */
    @media (max-width: 480px) {
      .fab-main {
        width: 52px;
        height: 52px;
        font-size: 1.3rem;
      }
      .new-chat-panel {
        width: calc(100vw - 20px);
        right: 10px;
        bottom: 140px;
        max-height: 50vh;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="scrollable-content">
      <!-- Top Icons -->
      <div class="top-icons" id="topIcons">
        <a href="heart.html" class="corner-btn" title="Likes">
          <i class="fas fa-heart"></i>
        </a>
        <span class="top-brand">Chats</span>
        <a href="settings.html" class="corner-btn" title="Settings">
          <i class="fas fa-cog"></i>
        </a>
      </div>
      
      <!-- Chat Header -->
      <div class="chat-header" id="chatHeader">
        <button class="chat-back" onclick="goBack()">
          <i class="fas fa-arrow-left"></i>
        </button>
        <div class="chat-partner-info" onclick="goToPartnerProfile()">
          <div class="chat-partner-avatar" id="partnerAvatar">
            <i class="fas fa-user"></i>
          </div>
          <div class="chat-partner-details">
            <div class="chat-partner-name" id="partnerName"></div>
            <div class="chat-partner-status">
              <span class="dot"></span> online
            </div>
          </div>
        </div>
        <div class="call-btns">
          <button class="call-btn" onclick="startCall('audio')">
            <i class="fas fa-phone"></i>
          </button>
          <button class="call-btn" onclick="startCall('video')">
            <i class="fas fa-video"></i>
          </button>
          <button class="chat-settings-btn" onclick="openChatSettings()">
            <i class="fas fa-ellipsis-v"></i>
          </button>
        </div>
      </div>
      
      <!-- Search Bar -->
      <div class="search-bar-container" id="searchBarContainer">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search..." oninput="filterChats()">
        </div>
      </div>
