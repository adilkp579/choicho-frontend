<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat · Choicho</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* --- reset & base --- */
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    .page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 550px;
      margin: 0 auto;
      background: #000;
      position: relative;
    }
    .scrollable-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding-bottom: 0;
    }
    /* top bar */
    .top-icons {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1rem;
      background: #000;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .corner-btn {
      color: #fff;
      font-size: 1.2rem;
      width: 2.2rem;
      height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: rgba(255,255,255,0.05);
      text-decoration: none;
      transition: 0.2s;
    }
    .corner-btn:active { background: rgba(255,255,255,0.15); }
    .top-brand {
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.3px;
      color: #fff;
    }

    /* chat header (hidden by default) */
    .chat-header {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      background: #000;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .chat-header.show { display: flex; }
    .chat-back {
      width: 2.4rem;
      height: 2.4rem;
      background: #1a1a1a;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #333;
      cursor: pointer;
      background: transparent;
    }
    .chat-partner-info {
      flex: 1;
      cursor: pointer;
    }
    .chat-partner-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }
    .chat-partner-status {
      font-size: 0.65rem;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .chat-partner-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
    }
    .call-btns {
      display: flex;
      gap: 0.5rem;
    }
    .call-btn {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      border: none;
      transition: 0.2s;
    }
    .call-btn:active { transform: scale(0.95); }

    /* SEARCH BAR — FULL WIDTH, INCREASED SIZE */
    .search-bar-container {
      padding: 0.5rem 1rem 0.6rem;
      background: #000;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: #111;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2.2rem;
      padding: 0.6rem 1.2rem;
      width: 100%;
      transition: border 0.2s;
    }
    .search-bar:focus-within {
      border-color: #FFFC00;
      background: #0d0d0d;
    }
    .search-bar i {
      color: #888;
      font-size: 0.9rem;
    }
    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.95rem;
      padding: 0.2rem 0;
      outline: none;
      width: 100%;
    }
    .search-bar input::placeholder {
      color: #555;
      font-weight: 300;
    }

    /* chat list */
    .chat-list-full {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      background: #000;
    }
    .chat-list-full.hidden { display: none; }
    .chat-list-header {
      padding: 0.6rem 1rem 0.3rem;
      font-size: 0.65rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .user-list-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      transition: background 0.15s;
    }
    .user-list-item:active { background: rgba(255,255,255,0.04); }
    .user-list-item.active { background: rgba(255,252,0,0.07); }
    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-info {
      flex: 1;
      min-width: 0;
    }
    .user-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-name {
      font-size: 0.85rem;
      color: #fff;
      font-weight: 500;
    }
    .user-time {
      font-size: 0.6rem;
      color: #555;
    }
    .user-msg-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
    }
    .user-last-msg {
      font-size: 0.7rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .user-last-msg.unread-msg {
      color: #fff;
      font-weight: 500;
    }
    .unread-count {
      background: #FFFC00;
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* chat view */
    .chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      background: #000;
    }
    .chat-view.show { display: flex; }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: #000;
    }
    .messages-container::-webkit-scrollbar { width: 0; }
    .message-wrapper {
      display: flex;
      max-width: 85%;
      animation: fadeInUp 0.2s;
    }
    .message-wrapper.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message-wrapper.received {
      align-self: flex-start;
    }
    .message-bubble {
      padding: 0.55rem 0.8rem;
      border-radius: 1.2rem;
      font-size: 0.85rem;
      line-height: 1.3;
      word-break: break-word;
    }
    .sent .message-bubble {
      background: #FFFC00;
      color: #000;
      border-bottom-right-radius: 0.3rem;
    }
    .received .message-bubble {
      background: #111;
      color: #fff;
      border-bottom-left-radius: 0.3rem;
    }
    .message-time {
      font-size: 0.55rem;
      margin-top: 0.1rem;
    }
    .sent .message-time {
      text-align: right;
      color: rgba(0,0,0,0.45);
    }
    .received .message-time {
      color: rgba(255,255,255,0.35);
    }
    .message-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 0.8rem;
      cursor: pointer;
    }
    .empty-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 0.8rem;
      text-align: center;
    }

    /* CHAT INPUT AREA — repositioned inside chat view */
    .chat-input-area {
      display: none;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.8rem;
      padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0.5rem));
      background: #000;
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .chat-input-area.show { display: flex; }
    .camera-btn-s, .mic-btn-s {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0a0a0a;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
    }
    .chat-input:focus { border-color: #FFFC00; }
    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #FFFC00;
      border: none;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* floating nav */
    .floating-nav {
      display: flex;
      justify-content: center;
      background: #0d0d0d;
      border-top: 1px solid rgba(255,255,255,0.06);
      padding: 0.4rem 0;
      padding-bottom: max(0.4rem, env(safe-area-inset-bottom, 0.4rem));
      flex-shrink: 0;
    }
    .nav-center {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nav-center a {
      color: #666;
      font-size: 1.2rem;
      width: 2.6rem;
      height: 2.6rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      text-decoration: none;
      transition: 0.2s;
    }
    .nav-center a.active {
      color: #FFFC00;
      background: rgba(255,252,0,0.1);
    }
    .nav-center a:active { background: rgba(255,255,255,0.05); }
    .nav-upload, .nav-search {
      background: rgba(255,255,255,0.05);
      border-radius: 50%;
    }

    .toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #fff;
      padding: 0.6rem 1.5rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      border: 1px solid #333;
      opacity: 0;
      transition: 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; bottom: 100px; }

    /* empty state */
    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: #555;
    }
    .empty-state i { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.5; }
    .empty-state p { margin: 0.2rem 0; }

    @media (min-width: 1024px) {
      .scrollable-content { padding-left: 0; }
      .chat-list-full, .chat-view { max-width: 550px; margin: 0 auto; width: 100%; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="scrollable-content">
    <!-- Top bar -->
    <div class="top-icons" id="topIcons">
      <a href="heart.html" class="corner-btn"><i class="fas fa-heart"></i></a>
      <span class="top-brand">Chats</span>
      <a href="settings.html" class="corner-btn"><i class="fas fa-cog"></i></a>
    </div>

    <!-- Chat Header (when open) -->
    <div class="chat-header" id="chatHeader">
      <button class="chat-back" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
      <div class="chat-partner-info" onclick="goToPartnerProfile()">
        <div class="chat-partner-name" id="partnerName"></div>
        <div class="chat-partner-status"><span class="dot"></span> online</div>
      </div>
      <div class="call-btns">
        <button class="call-btn" onclick="startCall('audio')"><i class="fas fa-phone"></i></button>
        <button class="call-btn" onclick="startCall('video')"><i class="fas fa-video"></i></button>
      </div>
    </div>

    <!-- SEARCH BAR - full width, increased size -->
    <div class="search-bar-container" id="searchBarContainer">
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search messages..." oninput="filterChats()">
      </div>
    </div>

    <!-- Chat List -->
    <div class="chat-list-full" id="chatListFull">
      <div class="chat-list-header">Messages <span id="chatCount"></span></div>
      <div id="chatList"></div>
    </div>

    <!-- Chat View -->
    <div class="chat-view" id="chatView">
      <div class="messages-container" id="messagesContainer">
        <div class="empty-chat">Select a chat to start messaging</div>
      </div>
    </div>
  </div>

  <!-- CHAT INPUT AREA (repositioned: inside chat view, below messages) -->
  <div class="chat-input-area" id="chatInputArea">
    <button class="camera-btn-s" onclick="document.getElementById('imageInput').click()">
      <i class="fas fa-camera"></i>
    </button>
    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
    <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
    <button class="mic-btn-s" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
    <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
  </div>

  <!-- Floating Nav -->
  <nav class="floating-nav" id="floatingNav">
    <div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html"><i class="fas fa-film"></i></a>
      <a href="chat.html" class="active"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a>
      <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script>
  // ---- SIMULATED CHAT ENGINE (no Firebase, pure demo) ----
  (function() {
    // mock current user
    const currentUserId = 'user_demo';
    const currentUser = { uid: currentUserId, username: 'demo_user' };
    window.getCurrentUser = () => currentUser;

    // mock chat data
    let chatsDB = [
      { id: 'chat_1', partner: '@alex', lastMsg: 'Hey, how are you?', lastTime: new Date(Date.now() - 3600000), unread: 2 },
      { id: 'chat_2', partner: '@jordan', lastMsg: 'See you tomorrow!', lastTime: new Date(Date.now() - 7200000), unread: 0 },
      { id: 'chat_3', partner: '@sam', lastMsg: 'Thanks 😊', lastTime: new Date(Date.now() - 18000000), unread: 1 },
    ];
    let messagesDB = {
      'chat_1': [
        { sender: 'alex', text: 'Hey, how are you?', time: new Date(Date.now() - 3700000) },
        { sender: currentUserId, text: 'I am good, you?', time: new Date(Date.now() - 3600000) },
      ],
      'chat_2': [
        { sender: 'jordan', text: 'See you tomorrow!', time: new Date(Date.now() - 7300000) },
      ],
      'chat_3': [
        { sender: currentUserId, text: 'Thanks 😊', time: new Date(Date.now() - 18000000) },
      ]
    };

    let currentPartner = null;
    let currentChatId = null;

    // helpers
    function cleanUsername(u) { return u.replace('@',''); }
    function timeAgo(d) {
      const diff = Date.now() - d.getTime();
      if (diff < 60000) return 'now';
      if (diff < 3600000) return Math.floor(diff/60000)+'m';
      if (diff < 86400000) return Math.floor(diff/3600000)+'h';
      return Math.floor(diff/86400000)+'d';
    }
    function getAvatarHTML(username) {
      const initial = username.replace('@','').charAt(0).toUpperCase();
      return `<span style="font-weight:600;font-size:1.2rem;">${initial}</span>`;
    }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2000);
    }

    // render chat list
    function renderChatList() {
      const container = document.getElementById('chatList');
      if (!chatsDB.length) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-comment-slash"></i><p>No messages yet</p></div>';
        return;
      }
      container.innerHTML = chatsDB.map(c => `
        <div class="user-list-item ${currentPartner === c.partner ? 'active' : ''}" onclick="openChat('${c.partner}')">
          <div class="user-avatar" onclick="event.stopPropagation();window.location.href='profile.html?user=${encodeURIComponent(c.partner)}'">
            ${getAvatarHTML(c.partner)}
          </div>
          <div class="user-info">
            <div class="user-name-row">
              <span class="user-name">${cleanUsername(c.partner)}</span>
              <span class="user-time">${timeAgo(c.lastTime)}</span>
            </div>
            <div class="user-msg-row">
              <span class="user-last-msg ${c.unread > 0 ? 'unread-msg' : ''}">${c.lastMsg.substring(0,40)}</span>
              ${c.unread > 0 ? `<div class="unread-count">${c.unread}</div>` : ''}
            </div>
          </div>
        </div>
      `).join('');
      document.getElementById('chatCount').textContent = chatsDB.length ? `(${chatsDB.length})` : '';
    }

    // open chat
    window.openChat = function(partner) {
      currentPartner = partner;
      const partnerId = partner.replace('@','');
      currentChatId = ['user_demo', partnerId].sort().join('_');
      // mark read
      const chat = chatsDB.find(c => c.partner === partner);
      if (chat) chat.unread = 0;

      // UI
      document.getElementById('topIcons').style.display = 'none';
      document.getElementById('chatHeader').classList.add('show');
      document.getElementById('chatListFull').classList.add('hidden');
      document.getElementById('searchBarContainer').classList.add('hidden');
      document.getElementById('chatView').classList.add('show');
      document.getElementById('chatInputArea').classList.add('show');
      document.getElementById('floatingNav').style.display = 'none';
      document.getElementById('partnerName').textContent = cleanUsername(partner);

      // load messages
      const container = document.getElementById('messagesContainer');
      const msgs = messagesDB[currentChatId] || [];
      if (!msgs.length) {
        container.innerHTML = '<div class="empty-chat">Send a message to start chatting!</div>';
        return;
      }
      container.innerHTML = '';
      msgs.forEach(msg => {
        const isSent = msg.sender === currentUserId;
        const div = document.createElement('div');
        div.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
        const time = msg.time ? msg.time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
        div.innerHTML = `<div class="message-bubble">${msg.text}<div class="message-time">${time}</div></div>`;
        container.appendChild(div);
      });
      container.scrollTop = container.scrollHeight;
      renderChatList();
    };

    // send message
    window.sendMessage = function() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !currentChatId) return;
      input.value = '';
      if (!messagesDB[currentChatId]) messagesDB[currentChatId] = [];
      messagesDB[currentChatId].push({ sender: currentUserId, text: text, time: new Date() });
      // update last message
      const chat = chatsDB.find(c => c.partner === currentPartner);
      if (chat) { chat.lastMsg = text; chat.lastTime = new Date(); chat.unread = 0; }
      // re-render
      openChat(currentPartner);
    };

    window.sendImage = function(e) {
      const file = e.target.files[0];
      if (!file || !currentChatId) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        if (!messagesDB[currentChatId]) messagesDB[currentChatId] = [];
        messagesDB[currentChatId].push({ sender: currentUserId, text: '📷 Photo', time: new Date(), image: ev.target.result });
        const chat = chatsDB.find(c => c.partner === currentPartner);
        if (chat) { chat.lastMsg = '📷 Photo'; chat.lastTime = new Date(); chat.unread = 0; }
        openChat(currentPartner);
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    };

    window.toggleVoice = function() { showToast('Voice message coming soon! 🎤'); };
    window.goBack = function() {
      currentPartner = null;
      currentChatId = null;
      document.getElementById('topIcons').style.display = 'flex';
      document.getElementById('chatHeader').classList.remove('show');
      document.getElementById('chatListFull').classList.remove('hidden');
      document.getElementById('searchBarContainer').classList.remove('hidden');
      document.getElementById('chatView').classList.remove('show');
      document.getElementById('chatInputArea').classList.remove('show');
      document.getElementById('floatingNav').style.display = 'flex';
      document.getElementById('messagesContainer').innerHTML = '<div class="empty-chat">Select a chat to start messaging</div>';
      renderChatList();
    };
    window.goToPartnerProfile = function() {
      if (currentPartner) window.location.href = `profile.html?user=${encodeURIComponent(currentPartner)}`;
    };
    window.startCall = function(type) { showToast(`📞 ${type} call coming soon!`); };
    window.filterChats = function() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const items = document.querySelectorAll('.user-list-item');
      items.forEach(item => {
        const name = item.querySelector('.user-name')?.textContent.toLowerCase() || '';
        item.style.display = name.includes(search) ? 'flex' : 'none';
      });
    };

    // init
    renderChatList();
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    // expose for inline onclick
    window.cleanUsername = cleanUsername;
    window.getAvatarHTML = getAvatarHTML;
    window.showToast = showToast;
    window.timeAgo = timeAgo;
  })();
</script>
