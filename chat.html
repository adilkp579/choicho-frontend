<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat · Choicho</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- ===== MAIN.CSS - ALL STYLES FROM HERE ===== -->
  <link rel="stylesheet" href="css/main.css">
  <style>
    /* ===== MINIMAL CHAT PAGE SPECIFIC STYLES ONLY ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .page {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      max-height: 900px;
      background: #000;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border-radius: 0;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }
    @media (min-width: 600px) {
      .page { border-radius: 28px; height: 95vh; }
    }
    .scrollable-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ===== TOP HEADER - Using main.css ===== */
    .top-icons-chat {
      width: 100%;
      max-width: 500px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 0.8rem 0.3rem 0.8rem;
      flex-shrink: 0;
      position: relative;
      background: #000;
      margin: 0 auto;
    }
    .top-icons-chat.hidden { display: none; }

    /* Using main.css corner-btn */
    .corner-btn-left {
      width: 2.4rem;
      height: 2.4rem;
      background: #1a1a1a;
      border-radius: 50%;
      color: #fff;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.3s;
      flex-shrink: 0;
    }
    .corner-btn-left:active { transform: scale(0.95); }
    .heart-icon { color: #ef4444; }

    .corner-btn-right {
      width: 2.4rem;
      height: 2.4rem;
      background: #1a1a1a;
      border-radius: 50%;
      color: #fff;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      border: 1px solid #333;
      cursor: pointer;
      transition: all 0.3s;
    }
    .corner-btn-right:active { transform: scale(0.95); }
    .plus-icon { color: #FFFC00; font-weight: 700; }

    /* Using main.css top-brand */
    .chat-brand {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      font-family: 'Segoe Script', 'Brush Script MT', 'Apple Chancery', 'Comic Sans MS', cursive;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      line-height: 1;
      font-style: italic;
    }

    .top-right-group {
      display: flex;
      gap: 0.4rem;
      align-items: center;
      flex-shrink: 0;
    }

    /* ===== CHAT HEADER (when inside a chat) ===== */
    .chat-header {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 0.8rem;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      z-index: 30;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }
    .chat-header.show { display: flex; }

    .chat-back {
      width: 2.4rem;
      height: 2.4rem;
      background: #1a1a1a;
      border-radius: 50%;
      border: 1px solid #333;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 1rem;
    }
    .chat-back:active { transform: scale(0.94); background: #2a2a2a; }

    .chat-partner-info {
      flex: 1;
      cursor: pointer;
      min-width: 0;
      padding: 0.2rem 0.5rem;
      border-radius: 0.5rem;
      text-align: center;
    }
    .chat-partner-info:active { background: rgba(255,255,255,0.05); }
    .chat-partner-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-partner-name i { font-size: 0.6rem; color: #3897f0; margin-left: 0.3rem; }
    .chat-partner-status {
      font-size: 0.55rem;
      color: #4ade80;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.2rem;
    }
    .chat-partner-status .dot { 
      width: 6px; 
      height: 6px; 
      border-radius: 50%; 
      background: #4ade80;
      display: inline-block;
    }

    .call-btns {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .call-btn {
      width: 2.4rem;
      height: 2.4rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      font-size: 1rem;
    }
    .call-btn:active { transform: scale(0.94); background: rgba(255,255,255,0.12); }

    /* ===== SEARCH BAR ===== */
    .search-bar-container {
      padding: 0.3rem 1rem 0.5rem 1rem;
      background: #000;
      flex-shrink: 0;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }
    .search-bar-container.hidden { display: none; }
    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2rem;
      padding: 0.4rem 0.8rem;
      width: 100%;
    }
    .search-bar:focus-within { border-color: #FFFC00; }
    .search-bar i { color: #666; font-size: 0.8rem; }
    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.8rem;
      outline: none;
      width: 100%;
    }
    .search-bar input::placeholder { color: #555; }
    .search-clear {
      color: #666;
      cursor: pointer;
      font-size: 0.7rem;
      display: none;
    }
    .search-clear.show { display: block; }

    /* ===== CHAT LIST ===== */
    .chat-list-full {
      flex: 1;
      overflow-y: auto;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }
    .chat-list-full.hidden { display: none; }
    .chat-list-header {
      padding: 0.5rem 1rem;
      font-size: 0.6rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
    }
    .user-list-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      transition: background 0.15s;
    }
    .user-list-item:active { background: rgba(255,255,255,0.04); }
    .user-list-item.hidden { display: none !important; }
    .user-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { flex: 1; min-width: 0; }
    .user-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .user-name {
      font-size: 0.85rem;
      color: #fff;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-time { font-size: 0.6rem; color: #555; flex-shrink: 0; }
    .user-msg-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
      gap: 0.5rem;
    }
    .user-last-msg {
      font-size: 0.7rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .user-last-msg.unread-msg { color: #fff; font-weight: 500; }
    .unread-count {
      background: #FFFC00;
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* ===== CHAT VIEW ===== */
    .chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }
    .chat-view.show { display: flex; }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: #000;
    }
    .messages-container::-webkit-scrollbar { width: 0; }
    .message-wrapper {
      display: flex;
      max-width: 85%;
      animation: fadeIn 0.2s;
    }
    .message-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
    .message-wrapper.received { align-self: flex-start; }
    .message-bubble {
      padding: 0.55rem 0.8rem;
      border-radius: 1.2rem;
      font-size: 0.85rem;
      line-height: 1.3;
      word-break: break-word;
    }
    .sent .message-bubble { background: #FFFC00; color: #000; border-bottom-right-radius: 0.3rem; }
    .received .message-bubble { background: #111; color: #fff; border-bottom-left-radius: 0.3rem; }
    .message-time { font-size: 0.55rem; margin-top: 0.1rem; }
    .sent .message-time { text-align: right; color: rgba(0,0,0,0.45); }
    .received .message-time { color: rgba(255,255,255,0.35); }
    .message-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 0.8rem;
      cursor: pointer;
    }
    .empty-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 0.8rem;
      text-align: center;
      padding: 1rem;
    }

    /* ===== INPUT AREA ===== */
    .chat-input-area {
      display: none;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.8rem;
      padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0.5rem));
      background: #000;
      border-top: 1px solid rgba(255,255,255,0.06);
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
    }
    .chat-input-area.show { display: flex; }
    .camera-btn-s, .mic-btn-s {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0a0a0a;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      min-width: 0;
    }
    .chat-input:focus { border-color: #FFFC00; }
    .send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #FFFC00;
      border: none;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ==============================================================
       NEW CHAT MODAL — GLASSMORPHISM
       ============================================================== */
    .new-chat-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.1);
      backdrop-filter: blur(40px) saturate(2.0);
      -webkit-backdrop-filter: blur(40px) saturate(2.0);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .new-chat-overlay.show { display: flex; }

    .new-chat-modal {
      width: 100%;
      max-width: 420px;
      max-height: 85vh;
      background: rgba(255, 255, 255, 0.01);
      backdrop-filter: blur(64px) saturate(2.5);
      -webkit-backdrop-filter: blur(64px) saturate(2.5);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.03);
      box-shadow: 
        0 40px 100px rgba(0,0,0,0.3),
        0 0 0 1px rgba(255,255,255,0.02) inset,
        0 0 120px rgba(255,255,255,0.01);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: glassIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes glassIn {
      0% { opacity: 0; transform: scale(0.92) translateY(24px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    .new-chat-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      flex-shrink: 0;
      background: rgba(255,255,255,0.005);
      backdrop-filter: blur(4px);
    }
    .new-chat-tab {
      flex: 1;
      text-align: center;
      padding: 0.9rem 0.5rem;
      color: rgba(255,255,255,0.2);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.4s ease;
      letter-spacing: 0.3px;
      backdrop-filter: blur(2px);
      text-shadow: 0 0 30px rgba(255,255,255,0.01);
    }
    .new-chat-tab.active {
      color: #fff;
      border-bottom-color: #FFFC00;
      background: rgba(255,252,0,0.015);
      text-shadow: 0 0 60px rgba(255,252,0,0.06);
    }
    .new-chat-tab .badge {
      background: #ef4444;
      color: #fff;
      font-size: 0.55rem;
      border-radius: 12px;
      padding: 0.05rem 0.5rem;
      margin-left: 0.3rem;
      display: inline-block;
      box-shadow: 0 0 50px rgba(239,68,68,0.08);
    }
    .new-chat-tab .badge.hidden { display: none; }

    .new-chat-search {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.01);
      flex-shrink: 0;
      background: rgba(255,255,255,0.005);
      backdrop-filter: blur(4px);
    }
    .new-chat-search input {
      width: 100%;
      padding: 0.6rem 1.2rem;
      border-radius: 2.5rem;
      border: 1px solid rgba(255,255,255,0.03);
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      color: #fff;
      font-size: 0.8rem;
      outline: none;
      transition: all 0.4s ease;
      box-shadow: 0 0 60px rgba(255,255,255,0.005);
    }
    .new-chat-search input:focus {
      border-color: #FFFC00;
      background: rgba(255,255,255,0.035);
      box-shadow: 0 0 100px rgba(255,252,0,0.015), inset 0 0 60px rgba(255,255,255,0.01);
    }
    .new-chat-search input::placeholder { color: rgba(255,255,255,0.1); }

    .new-chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.3rem 0;
      background: rgba(255,255,255,0.003);
      backdrop-filter: blur(2px);
    }
    .new-chat-list::-webkit-scrollbar { width: 3px; }
    .new-chat-list::-webkit-scrollbar-thumb { 
      background: rgba(255,255,255,0.03); 
      border-radius: 6px;
    }

    .new-chat-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: background 0.3s ease;
      border-bottom: 1px solid rgba(255,255,255,0.005);
      backdrop-filter: blur(2px);
    }
    .new-chat-item:active { 
      background: rgba(255,255,255,0.015);
    }
    .new-chat-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #fff;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.02);
    }
    .new-chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .new-chat-info { flex: 1; min-width: 0; }
    .new-chat-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.2px;
      text-shadow: 0 0 50px rgba(255,255,255,0.01);
    }
    .new-chat-sub {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.15);
      margin-top: 1px;
    }
    .new-chat-actions {
      display: flex;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .new-chat-action {
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
      font-size: 0.6rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.02);
      background: rgba(255,255,255,0.005);
      backdrop-filter: blur(20px);
      color: rgba(255,255,255,0.25);
      transition: all 0.3s ease;
      letter-spacing: 0.2px;
      text-shadow: 0 0 30px rgba(255,255,255,0.005);
    }
    .new-chat-action:active { transform: scale(0.94); }
    .new-chat-action.request-btn {
      background: rgba(139,92,246,0.025);
      border-color: rgba(139,92,246,0.035);
      color: #a78bfa;
      box-shadow: 0 0 60px rgba(139,92,246,0.01);
    }
    .new-chat-action.request-btn:hover {
      background: rgba(139,92,246,0.05);
      box-shadow: 0 0 100px rgba(139,92,246,0.025);
    }
    .new-chat-action.requested {
      background: rgba(245,158,11,0.015);
      border-color: rgba(245,158,11,0.025);
      color: #f59e0b;
      cursor: default;
      box-shadow: 0 0 60px rgba(245,158,11,0.005);
    }
    .new-chat-action.chat {
      background: rgba(255,252,0,0.02);
      border-color: rgba(255,252,0,0.025);
      color: #FFFC00;
      box-shadow: 0 0 60px rgba(255,252,0,0.01);
    }
    .new-chat-action.chat:hover {
      background: rgba(255,252,0,0.04);
      box-shadow: 0 0 100px rgba(255,252,0,0.025);
    }
    .new-chat-action.accept {
      background: rgba(74,222,128,0.015);
      border-color: rgba(74,222,128,0.025);
      color: #4ade80;
      box-shadow: 0 0 60px rgba(74,222,128,0.005);
    }
    .new-chat-action.accept:hover {
      background: rgba(74,222,128,0.035);
      box-shadow: 0 0 100px rgba(74,222,128,0.015);
    }
    .new-chat-action.decline {
      background: rgba(239,68,68,0.015);
      border-color: rgba(239,68,68,0.025);
      color: #ef4444;
      box-shadow: 0 0 60px rgba(239,68,68,0.005);
    }
    .new-chat-action.decline:hover {
      background: rgba(239,68,68,0.035);
      box-shadow: 0 0 100px rgba(239,68,68,0.015);
    }

    .new-chat-close {
      text-align: center;
      padding: 0.7rem;
      color: rgba(255,255,255,0.08);
      cursor: pointer;
      border-top: 1px solid rgba(255,255,255,0.005);
      font-size: 0.7rem;
      flex-shrink: 0;
      backdrop-filter: blur(16px);
      background: rgba(255,255,255,0.003);
      transition: all 0.2s ease;
    }
    .new-chat-close:active { background: rgba(255,255,255,0.008); }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: rgba(255,255,255,0.08);
    }
    .empty-state i { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.15; }
    .empty-state p { font-size: 0.8rem; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,30,40,0.9);
      backdrop-filter: blur(16px);
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 2.5rem;
      font-size: 0.75rem;
      z-index: 800;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.04);
    }
    .toast.show { opacity: 1; }

    /* ==============================================================
       RESPONSIVE - Using main.css for navbar
       ============================================================== */
    @media (max-width: 480px) {
      .chat-brand { font-size: 1.3rem; }
      .corner-btn-left, .corner-btn-right { width: 2.2rem; height: 2.2rem; font-size: 0.9rem; }
      .chat-back { width: 2.2rem; height: 2.2rem; font-size: 0.9rem; }
      .call-btn { width: 2.2rem; height: 2.2rem; font-size: 0.9rem; }
    }

    @media (min-width: 1024px) {
      .top-icons-chat { display: none; }
      
      /* Desktop layout */
      .page {
        max-width: 1100px;
        max-height: 95vh;
        border-radius: 28px;
        height: 95vh;
      }
      
      .scrollable-content {
        flex-direction: row;
        overflow: hidden;
        padding: 0;
      }
      
      .chat-list-full {
        max-width: 400px;
        min-width: 300px;
        width: 40%;
        border-right: 1px solid rgba(255,255,255,0.06);
        flex-shrink: 0;
        display: flex !important;
        flex-direction: column;
        padding: 0;
      }
      
      .chat-list-full.hidden { display: flex !important; }
      
      .chat-view {
        max-width: none;
        flex: 1;
        display: flex !important;
        width: 60%;
      }
      
      .chat-view.show { display: flex !important; }
      
      .top-icons-chat {
        display: flex !important;
        max-width: 400px;
        padding: 0.6rem 0.8rem;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        flex-shrink: 0;
        position: relative;
        z-index: 10;
        background: #000;
        margin: 0;
      }
      
      .top-icons-chat.hidden { display: none !important; }
      
      .chat-header {
        display: none !important;
        max-width: none;
        padding: 0.5rem 1rem;
        flex-shrink: 0;
      }
      
      .chat-header.show { display: flex !important; }
      
      .search-bar-container {
        max-width: 400px;
        padding: 0.3rem 0.8rem 0.5rem 0.8rem;
        flex-shrink: 0;
      }
      
      .search-bar-container.hidden { display: block !important; }
      
      .chat-input-area {
        max-width: none;
        padding: 0.5rem 1rem;
        flex-shrink: 0;
        border-top: 1px solid rgba(255,255,255,0.06);
      }
      
      .chat-input-area.show { display: flex !important; }
      
      .messages-container { flex: 1; overflow-y: auto; padding: 1rem; }
      
      .empty-chat { font-size: 1rem; color: #444; }
      .chat-back { display: none; }
      .chat-partner-info { text-align: left; padding: 0.2rem 0.8rem; }
      .chat-partner-status { justify-content: flex-start; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="scrollable-content">

    <!-- ===== LEFT PANEL - CHAT LIST ===== -->
    <div class="chat-list-full" id="chatListFull">
      <!-- TOP HEADER -->
      <div class="top-icons-chat" id="topIconsChat">
        <a href="hart.html" class="corner-btn-left" title="Activity">
          <i class="fas fa-heart heart-icon"></i>
        </a>
        <span class="chat-brand">Chats</span>
        <div class="top-right-group">
          <button class="corner-btn-right" id="newChatBtn" title="New Chat">
            <i class="fas fa-plus plus-icon"></i>
          </button>
          <a href="settings.html" class="corner-btn-right" title="Settings">
            <i class="fas fa-cog"></i>
          </a>
        </div>
      </div>

      <!-- SEARCH BAR -->
      <div class="search-bar-container" id="searchBarContainer">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search messages..." oninput="filterChats()">
          <i class="fas fa-times search-clear" id="searchClear" onclick="clearSearch()"></i>
        </div>
      </div>

      <!-- CHAT LIST -->
      <div class="chat-list-header">Messages <span id="chatCount"></span></div>
      <div id="chatList"></div>
    </div>

    <!-- ===== RIGHT PANEL - CHAT VIEW ===== -->
    <div class="chat-view" id="chatView">
      <!-- CHAT HEADER -->
      <div class="chat-header" id="chatHeader">
        <button class="chat-back" onclick="goBack()" title="Go back">
          <i class="fas fa-arrow-left"></i>
        </button>
        <div class="chat-partner-info" onclick="goToPartnerProfile()" title="Tap to view profile">
          <div class="chat-partner-name" id="partnerName">
            <span id="partnerNameText">User</span>
            <i class="fas fa-chevron-right"></i>
          </div>
          <div class="chat-partner-status">
            <span class="dot"></span> online
          </div>
        </div>
        <div class="call-btns">
          <button class="call-btn" onclick="startCall('audio')" title="Audio call">
            <i class="fas fa-phone-alt"></i>
          </button>
          <button class="call-btn" onclick="startCall('video')" title="Video call">
            <i class="fas fa-video"></i>
          </button>
        </div>
      </div>

      <!-- MESSAGES -->
      <div class="messages-container" id="messagesContainer">
        <div class="empty-chat">Select a chat to start messaging</div>
      </div>

      <!-- CHAT INPUT -->
      <div class="chat-input-area" id="chatInputArea">
        <button class="camera-btn-s" onclick="document.getElementById('imageInput').click()"><i class="fas fa-camera"></i></button>
        <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
        <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
        <button class="mic-btn-s" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
        <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
      </div>
    </div>
  </div>

  <!-- ===== NEW CHAT MODAL ===== -->
  <div class="new-chat-overlay" id="newChatOverlay">
    <div class="new-chat-modal">
      <div class="new-chat-tabs">
        <div class="new-chat-tab active" data-tab="users" onclick="switchTab('users')">
          <i class="fas fa-users"></i> Users
        </div>
        <div class="new-chat-tab" data-tab="requests" onclick="switchTab('requests')">
          <i class="fas fa-envelope"></i> Requests
          <span class="badge hidden" id="requestBadge">0</span>
        </div>
      </div>
      <div class="new-chat-search">
        <input type="text" id="newChatSearch" placeholder="🔍 Search users..." oninput="filterNewChat()">
      </div>
      <div class="new-chat-list" id="newChatList"></div>
      <div class="new-chat-close" onclick="closeNewChat()"><i class="fas fa-times"></i> Close</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- ===== FLOATING NAV - Using main.css (no duplicate styles) ===== -->
  <nav class="floating-nav" id="floatingNav">
    <div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html"><i class="fas fa-film"></i></a>
      <a href="chat.html" class="active"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a>
      <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
    </div>
  </nav>
</div>

<script type="module">
  // ============================================================
  // CHAT PAGE — Smooth conversation flow with security
  // ============================================================
  
  import { db } from './js/firebase-config.js';
  import { showToast, timeAgo, cleanUsername, getAvatarHTML, requireAuth } from './js/common.js';
  import { getCurrentUser } from './js/auth.js';
  import { 
    collection, query, orderBy, onSnapshot, doc, getDoc, setDoc, 
    addDoc, updateDoc, increment, serverTimestamp, where, getDocs, deleteDoc,
    writeBatch, runTransaction 
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
  
  if (!requireAuth()) window.location.replace('login.html');
  
  const currentUser = getCurrentUser();
  const currentUserId = currentUser.uid;
  let currentPartner = null;
  let currentChatId = null;
  let unsubMessages = null;
  let allUsers = [];
  let pendingRequests = [];
  let sentRequests = [];
  let existingChatsMap = {};
  let isModalOpen = false;
  let usersLoaded = false;
  let activeTab = 'users';

  // ===== DOM refs =====
  const chatListEl = document.getElementById('chatList');
  const messagesContainer = document.getElementById('messagesContainer');
  const chatCount = document.getElementById('chatCount');

  // ===== LOAD EXISTING CHATS =====
  async function loadExistingChats() {
    const q = query(collection(db, 'chats'), orderBy('lastTime', 'desc'));
    const snapshot = await getDocs(q);
    snapshot.forEach(doc => {
      const data = doc.data();
      const ids = doc.id.split('_');
      if (ids.includes(currentUserId)) {
        const partnerId = ids.find(i => i !== currentUserId);
        if (partnerId) {
          existingChatsMap['@' + partnerId] = true;
        }
      }
    });
  }

  // ===== LOAD SENT REQUESTS =====
  async function loadSentRequests() {
    sentRequests = [];
    try {
      const q = query(
        collection(db, 'message_requests'),
        where('fromId', '==', currentUserId),
        where('status', '==', 'pending')
      );
      const snapshot = await getDocs(q);
      snapshot.forEach(doc => {
        const data = doc.data();
        sentRequests.push(data.to || data.toName);
      });
    } catch (e) {
      console.warn('Error loading sent requests:', e);
    }
  }

  // ===== LOAD CHATS LIST =====
  function loadChats() {
    const q = query(collection(db, 'chats'), orderBy('lastTime', 'desc'));
    onSnapshot(q, (snapshot) => {
      const chats = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        const ids = doc.id.split('_');
        if (ids.includes(currentUserId)) {
          const partnerId = ids.find(i => i !== currentUserId);
          if (partnerId && data.lastMessage !== undefined) {
            chats.push({
              partnerId: '@' + partnerId,
              lastMsg: data.lastMessage || 'No messages',
              lastTime: data.lastTime?.toDate() || new Date(),
              unread: data[`unread_${currentUserId}`] || 0
            });
          }
        }
      });
      renderChatList(chats);
      chatCount.textContent = chats.length ? `(${chats.length})` : '';
    });
  }

  function renderChatList(chats) {
    if (!chats.length) {
      chatListEl.innerHTML = `<div class="empty-state"><i class="fas fa-comment-slash"></i><p>No messages yet</p><p style="font-size:0.65rem;margin-top:0.5rem;">Tap <i class="fas fa-plus"></i> to start a chat</p></div>`;
      return;
    }
    chatListEl.innerHTML = chats.map(c => `
      <div class="user-list-item ${currentPartner === c.partnerId ? 'active' : ''}" onclick="openChat('${c.partnerId}')">
        <div class="user-avatar" onclick="event.stopPropagation();window.location.href='profile.html?user=${encodeURIComponent(c.partnerId)}'">
          ${getAvatarHTML(c.partnerId)}
        </div>
        <div class="user-info">
          <div class="user-name-row">
            <span class="user-name">${cleanUsername(c.partnerId)}</span>
            <span class="user-time">${timeAgo(c.lastTime)}</span>
          </div>
          <div class="user-msg-row">
            <span class="user-last-msg ${c.unread > 0 ? 'unread-msg' : ''}">${c.lastMsg.substring(0, 40)}</span>
            ${c.unread > 0 ? `<div class="unread-count">${c.unread}</div>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  // ===== OPEN CHAT =====
  window.openChat = async function(partner) {
    currentPartner = partner;
    currentChatId = [currentUserId, partner.replace('@','')].sort().join('_');
    
    try {
      await updateDoc(doc(db, 'chats', currentChatId), { 
        [`unread_${currentUserId}`]: 0 
      });
    } catch (e) {}
    
    const isDesktop = window.innerWidth >= 1024;
    
    if (!isDesktop) {
      document.getElementById('topIconsChat').classList.add('hidden');
      document.getElementById('chatListFull').classList.add('hidden');
      document.getElementById('searchBarContainer').classList.add('hidden');
      document.getElementById('floatingNav').style.display = 'none';
    }
    
    document.getElementById('chatHeader').classList.add('show');
    document.getElementById('chatView').classList.add('show');
    document.getElementById('chatInputArea').classList.add('show');
    
    document.getElementById('partnerNameText').textContent = cleanUsername(partner);
    
    document.querySelectorAll('.user-list-item').forEach(el => {
      el.classList.remove('active');
      if (el.getAttribute('onclick')?.includes(partner)) {
        el.classList.add('active');
      }
    });
    
    if (unsubMessages) unsubMessages();
    
    const q = query(
      collection(db, 'chats', currentChatId, 'messages'), 
      orderBy('createdAt', 'asc')
    );
    
    unsubMessages = onSnapshot(q, (snapshot) => {
      if (snapshot.empty) {
        messagesContainer.innerHTML = '<div class="empty-chat">Send a message to start chatting!</div>';
        return;
      }
      
      messagesContainer.innerHTML = '';
      snapshot.forEach(doc => {
        const msg = doc.data();
        const isSent = msg.sender === currentUserId;
        const div = document.createElement('div');
        div.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
        
        let time = msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
        
        if (msg.imageUrl) {
          div.innerHTML = `
            <div class="message-bubble">
              <img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')">
              <div class="message-time">${time}</div>
            </div>
          `;
        } else {
          div.innerHTML = `
            <div class="message-bubble">
              ${escapeHTML(msg.text || '')}
              <div class="message-time">${time}</div>
            </div>
          `;
        }
        messagesContainer.appendChild(div);
      });
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    });
  };

  function escapeHTML(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ===== GO BACK (Mobile Only) =====
  window.goBack = function() {
    if (unsubMessages) {
      unsubMessages();
      unsubMessages = null;
    }
    currentPartner = null;
    currentChatId = null;
    
    document.getElementById('topIconsChat').classList.remove('hidden');
    document.getElementById('chatHeader').classList.remove('show');
    document.getElementById('chatListFull').classList.remove('hidden');
    document.getElementById('searchBarContainer').classList.remove('hidden');
    document.getElementById('chatView').classList.remove('show');
    document.getElementById('chatInputArea').classList.remove('show');
    document.getElementById('floatingNav').style.display = 'flex';
    messagesContainer.innerHTML = '<div class="empty-chat">Select a chat to start messaging</div>';
  };

  // ===== GO TO PARTNER PROFILE =====
  window.goToPartnerProfile = function() {
    if (currentPartner) {
      window.location.href = `profile.html?user=${encodeURIComponent(currentPartner)}`;
    }
  };

  // ===== SEND MESSAGE =====
  window.sendMessage = async function() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    
    if (!text || !currentChatId) {
      if (!currentChatId) showToast('No chat selected');
      return;
    }
    
    input.value = '';
    
    try {
      const chatRef = doc(db, 'chats', currentChatId);
      const partnerId = currentPartner?.replace('@','');
      
      await runTransaction(db, async (transaction) => {
        const chatDoc = await transaction.get(chatRef);
        
        const updateData = {
          lastMessage: text,
          lastTime: serverTimestamp(),
          [`unread_${partnerId}`]: increment(1)
        };
        
        if (!chatDoc.exists()) {
          transaction.set(chatRef, {
            users: [currentUserId, partnerId],
            ...updateData
          });
        } else {
          transaction.update(chatRef, updateData);
        }
      });
      
      await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
        text: text,
        sender: currentUserId,
        createdAt: serverTimestamp()
      });
      
    } catch(e) {
      console.error('Send message error:', e);
      showToast('Failed to send message');
    }
  };

  // ===== SEND IMAGE =====
  window.sendImage = async function(e) {
    const file = e.target.files[0];
    if (!file || !currentChatId) return;
    
    const reader = new FileReader();
    reader.onload = async function(ev) {
      try {
        const chatRef = doc(db, 'chats', currentChatId);
        const partnerId = currentPartner?.replace('@','');
        
        await runTransaction(db, async (transaction) => {
          const chatDoc = await transaction.get(chatRef);
          const updateData = {
            lastMessage: '📷 Photo',
            lastTime: serverTimestamp(),
            [`unread_${partnerId}`]: increment(1)
          };
          
          if (!chatDoc.exists()) {
            transaction.set(chatRef, {
              users: [currentUserId, partnerId],
              ...updateData
            });
          } else {
            transaction.update(chatRef, updateData);
          }
        });
        
        await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
          imageUrl: ev.target.result,
          sender: currentUserId,
          createdAt: serverTimestamp()
        });
        
      } catch(e) {
        console.error('Send image error:', e);
        showToast('Failed to send image');
      }
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  // ===== VOICE & CALL =====
  window.toggleVoice = function() { 
    showToast('Voice message coming soon! 🎤'); 
  };
  
  window.startCall = function(type) { 
    showToast(`📞 ${type} call coming soon!`); 
  };

  // ===== FILTER CHATS =====
  window.filterChats = function() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    const items = document.querySelectorAll('.user-list-item');
    let visibleCount = 0;
    
    items.forEach(item => {
      const name = item.querySelector('.user-name')?.textContent.toLowerCase() || '';
      const lastMsg = item.querySelector('.user-last-msg')?.textContent.toLowerCase() || '';
      
      if (searchTerm === '' || name.includes(searchTerm) || lastMsg.includes(searchTerm)) {
        item.classList.remove('hidden');
        visibleCount++;
      } else {
        item.classList.add('hidden');
      }
    });
    
    const container = document.getElementById('chatList');
    const existingEmpty = container.querySelector('.search-empty-state');
    if (visibleCount === 0 && searchTerm !== '') {
      if (!existingEmpty) {
        const div = document.createElement('div');
        div.className = 'empty-state search-empty-state';
        div.innerHTML = `<i class="fas fa-search"></i><p>No chats found for "${searchTerm}"</p>`;
        container.appendChild(div);
      } else {
        existingEmpty.style.display = 'block';
        existingEmpty.innerHTML = `<i class="fas fa-search"></i><p>No chats found for "${searchTerm}"</p>`;
      }
    } else if (existingEmpty) {
      existingEmpty.style.display = 'none';
    }
  };

  window.clearSearch = function() {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').classList.remove('show');
    filterChats();
  };

  document.getElementById('searchInput').addEventListener('input', function() {
    document.getElementById('searchClear').classList.toggle('show', this.value.length > 0);
  });
  
  document.getElementById('chatInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
  });

  // ============================================================
  // NEW CHAT MODAL
  // ============================================================
  async function loadAllUsers() {
    try {
      const q = query(collection(db, 'users'));
      const snapshot = await getDocs(q);
      allUsers = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        const username = data.username || '';
        if (username && username !== currentUser.username) {
          allUsers.push({
            id: doc.id,
            username: username,
            name: data.name || cleanUsername(username),
            avatar: data.avatar || null
          });
        }
      });
      usersLoaded = true;
      renderNewChatList();
    } catch (error) {
      console.error('Error loading users:', error);
      document.getElementById('newChatList').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Error loading users</p></div>`;
    }
  }

  async function loadRequests() {
    try {
      const q = query(
        collection(db, 'message_requests'),
        where('toId', '==', currentUserId),
        where('status', '==', 'pending')
      );
      const snapshot = await getDocs(q);
      pendingRequests = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        pendingRequests.push({
          id: doc.id,
          from: data.from,
          fromName: data.fromName,
          fromAvatar: data.fromAvatar,
          fromId: data.fromId
        });
      });
      const badge = document.getElementById('requestBadge');
      if (pendingRequests.length > 0) {
        badge.textContent = pendingRequests.length;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    } catch (error) {
      console.error('Error loading requests:', error);
    }
  }

  window.sendChatRequest = async function(username, btn) {
    try {
      const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');
      const fromName = profile.name || cleanUsername(currentUser.username);
      
      if (sentRequests.includes(username)) {
        showToast('Request already sent');
        return;
      }
      
      await addDoc(collection(db, 'message_requests'), {
        from: currentUser.username,
        fromName: fromName,
        fromAvatar: profile.avatar || null,
        fromId: currentUserId,
        to: username,
        toId: username.replace('@', ''),
        status: 'pending',
        createdAt: serverTimestamp()
      });
      
      sentRequests.push(username);
      showToast(`✅ Request sent to ${cleanUsername(username)}`);
      
      if (btn) {
        btn.textContent = '⏳ Requested';
        btn.className = 'new-chat-action requested';
        btn.disabled = true;
      }
      
      await loadRequests();
      renderNewChatList();
    } catch (error) {
      console.error('Send request error:', error);
      showToast('Failed to send request');
    }
  };

  window.acceptRequest = async function(requestId, fromUser) {
    try {
      await deleteDoc(doc(db, 'message_requests', requestId));
      
      const partnerId = fromUser.replace('@', '');
      const chatId = [currentUserId, partnerId].sort().join('_');
      const chatRef = doc(db, 'chats', chatId);
      
      await setDoc(chatRef, {
        users: [currentUserId, partnerId],
        lastMessage: '🎉 You are now connected!',
        lastTime: serverTimestamp(),
        [`unread_${partnerId}`]: 1
      });
      
      await addDoc(collection(db, 'chats', chatId, 'messages'), {
        text: '🎉 You are now connected! Start chatting.',
        sender: 'system',
        createdAt: serverTimestamp()
      });
      
      showToast(`✅ Accepted request from ${cleanUsername(fromUser)}`);
      
      await loadRequests();
      await loadSentRequests();
      
      closeNewChat();
      await openChat(fromUser);
    } catch (error) {
      console.error('Accept request error:', error);
      showToast('Failed to accept request');
    }
  };

  window.declineRequest = async function(requestId) {
    try {
      await deleteDoc(doc(db, 'message_requests', requestId));
      showToast('Request declined');
      await loadRequests();
      if (activeTab === 'requests') renderNewChatList();
    } catch (error) {
      console.error('Decline request error:', error);
      showToast('Failed to decline request');
    }
  };

  function renderNewChatList() {
    const container = document.getElementById('newChatList');
    const searchTerm = document.getElementById('newChatSearch').value.toLowerCase().trim();
    
    if (activeTab === 'users') {
      let filtered = allUsers;
      if (searchTerm) {
        filtered = allUsers.filter(u => 
          u.username.toLowerCase().includes(searchTerm) || 
          (u.name || '').toLowerCase().includes(searchTerm)
        );
      }
      
      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i><p>${searchTerm ? 'No users found for "' + searchTerm + '"' : 'No users available'}</p></div>`;
        return;
      }
      
      container.innerHTML = filtered.map(u => {
        const isExistingChat = existingChatsMap[u.username];
        const isRequested = sentRequests.includes(u.username);
        
        let actionBtn = '';
        if (isExistingChat) {
          actionBtn = `<button class="new-chat-action chat" onclick="event.stopPropagation();startChatWith('${u.username}')">
            <i class="fas fa-comment"></i> Chat
          </button>`;
        } else if (isRequested) {
          actionBtn = `<button class="new-chat-action requested" disabled>
            <i class="fas fa-clock"></i> Requested
          </button>`;
        } else {
          actionBtn = `<button class="new-chat-action request-btn" onclick="event.stopPropagation();window.sendChatRequest('${u.username}', this)">
            <i class="fas fa-paper-plane"></i> Request
          </button>`;
        }
        
        return `
          <div class="new-chat-item" onclick="window.location.href='profile.html?user=${encodeURIComponent(u.username)}'">
            <div class="new-chat-avatar">
              ${u.avatar ? `<img src="${u.avatar}" style="width:100%;height:100%;object-fit:cover;">` : '<i class="fas fa-user"></i>'}
            </div>
            <div class="new-chat-info">
              <div class="new-chat-name">${u.name || cleanUsername(u.username)}</div>
              <div class="new-chat-sub">${u.username}</div>
            </div>
            <div class="new-chat-actions">
              ${actionBtn}
            </div>
          </div>
        `;
      }).join('');
    } else {
      if (pendingRequests.length === 0) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-envelope-open"></i><p>No pending requests</p></div>';
        return;
      }
      
      container.innerHTML = pendingRequests.map(r => `
        <div class="new-chat-item">
          <div class="new-chat-avatar" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'">
            ${r.fromAvatar ? `<img src="${r.fromAvatar}" style="width:100%;height:100%;object-fit:cover;">` : '<i class="fas fa-user"></i>'}
          </div>
          <div class="new-chat-info" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'">
            <div class="new-chat-name">${r.fromName || cleanUsername(r.from)}</div>
            <div class="new-chat-sub">${r.from}</div>
          </div>
          <div class="new-chat-actions">
            <button class="new-chat-action accept" onclick="event.stopPropagation();acceptRequest('${r.id}', '${r.from}')">
              <i class="fas fa-check"></i> Accept
            </button>
            <button class="new-chat-action decline" onclick="event.stopPropagation();declineRequest('${r.id}')">
              <i class="fas fa-times"></i> Decline
            </button>
          </div>
        </div>
      `).join('');
    }
  }

  window.startChatWith = async function(username) {
    closeNewChat();
    const partnerId = username.replace('@', '');
    const chatId = [currentUserId, partnerId].sort().join('_');
    
    const chatRef = doc(db, 'chats', chatId);
    const chatSnap = await getDoc(chatRef);
    
    if (!chatSnap.exists()) {
      await setDoc(chatRef, {
        users: [currentUserId, partnerId],
        lastMessage: 'Chat started',
        lastTime: serverTimestamp(),
        [`unread_${partnerId}`]: 1
      });
    }
    
    await openChat(username);
  };

  window.switchTab = function(tab) {
    activeTab = tab;
    document.querySelectorAll('.new-chat-tab').forEach(t => {
      t.classList.toggle('active', t.dataset.tab === tab);
    });
    renderNewChatList();
  };

  window.filterNewChat = function() {
    renderNewChatList();
  };

  window.closeNewChat = function() {
    document.getElementById('newChatOverlay').classList.remove('show');
    isModalOpen = false;
  };

  document.getElementById('newChatBtn').addEventListener('click', async function(e) {
    e.preventDefault();
    e.stopPropagation();
    
    if (isModalOpen) return;
    isModalOpen = true;
    
    const overlay = document.getElementById('newChatOverlay');
    overlay.classList.add('show');
    document.getElementById('newChatSearch').value = '';
    
    activeTab = 'users';
    document.querySelectorAll('.new-chat-tab').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.tab === 'users');
    });
    
    await loadExistingChats();
    await loadSentRequests();
    if (!usersLoaded) {
      await loadAllUsers();
    } else {
      renderNewChatList();
    }
    await loadRequests();
    
    isModalOpen = false;
  });

  document.getElementById('newChatOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('newChatOverlay')) closeNewChat();
  });

  document.getElementById('newChatSearch').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') filterNewChat();
  });

  // ===== INITIALIZE =====
  console.log('🚀 Initializing chat...');
  loadChats();
  loadExistingChats();
  loadSentRequests();
  
  setTimeout(() => {
    loadAllUsers();
    loadRequests();
  }, 1000);
  
  window.addEventListener('resize', () => {
    const isDesktop = window.innerWidth >= 1024;
    if (isDesktop && currentPartner) {
      document.getElementById('topIconsChat').classList.remove('hidden');
      document.getElementById('chatListFull').classList.remove('hidden');
      document.getElementById('searchBarContainer').classList.remove('hidden');
      document.getElementById('floatingNav').style.display = 'flex';
    }
  });
</script>

</body>
</html>
