<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat · Choicho</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="CSS/main.css">
  <style>
    /* ====== GLASSMORPHISM STYLES (Preserved) ====== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    .page {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      position: relative;
    }
    
    .scrollable-content {
      width: 100%;
      max-width: 100%;
      padding-bottom: 80px;
    }
    
    .chat-header {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 1rem;
      background: #000;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      width: 100%;
    }
    .chat-header.show { display: flex; }
    .chat-back {
      width: 2.4rem;
      height: 2.4rem;
      background: #1a1a1a;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #333;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chat-partner-info {
      flex: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chat-partner-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-partner-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .chat-partner-details {
      flex: 1;
      min-width: 0;
    }
    .chat-partner-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }
    .chat-partner-status {
      font-size: 0.65rem;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .chat-partner-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
    }
    .call-btns {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .call-btn {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      position: relative;
    }
    .call-btn:active { transform: scale(0.95); }
    .call-btn.in-call {
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }
    .call-btn .call-dot {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 10px;
      height: 10px;
      background: #4ade80;
      border-radius: 50%;
      border: 2px solid #000;
      display: none;
    }
    .call-btn.in-call .call-dot { display: block; }
    .call-btn.ringing {
      animation: ring 0.8s infinite;
    }
    @keyframes ring {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }
    
    .chat-settings-btn {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .chat-settings-btn:active { transform: scale(0.95); }
    
    .search-bar-container {
      padding: 0.3rem 1rem 0.4rem;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      width: 100vw;
      max-width: 100vw;
      margin-left: 0;
      margin-right: 0;
      box-sizing: border-box;
      display: block;
      position: relative;
      left: 0;
      right: 0;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: #111;
      border-radius: 2rem;
      padding: 0.2rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.08);
      transition: border 0.25s, background 0.25s;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      min-height: 36px;
    }
    .search-bar:focus-within {
      border-color: #FFFC00;
      background: #0a0a0a;
      box-shadow: 0 0 0 3px rgba(255,252,0,0.08);
    }
    .search-bar i {
      color: #666;
      margin-right: 0.5rem;
      font-size: 0.75rem;
      transition: color 0.25s;
      flex-shrink: 0;
    }
    .search-bar:focus-within i { color: #FFFC00; }
    .search-bar input {
      background: transparent;
      border: none;
      color: #fff;
      padding: 0.3rem 0;
      width: 100%;
      min-width: 0;
      font-size: 0.75rem;
      outline: none;
      font-weight: 400;
      letter-spacing: 0.2px;
      box-sizing: border-box;
    }
    .search-bar input::placeholder {
      color: #555;
      font-weight: 300;
      letter-spacing: 0.2px;
      font-size: 0.75rem;
    }
    .search-bar input::-webkit-search-cancel-button {
      -webkit-appearance: none;
      appearance: none;
    }
    
    .chat-list-full {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      width: 100%;
    }
    .chat-list-full.hidden { display: none; }
    .chat-list-header {
      padding: 0.5rem 1rem;
      font-size: 0.6rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .user-list-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      transition: background 0.2s;
      width: 100%;
    }
    .user-list-item:active { background: rgba(255,255,255,0.03); }
    .user-list-item.active { background: rgba(255,252,0,0.06); }
    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-info {
      flex: 1;
      min-width: 0;
    }
    .user-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-name {
      font-size: 0.85rem;
      color: #fff;
      font-weight: 500;
    }
    .user-time {
      font-size: 0.6rem;
      color: #555;
    }
    .user-msg-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
    }
    .user-last-msg {
      font-size: 0.7rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .user-last-msg.unread-msg { color: #fff; font-weight: 500; }
    .unread-count {
      background: #FFFC00;
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    .chat-view.show { display: flex; }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: #000;
      width: 100%;
      padding-bottom: 0;
    }
    .messages-container::-webkit-scrollbar { width: 0; }
    .message-wrapper {
      display: flex;
      flex-direction: column;
      max-width: 85%;
      animation: fadeInUp 0.25s;
      margin-bottom: 0.1rem;
      position: relative;
    }
    .message-wrapper.sent { align-self: flex-end; }
    .message-wrapper.received { align-self: flex-start; }
    .message-wrapper .delete-msg-btn {
      position: absolute;
      top: -8px;
      right: -8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ef4444;
      color: #fff;
      border: none;
      font-size: 0.5rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .message-wrapper:hover .delete-msg-btn,
    .message-wrapper:active .delete-msg-btn { display: flex; }
    .message-wrapper.sent .delete-msg-btn { right: -8px; }
    .message-wrapper.received .delete-msg-btn { left: -8px; right: auto; }
    
    .message-sender-name {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.4);
      margin-bottom: 0.1rem;
      padding-left: 0.5rem;
      padding-right: 0.5rem;
    }
    .message-wrapper.sent .message-sender-name {
      text-align: right;
      color: rgba(0,0,0,0.5);
    }
    .message-content {
      display: flex;
      flex-direction: column;
    }
    .message-wrapper.sent .message-content { align-items: flex-end; }
    .message-wrapper.received .message-content { align-items: flex-start; }
    .message-bubble {
      padding: 0.55rem 0.8rem;
      border-radius: 1.2rem;
      font-size: 0.85rem;
      line-height: 1.3;
      word-break: break-word;
    }
    .sent .message-bubble {
      background: #FFFC00;
      color: #000;
      border-bottom-right-radius: 0.3rem;
    }
    .received .message-bubble {
      background: #111;
      color: #fff;
      border-bottom-left-radius: 0.3rem;
    }
    .message-time {
      font-size: 0.55rem;
      margin-top: 0.1rem;
    }
    .sent .message-time {
      text-align: right;
      color: rgba(0,0,0,0.45);
    }
    .received .message-time { color: rgba(255,255,255,0.35); }
    .message-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 0.8rem;
      cursor: pointer;
    }
    .voice-message-player {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.2rem 0.5rem;
    }
    .voice-message-player audio {
      height: 30px;
      max-width: 150px;
    }
    .voice-message-player audio::-webkit-media-controls-panel {
      background: rgba(255,255,255,0.1);
    }
    
    .empty-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 0.8rem;
    }
    
    .chat-input-area {
      display: none;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.8rem;
      padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0.5rem));
      background: transparent !important;
      border-top: none !important;
      width: 100%;
      margin-top: 0;
      position: relative;
    }
    .chat-input-area.show { display: flex; }
    
    .camera-btn-s {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: transparent !important;
      border: none !important;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 1.1rem;
    }
    .camera-btn-s:hover { color: rgba(255,255,255,0.9); }
    .camera-btn-s:active { transform: scale(0.9); }
    
    .mic-btn-s {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: transparent !important;
      border: none !important;
      color: rgba(255,255,255,0.5);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 1.1rem;
    }
    .mic-btn-s:hover { color: rgba(255,255,255,0.9); }
    .mic-btn-s:active { transform: scale(0.9); }
    .mic-btn-s.recording {
      color: #ef4444 !important;
      animation: pulse 1s infinite;
    }
    
    .chat-input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border-radius: 0;
      border: none !important;
      background: transparent !important;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      min-width: 0;
    }
    .chat-input::placeholder { color: rgba(255,255,255,0.25); }
    .chat-input:focus {
      border: none !important;
      outline: none !important;
    }
    
    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: transparent !important;
      border: none !important;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 1.1rem;
    }
    .send-btn:hover {
      color: #FFFC00;
      transform: scale(1.05);
    }
    .send-btn:active { transform: scale(0.9); }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fab-container {
      position: fixed;
      bottom: 85px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    
    .fab-main {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #FFFC00;
      color: #000;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,252,0,0.3);
      transition: all 0.3s ease;
      position: relative;
    }
    .fab-main:active { transform: scale(0.9); }
    .fab-main .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: #fff;
      font-size: 0.5rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #000;
    }
    .fab-main i { font-size: 0.9rem !important; }
    
    .call-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
    }
    .call-overlay.show { display: flex; }
    .call-overlay .call-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #fff;
      margin-bottom: 1.5rem;
      border: 2px solid rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }
    .call-overlay .call-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .call-overlay .call-avatar .call-avatar-status {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4ade80;
      border: 2px solid #000;
    }
    .call-overlay .call-name {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .call-overlay .call-status {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }
    .call-overlay .call-timer {
      color: #fff;
      font-size: 1.2rem;
      margin-bottom: 2rem;
      font-variant-numeric: tabular-nums;
    }
    .call-overlay .call-actions {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .call-overlay .call-action-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .call-overlay .call-action-btn:active { transform: scale(0.9); }
    .call-overlay .call-action-btn.end-call {
      background: #ef4444;
      color: #fff;
    }
    .call-overlay .call-action-btn.end-call:hover { background: #dc2626; }
    .call-overlay .call-action-btn.mute-call {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .call-overlay .call-action-btn.mute-call:hover { background: rgba(255,255,255,0.2); }
    .call-overlay .call-action-btn.mute-call.muted {
      background: #ef4444;
      color: #fff;
    }
    .call-overlay .call-action-btn.video-toggle {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .call-overlay .call-action-btn.video-toggle:hover { background: rgba(255,255,255,0.2); }
    .call-overlay .call-action-btn.video-toggle.video-off {
      background: #ef4444;
      color: #fff;
    }
    .call-overlay .call-action-btn.speaker-toggle {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .call-overlay .call-action-btn.speaker-toggle:hover { background: rgba(255,255,255,0.2); }
    .call-overlay .call-action-btn.speaker-toggle.speaker-on {
      background: #FFFC00;
      color: #000;
    }
    .call-overlay .call-action-btn.accept-call {
      background: #4ade80;
      color: #000;
    }
    .call-overlay .call-action-btn.accept-call:hover { background: #22c55e; }
    
    .call-overlay .remote-video {
      width: 100%;
      max-width: 400px;
      height: auto;
      border-radius: 1rem;
      background: #111;
      margin-bottom: 1rem;
      display: none;
    }
    .call-overlay .remote-video.show { display: block; }
    .call-overlay .local-video {
      position: absolute;
      bottom: 100px;
      right: 20px;
      width: 120px;
      height: 160px;
      border-radius: 0.8rem;
      background: #111;
      border: 2px solid rgba(255,255,255,0.2);
      object-fit: cover;
      display: none;
    }
    .call-overlay .local-video.show { display: block; }
    
    .incoming-call {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(20px);
      padding: 1.5rem 2rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      z-index: 999;
      display: none;
      align-items: center;
      gap: 1.5rem;
      min-width: 300px;
      max-width: 90%;
    }
    .incoming-call.show {
      display: flex;
      animation: slideUp 0.3s ease;
    }
    .incoming-call .call-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .incoming-call .call-info .caller-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      color: #fff;
      overflow: hidden;
    }
    .incoming-call .call-info .caller-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .incoming-call .call-info .caller-details { color: #fff; }
    .incoming-call .call-info .caller-details .caller-name {
      font-size: 1rem;
      font-weight: 600;
    }
    .incoming-call .call-info .caller-details .call-type {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
    }
    .incoming-call .call-actions {
      display: flex;
      gap: 0.8rem;
    }
    .incoming-call .call-actions button {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .incoming-call .call-actions button:active { transform: scale(0.9); }
    .incoming-call .call-actions .accept-btn {
      background: #4ade80;
      color: #000;
    }
    .incoming-call .call-actions .accept-btn:hover { background: #22c55e; }
    .incoming-call .call-actions .decline-btn {
      background: #ef4444;
      color: #fff;
    }
    .incoming-call .call-actions .decline-btn:hover { background: #dc2626; }
    
    /* ====== GLASSMORPHISM NEW CHAT PANEL ====== */
    .new-chat-panel {
      position: fixed;
      bottom: 150px;
      right: 20px;
      width: 350px;
      max-width: calc(100vw - 40px);
      max-height: 60vh;
      background: rgba(255, 255, 255, 0.02) !important;
      backdrop-filter: blur(50px) saturate(1.8) !important;
      -webkit-backdrop-filter: blur(50px) saturate(1.8) !important;
      border-radius: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.05) !important;
      display: none;

    // ============================================================
    // 5. SECURITY UTILITIES
    // ============================================================
    
    // XSS Prevention - Sanitize input
    function sanitizeInput(input) {
      if (!input) return '';
      const div = document.createElement('div');
      div.textContent = input;
      return div.innerHTML;
    }
    
    // Validate message content
    function validateMessage(text) {
      if (!text || text.trim().length === 0) {
        return { valid: false, error: 'Message cannot be empty' };
      }
      if (text.length > MAX_MESSAGE_LENGTH) {
        return { valid: false, error: `Message exceeds ${MAX_MESSAGE_LENGTH} characters` };
      }
      return { valid: true };
    }
    
    // Validate image file
    function validateImageFile(file) {
      if (!file) return { valid: false, error: 'No file selected' };
      if (!ALLOWED_IMAGE_TYPES.includes(file.type)) {
        return { valid: false, error: 'Invalid image type. Allowed: JPEG, PNG, WebP, GIF' };
      }
      if (file.size > MAX_IMAGE_SIZE) {
        return { valid: false, error: `Image size exceeds ${MAX_IMAGE_SIZE / 1024 / 1024}MB` };
      }
      return { valid: true };
    }
    
    // ============================================================
    // 6. ERROR HANDLING UTILITY
    // ============================================================
    
    function handleError(error, context = 'Unknown') {
      console.error(`❌ ${context}:`, error);
      
      let userMessage = 'Something went wrong. Please try again.';
      if (error.code === 'permission-denied') {
        userMessage = 'You don\'t have permission to perform this action.';
      } else if (error.code === 'not-found') {
        userMessage = 'The requested item was not found.';
      } else if (error.code === 'unavailable') {
        userMessage = 'Service is temporarily unavailable. Please try again later.';
      }
      
      showToast(userMessage);
      return userMessage;
    }

    let toastTimeout = null;
    
    function showToast(message) {
      const toast = DOM.toast;
      if (!toast) return;
      
      toast.textContent = message;
      toast.classList.add('show');
      
      if (toastTimeout) clearTimeout(toastTimeout);
      toastTimeout = setTimeout(() => {
        toast.classList.remove('show');
        toastTimeout = null;
      }, 3000);
    }
    
    window.showToast = showToast;
    
    // ============================================================
    // 8. USERNAME MANAGEMENT
    // ============================================================
    
    async function getUsernameFromId(userId) {
      // Validate userId
      if (!userId) return 'Unknown';
      
      // Check cache first
      if (state.usernameCache[userId]) {
        return state.usernameCache[userId];
      }
      
      // Prevent duplicate fetches
      if (state.userFetchPromises[userId]) {
        return await state.userFetchPromises[userId];
      }
      
      state.userFetchPromises[userId] = (async () => {
        try {
          const userDoc = await getDoc(doc(db, 'users', userId));
          if (userDoc.exists()) {
            const data = userDoc.data();
            const username = data.username || data.displayName || data.name || data.email || userId;
            state.usernameCache[userId] = username;
            return username;
          }
          state.usernameCache[userId] = userId;
          return userId;
        } catch (error) {
          handleError(error, `getUsernameFromId(${userId})`);
          state.usernameCache[userId] = userId;
          return userId;
        } finally {
          delete state.userFetchPromises[userId];
        }
      })();
      
      return await state.userFetchPromises[userId];
    }
    
    async function getUserDisplayName(userId) {
      if (!userId) return 'User';
      
      if (userId === currentUserId) {
        return 'You';
      }
      
      if (state.userDisplayNameCache[userId]) {
        return state.userDisplayNameCache[userId];
      }
      
      try {
        const username = await getUsernameFromId(userId);
        const cleanName = username ? cleanUsername('@' + username) : 'User';
        state.userDisplayNameCache[userId] = cleanName;
        return cleanName;
      } catch (error) {
        handleError(error, 'getUserDisplayName');
        return 'User';
      }
    }

    // ============================================================
    
    // Ensure chat document exists with proper validation
    async function ensureChatExists(chatId, userId1, userId2) {
      if (!chatId || !userId1 || !userId2) {
        throw new Error('Invalid chat parameters');
      }
      
      try {
        const chatRef = doc(db, 'chats', chatId);
        const chatSnap = await getDoc(chatRef);
        
        if (!chatSnap.exists()) {
          console.log(`🆕 Creating new chat: ${chatId}`);
          await setDoc(chatRef, {
            users: [userId1, userId2],
            createdAt: serverTimestamp(),
            lastMessage: '',
            lastTime: serverTimestamp(),
            [`unread_${userId1}`]: 0,
            [`unread_${userId2}`]: 0
          });
          return { exists: false, chatRef };
        }
        
        return { exists: true, chatRef };
      } catch (error) {
        handleError(error, 'ensureChatExists');
        throw error;
      }
    }

    // Send message with validation and rate limiting
    async function sendMessage() {
      const input = DOM.chatInput;
      const text = input.value.trim();
      
      // Validate message
      const validation = validateMessage(text);
      if (!validation.valid) {
        showToast(validation.error);
        return;
      }
      
      if (!state.currentChatId) {
        showToast('No chat selected');
        return;
      }
      
      // Rate limiting
      if (state.isSending || state.sendCooldown) {
        showToast('Please wait before sending another message');
        return;
      }
      
      state.isSending = true;
      state.sendCooldown = true;
      
      try {
        await ensureChatExists(state.currentChatId, currentUserId, state.currentPartnerId);
        
        const chatRef = doc(db, 'chats', state.currentChatId);
        
        // Update chat document with validation
        await setDoc(chatRef, {
          lastMessage: text,
          lastTime: serverTimestamp(),
          [`unread_${state.currentPartnerId}`]: increment(1)
        }, { merge: true });
        
        // Add message with validation
        await addDoc(collection(db, 'chats', state.currentChatId, 'messages'), {
          text: text,
          sender: currentUserId,
          createdAt: serverTimestamp()
        });
        
        // Clear input
        input.value = '';
        showToast('✅ Sent');
        
      } catch (error) {
        handleError(error, 'sendMessage');
      } finally {
        state.isSending = false;
        setTimeout(() => {
          state.sendCooldown = false;
        }, 1000);
        input.disabled = false;
        input.focus();
      }
    }
    
    window.sendMessage = sendMessage;

    // 11. IMAGE UPLOAD (Firebase Storage)
    // ============================================================
    
    // Note: This implementation uses Firebase Storage instead of Base64
    // You'll need to configure Firebase Storage in your firebase-config.js
    
    async function uploadImageToStorage(file) {
      // Validate file
      const validation = validateImageFile(file);
      if (!validation.valid) {
        showToast(validation.error);
        return null;
      }
      
      try {
        // Generate unique filename
        const timestamp = Date.now();
        const randomId = Math.random().toString(36).substring(2, 10);
        const extension = file.name.split('.').pop();
        const filename = `${timestamp}_${randomId}.${extension}`;
        const storagePath = `chat_images/${currentUserId}/${filename}`;
        
        // Import storage
        const { ref, uploadBytes, getDownloadURL } = await import('./js/firebase-storage.js');
        const storageRef = ref(storagePath, storagePath);
        
        // Upload with progress
        const uploadTask = uploadBytes(storageRef, file);
        const snapshot = await uploadTask;
        
        // Get download URL
        const downloadURL = await getDownloadURL(snapshot.ref);
        
        return downloadURL;
        
      } catch (error) {
        handleError(error, 'uploadImageToStorage');
        return null;
      }
    }
    
    // Send image with proper upload

    // 12. VOICE RECORDING
    // ============================================================
    
    async function toggleVoiceRecording() {
      // Check if recording is already in progress
      if (state.isRecordingVoice) {
        if (state.mediaRecorderInstance && state.mediaRecorderInstance.state === 'recording') {
          state.mediaRecorderInstance.stop();
          DOM.micBtn.classList.remove('recording');
          DOM.micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
          state.isRecordingVoice = false;
          showToast('⏹️ Recording stopped');
        }
        return;
      }
      
      if (!state.currentChatId) {
        showToast('No chat selected');
        return;
      }
      
      try {
        // Request microphone permission
        const stream = await navigator.mediaDevices.getUserMedia({ 
          audio: { 
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          } 
        });
        
        state.mediaRecorderInstance = new MediaRecorder(stream, {
          mimeType: 'audio/webm'
        });
        state.recordedChunks = [];
        
        state.mediaRecorderInstance.ondataavailable = (event) => {
          if (event.data.size > 0) {
            state.recordedChunks.push(event.data);
          }
        };
        
        state.mediaRecorderInstance.onstop = async () => {
          // Stop all tracks
          stream.getTracks().forEach(track => track.stop());
          
          if (state.recordedChunks.length === 0) {
            showToast('No voice recorded');
            return;
          }
          
          // Create audio blob
          const blob = new Blob(state.recordedChunks, { type: 'audio/webm' });
          
          // Check size (max 5MB)
          if (blob.size > 5 * 1024 * 1024) {
            showToast('Voice message too large (max 5MB)');
            return;
          }
          
          // Convert to base64 for storage (in production, use Firebase Storage)
          const reader = new FileReader();
          reader.onload = async function(ev) {
            try {
              const voiceUrl = ev.target.result;
              
              await ensureChatExists(state.currentChatId, currentUserId, state.currentPartnerId);
              
              const chatRef = doc(db, 'chats', state.currentChatId);
              await setDoc(chatRef, {
                lastMessage: '🎤 Voice message',
                lastTime: serverTimestamp(),
                [`unread_${state.currentPartnerId}`]: increment(1)
              }, { merge: true });
              
              await addDoc(collection(db, 'chats', state.currentChatId, 'messages'), {
                voiceUrl: voiceUrl,
                sender: currentUserId,
                createdAt: serverTimestamp()
              });
              
              showToast('🎤 Voice message sent');
              
            } catch (error) {
              handleError(error, 'voiceMessageSend');
            }
          };
          reader.readAsDataURL(blob);
        };
        
        // Start recording
        state.mediaRecorderInstance.start();
        state.isRecordingVoice = true;
        DOM.micBtn.classList.add('recording');
        DOM.micBtn.innerHTML = '<i class="fas fa-stop"></i>';
        showToast('🔴 Recording... tap again to stop');
        
      } catch (error) {
        if (error.name === 'NotAllowedError') {
          showToast('⚠️ Microphone permission denied. Please allow microphone access.');
        } else if (error.name === 'NotFoundError') {
          showToast('⚠️ No microphone found. Please connect a microphone.');
        } else {
          handleError(error, 'toggleVoiceRecording');
        }
      }
    }
    
    window.toggleVoiceRecording = toggleVoiceRecording;

    function loadChats() {
      try {
        // Unsubscribe from previous listener
        if (state.unsubChats) {
          state.unsubChats();
          state.unsubChats = null;
        }
        
        const q = query(collection(db, 'chats'), orderBy('lastTime', 'desc'));
        
        state.unsubChats = onSnapshot(q, async (snapshot) => {
          const chats = [];
          
          for (const doc of snapshot.docs) {
            const data = doc.data();
            const docId = doc.id;
            
            // Security: Verify user is part of the chat
            if (data.users && data.users.includes(currentUserId)) {
              const partnerId = data.users.find(id => id !== currentUserId);
              if (partnerId) {
                const partnerUsername = await getUsernameFromId(partnerId);
                chats.push({
                  partnerId: partnerId,
                  partnerUsername: partnerUsername,
                  lastMsg: data.lastMessage || 'No messages',
                  lastTime: data.lastTime?.toDate() || new Date(),
                  unread: data[`unread_${currentUserId}`] || 0,
                  chatId: docId
                });
              }
            }
          }
          
          state.chatListData = chats;
          renderChatList(chats);
          
          const count = chats.length;
          DOM.chatCount.textContent = count ? `(${count})` : '';
          
          applySearchFilter();
          
        }, (error) => {
          handleError(error, 'loadChats');
        });
        
      } catch (error) {
        handleError(error, 'loadChats');
      }
    }

      }, DEBOUNCE_DELAY);

    function applySearchFilter() {
      const search = DOM.searchInput.value.toLowerCase().trim();
      const items = DOM.chatList.querySelectorAll('.user-list-item');
      
      if (!search) {
        items.forEach(item => item.style.display = 'flex');
        return;
      }
      
      items.forEach(item => {
        const nameEl = item.querySelector('.user-name');
        const name = nameEl ? nameEl.textContent.toLowerCase() : '';
        const msgEl = item.querySelector('.user-last-msg');
        const msg = msgEl ? msgEl.textContent.toLowerCase() : '';
        const match = name.includes(search) || msg.includes(search);
        item.style.display = match ? 'flex' : 'none';
      });
    }

    // 16. LOAD MESSAGES
    // ============================================================
    
    function loadMessages() {
      // Unsubscribe from previous listener
      if (state.unsubMessages) {
        state.unsubMessages();
        state.unsubMessages = null;
        state.messageListeners.clear();
      }
      
      if (!state.currentChatId) return;
      
      try {
        const q = query(
          collection(db, 'chats', state.currentChatId, 'messages'),
          orderBy('createdAt', 'asc')
        );
        
        state.unsubMessages = onSnapshot(q, async (snapshot) => {
          const container = DOM.messagesContainer;
          
          if (snapshot.empty) {
            container.innerHTML = '<div class="empty-chat">Send a message to start chatting!</div>';
            return;
          }
          
          // Track existing message IDs to prevent duplicates
          const existingIds = new Set();
          const fragments = container.querySelectorAll('[data-message-id]');
          fragments.forEach(el => {
            const id = el.dataset.messageId;
            if (id) existingIds.add(id);
          });
          
          let hasNewMessages = false;
          
          for (const doc of snapshot.docs) {
            const msg = doc.data();
            const msgId = doc.id;
            
            // Skip if already rendered
            if (existingIds.has(msgId)) continue;
            
            const isSent = msg.sender === currentUserId;
            const senderDisplayName = await getUserDisplayName(msg.sender);
            
            const div = document.createElement('div');
            div.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
            div.dataset.messageId = msgId;
            
            const time = msg.createdAt ? 
              new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            
            let messageHTML = `
              <div class="message-content">
                <div class="message-sender-name">${sanitizeInput(senderDisplayName)}</div>
            `;
            
            if (msg.imageUrl) {
              messageHTML += `
                <div class="message-bubble">
                  <img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')" alt="Image" loading="lazy">
                  <div class="message-time">${time}</div>
                </div>
              `;
            } else if (msg.voiceUrl) {
              messageHTML += `
                <div class="message-bubble">
                  <div class="voice-message-player">
                    <i class="fas fa-play" onclick="this.classList.toggle('fa-play');this.classList.toggle('fa-pause');this.nextElementSibling.play()"></i>
                    <audio controls style="height:30px;max-width:150px;">
                      <source src="${msg.voiceUrl}" type="audio/webm">
                    </audio>
                  </div>
                  <div class="message-time">${time}</div>
                </div>
              `;
            } else {
              messageHTML += `
                <div class="message-bubble">
                  ${sanitizeInput(msg.text || '')}
                  <div class="message-time">${time}</div>
                </div>
              `;
            }
            
            // Only show delete button for own messages
            if (isSent) {
              messageHTML += `
                <button class="delete-msg-btn" onclick="event.stopPropagation();deleteMessage('${msgId}')" aria-label="Delete message">
                  <i class="fas fa-times"></i>
                </button>
              `;
            }
            
            messageHTML += `</div>`;
            div.innerHTML = messageHTML;
            
            // Insert in correct position based on time
            let inserted = false;
            const children = container.children;
            if (children.length > 0) {
              for (let i = children.length - 1; i >= 0; i--) {
                const child = children[i];
                const childId = child.dataset.messageId;
                if (childId) {
                  // Find position based on message order
                  const childDoc = snapshot.docs.find(d => d.id === childId);
                  if (childDoc) {
                    const childData = childDoc.data();
                    const childTime = childData.createdAt?.toDate?.() || new Date(0);
                    const currentTime = msg.createdAt?.toDate?.() || new Date(0);
                    if (currentTime < childTime) {
                      container.insertBefore(div, child);
                      inserted = true;
                      break;
                    }
                  }
                }
              }
            }
            
            if (!inserted) {
              container.appendChild(div);
            }
            
            hasNewMessages = true;
          }
          
          // Scroll to bottom if new messages were added
          if (hasNewMessages) {
            container.scrollTop = container.scrollHeight;
          }
          
        }, (error) => {
          handleError(error, 'loadMessages');
        });
        
      } catch (error) {
        handleError(error, 'loadMessages');
      }
    }

    async function loadPanelUsers() {
      if (activePanelTab !== 'users') return;
      if (state.isLoadingUsers || state.allUsersLoaded) return;
      
      state.isLoadingUsers = true;
      
      try {
        let q;
        if (state.lastVisible) {
          q = query(
            collection(db, 'users'),
            orderBy('createdAt', 'desc'),
            startAfter(state.lastVisible),
            limit(PAGE_SIZE)
          );
        } else {
          q = query(
            collection(db, 'users'),
            orderBy('createdAt', 'desc'),
            limit(PAGE_SIZE)
          );
        }
        
        const snapshot = await getDocs(q);
        
        if (snapshot.empty) {
          state.allUsersLoaded = true;
          if (state.allUsers.length === 0) {
            DOM.newChatPanelList.innerHTML = `
              <div class="new-chat-panel-empty">
                <i class="fas fa-user-slash"></i>
                <p>No users found</p>
              </div>
            `;
          }
          return;
        }
        
        const newUsers = [];
        for (const doc of snapshot.docs) {
          const data = doc.data();
          const userId = doc.id;
          if (userId !== currentUserId) {
            const username = data.username || data.displayName || data.name || userId;
            state.usernameCache[userId] = username;
            newUsers.push({
              id: userId,
              username: username,
              name: data.name || cleanUsername(username),
              avatar: data.avatar
            });
          }
        }
        
        state.lastVisible = snapshot.docs[snapshot.docs.length - 1];
        state.allUsers = [...state.allUsers, ...newUsers];
        
        if (newUsers.length < PAGE_SIZE) {
          state.allUsersLoaded = true;
        }
        
        renderPanelList();
        
      } catch (error) {
        handleError(error, 'loadPanelUsers');
        DOM.newChatPanelList.innerHTML = `
          <div class="new-chat-panel-empty">
            <i class="fas fa-exclamation-triangle"></i>
            <p>Error loading users</p>

        `;

        state.isLoadingUsers = false;
      }
    }

    const callConfiguration = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
      ]
    };
    
    async function createCallDocument(partnerId, type) {
      const callId = `${currentUserId}_${partnerId}_${Date.now()}`;
      const callRef = doc(db, 'calls', callId);
      await setDoc(callRef, {
        from: currentUserId,
        to: partnerId,
        type: type,
        status: 'calling',
        createdAt: serverTimestamp(),
        offer: null,
        answer: null,
        candidates: []
      });
      return callRef;
    }
    
    function listenForCalls() {
      if (state.unsubCalls) {
        state.unsubCalls();
        state.unsubCalls = null;
      }
      
      const q = query(
        collection(db, 'calls'),
        where('to', '==', currentUserId),
        where('status', '==', 'calling')
      );
      
      state.unsubCalls = onSnapshot(q, async (snapshot) => {
        for (const doc of snapshot.docs) {
          const data = doc.data();
          const callerUsername = await getUsernameFromId(data.from);
          showIncomingCall(data.from, callerUsername, data.type, doc.id);
        }
      }, (error) => {
        handleError(error, 'listenForCalls');
      });
    }
    
    function showIncomingCall(fromId, callerName, type, callId) {
      DOM.incomingCallerName.textContent = cleanUsername('@' + callerName);
      DOM.incomingCallType.textContent = type === 'audio' ? '🔊 Audio call' : '📹 Video call';
      DOM.incomingCallerAvatar.innerHTML = getAvatarHTML('@' + callerName);
      
      DOM.incomingCall.dataset.callId = callId;
      DOM.incomingCall.dataset.fromId = fromId;
      DOM.incomingCall.dataset.callType = type;
      
      DOM.incomingCall.classList.add('show');
      document.getElementById('audioCallBtn').classList.add('ringing');
      document.getElementById('videoCallBtn').classList.add('ringing');
    }
    
    async function acceptIncomingCall() {
      const callId = DOM.incomingCall.dataset.callId;
      const fromId = DOM.incomingCall.dataset.fromId;
      const type = DOM.incomingCall.dataset.callType;
      
      DOM.incomingCall.classList.remove('show');
      document.getElementById('audioCallBtn').classList.remove('ringing');
      document.getElementById('videoCallBtn').classList.remove('ringing');
      
      state.isCaller = false;
      state.callType = type;
      state.callDocumentId = callId;
      state.isCallActive = true;
      
      try {
        const constraints = {
          audio: true,
          video: type === 'video'
        };
        
        state.localStream = await navigator.mediaDevices.getUserMedia(constraints);
        
        if (type === 'video') {
          DOM.localVideo.srcObject = state.localStream;
          DOM.localVideo.classList.add('show');
          DOM.videoToggleBtn.style.display = 'flex';
        }
        
        state.peerConnection = new RTCPeerConnection(callConfiguration);
        
        state.localStream.getTracks().forEach(track => {
          state.peerConnection.addTrack(track, state.localStream);
        });
        
        state.peerConnection.ontrack = (event) => {
          state.remoteStream = event.streams[0];
          if (type === 'video') {
            DOM.remoteVideo.srcObject = state.remoteStream;
            DOM.remoteVideo.classList.add('show');
          }
          DOM.callStatus.textContent = 'Connected';
          startCallTimer();
        };
        
        const callRef = doc(db, 'calls', callId);
        const unsub = onSnapshot(callRef, async (snapshot) => {
          const data = snapshot.data();
          if (data && data.offer && !state.peerConnection.currentRemoteDescription) {
            await state.peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
            const answer = await state.peerConnection.createAnswer();
            await state.peerConnection.setLocalDescription(answer);
            await updateDoc(callRef, {
              answer: answer,
              status: 'connected'
            });
          }
          if (data && data.candidates) {
            for (const candidate of data.candidates) {
              try {
                await state.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
              } catch (e) {
                // Ignore invalid candidates
              }
            }
          }
        });
        
        state.peerConnection.onicecandidate = async (event) => {
          if (event.candidate) {
            await updateDoc(callRef, {
              candidates: arrayUnion(event.candidate)
            });
          }
        };
        
        state.peerConnection.onconnectionstatechange = () => {
          if (state.peerConnection.connectionState === 'failed' || 
              state.peerConnection.connectionState === 'disconnected' ||
              state.peerConnection.connectionState === 'closed') {
            endCall();
          }
        };
        
        showCallOverlay(type);
        DOM.callStatus.textContent = 'Connecting...';
        
      } catch (error) {
        handleError(error, 'acceptIncomingCall');
        endCall();
      }
    }
    
    window.acceptIncomingCall = acceptIncomingCall;
    
    async function declineIncomingCall() {
      const callId = DOM.incomingCall.dataset.callId;
      
      DOM.incomingCall.classList.remove('show');
      document.getElementById('audioCallBtn').classList.remove('ringing');
      document.getElementById('videoCallBtn').classList.remove('ringing');

    async function startCall(type) {
      if (!state.currentPartner) {
        showToast('Please select a chat first');
        return;
      }
      
      if (state.isCallActive) {
        showToast('Call already in progress');
        return;
      }
      
      state.isCaller = true;
      state.callType = type;
      state.isCallActive = true;
      
      try {
        const callRef = await createCallDocument(state.currentPartnerId, type);
        state.callDocumentId = callRef.id;
        
        const constraints = {
          audio: true,
          video: type === 'video'
        };
        
        state.localStream = await navigator.mediaDevices.getUserMedia(constraints);
        
        if (type === 'video') {
          DOM.localVideo.srcObject = state.localStream;
          DOM.localVideo.classList.add('show');
          DOM.videoToggleBtn.style.display = 'flex';
        }
        
        state.peerConnection = new RTCPeerConnection(callConfiguration);
        
        state.localStream.getTracks().forEach(track => {
          state.peerConnection.addTrack(track, state.localStream);
        });
        
        state.peerConnection.ontrack = (event) => {
          state.remoteStream = event.streams[0];
          if (type === 'video') {
            DOM.remoteVideo.srcObject = state.remoteStream;
            DOM.remoteVideo.classList.add('show');
          }
          DOM.callStatus.textContent = 'Connected';
          startCallTimer();
        };
        
        const offer = await state.peerConnection.createOffer();
        await state.peerConnection.setLocalDescription(offer);
        await updateDoc(callRef, { offer: offer, status: 'calling' });
        
        const unsub = onSnapshot(callRef, async (snapshot) => {
          const data = snapshot.data();
          if (data && data.answer && !state.peerConnection.currentRemoteDescription) {
            await state.peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
            DOM.callStatus.textContent = 'Connected';
            startCallTimer();
          }
          if (data && data.candidates) {
            for (const candidate of data.candidates) {
              try {
                await state.peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
              } catch (e) {
                // Ignore invalid candidates
              }
            }
          }
          if (data && data.status === 'ended') {
            endCall();
          }
        });
        
        state.peerConnection.onicecandidate = async (event) => {
          if (event.candidate) {
            await updateDoc(callRef, {
              candidates: arrayUnion(event.candidate)
            });
          }
        };
        
        state.peerConnection.onconnectionstatechange = () => {
          if (state.peerConnection.connectionState === 'failed' || 
              state.peerConnection.connectionState === 'disconnected' ||
              state.peerConnection.connectionState === 'closed') {
            endCall();
          }
        };
        
        showCallOverlay(type);
        DOM.callStatus.textContent = 'Calling...';
        
        document.getElementById('audioCallBtn').classList.add('in-call');
        document.getElementById('videoCallBtn').classList.add('in-call');
        showToast(`${type} call started`);
        
      } catch (error) {
        handleError(error, 'startCall');
        state.isCallActive = false;
        endCall();
      }
    }
    
    window.startCall = startCall;
    
    function showCallOverlay(type) {
      DOM.callAvatar.innerHTML = state.currentPartner ? getAvatarHTML(state.currentPartner) : '<i class="fas fa-user"></i>';
      DOM.callName.textContent = state.currentPartner ? cleanUsername(state.currentPartner) : 'Unknown';
      
      if (type === 'video') {
        DOM.remoteVideo.classList.add('show');
        DOM.localVideo.classList.add('show');
        DOM.videoToggleBtn.style.display = 'flex';
      } else {
        DOM.remoteVideo.classList.remove('show');
        DOM.localVideo.classList.remove('show');
        DOM.videoToggleBtn.style.display = 'none';
      }
      
      DOM.callOverlay.classList.add('show');
      DOM.floatingNav.style.display = 'none';
    }
    
    function startCallTimer() {
      state.callSeconds = 0;
      if (state.callTimerInterval) clearInterval(state.callTimerInterval);
      state.callTimerInterval = setInterval(() => {
        state.callSeconds++;
        const mins = String(Math.floor(state.callSeconds / 60)).padStart(2, '0');
        const secs = String(state.callSeconds % 60).padStart(2, '0');
        DOM.callTimer.textContent = `${mins}:${secs}`;
      }, 1000);
    }
    
    async function endCall() {
      state.isCallActive = false;
      
      if (state.callTimerInterval) {
        clearInterval(state.callTimerInterval);
        state.callTimerInterval = null;
      }
      
      state.callSeconds = 0;
      DOM.callTimer.textContent = '00:00';
      DOM.callOverlay.classList.remove('show');
      
      // Show navbar only if chat is not open
      if (DOM.chatView.classList.contains('show')) {
        DOM.floatingNav.style.display = 'none';
      } else {
        DOM.floatingNav.style.display = 'flex';
      }
      
      // Update call status in Firestore
      if (state.callDocumentId) {
        try {
          await updateDoc(doc(db, 'calls', state.callDocumentId), {
            status: 'ended',
            endedAt: serverTimestamp()
          });
        } catch (error) {
          // Ignore if document already deleted
        }
      }
      
      // Clean up video
      DOM.remoteVideo.classList.remove('show');
      DOM.remoteVideo.srcObject = null;
      DOM.localVideo.classList.remove('show');
      DOM.localVideo.srcObject = null;
      DOM.videoToggleBtn.style.display = 'none';
      
      // Clean up peer connection
      if (state.peerConnection) {
        state.peerConnection.close();
        state.peerConnection = null;
      }
      
      // Clean up local stream
      if (state.localStream) {
        state.localStream.getTracks().forEach(track => track.stop());
        state.localStream = null;
      }
      
      state.remoteStream = null;
      state.callDocumentId = null;
      
      document.getElementById('audioCallBtn').classList.remove('in-call');
      document.getElementById('videoCallBtn').classList.remove('in-call');
      
      const muteBtn = DOM.muteBtn;
      muteBtn.classList.remove('muted');
      muteBtn.querySelector('i').className = 'fas fa-microphone';
      state.isMutedCall = false;
      
      DOM.callStatus.textContent = 'Connecting...';
      showToast('Call ended');
    }
    
    window.endCall = endCall;

    function renderPanelList() {
      const searchTerm = DOM.panelSearchInput.value.toLowerCase();
      
      if (activePanelTab === 'users') {
        let filtered = state.allUsers;
        if (searchTerm) {
          filtered = state.allUsers.filter(u => 
            (u.username || '').toLowerCase().includes(searchTerm) || 
            (u.name || '').toLowerCase().includes(searchTerm)
          );
        }
        
        if (filtered.length === 0 && !state.isLoadingUsers) {
          DOM.newChatPanelList.innerHTML = `
            <div class="new-chat-panel-empty">
              <i class="fas fa-user-slash"></i>
              <p>No users found</p>
            </div>
          `;
          return;
        }
        
        let html = filtered.map(u => `
          <div class="new-chat-panel-item" onclick="startChatFromPanel('${u.id}')">
            <div class="new-chat-panel-avatar">
              ${u.avatar ? `<img src="${u.avatar}" alt="${u.username}">` : '<i class="fas fa-user"></i>'}
            </div>
            <div class="new-chat-panel-info">
              <div class="new-chat-panel-name">${sanitizeInput(u.name || cleanUsername(u.username || u.id))}</div>

            </button>

        `).join('');
        
        if (!state.allUsersLoaded && !state.isLoadingUsers) {
          html += `<div class="panel-loading" id="panelLoadMore"><i class="fas fa-spinner"></i> Loading more users...</div>`;
        } else if (state.isLoadingUsers) {
          html += `<div class="panel-loading"><i class="fas fa-spinner"></i> Loading...</div>`;
        }
        
        DOM.newChatPanelList.innerHTML = html;
        
      } else {
        // Requests tab
        if (state.pendingRequests.length === 0) {
          DOM.newChatPanelList.innerHTML = `
            <div class="new-chat-panel-empty">
              <i class="fas fa-envelope-open"></i>
              <p>No pending requests</p>
            </div>
          `;
          return;
        }
        
        DOM.newChatPanelList.innerHTML = state.pendingRequests.map(r => `
          <div class="new-chat-panel-item">
            <div class="new-chat-panel-avatar" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'">
              ${r.fromAvatar ? `<img src="${r.fromAvatar}" alt="${r.from}">` : '<i class="fas fa-user"></i>'}
            </div>
            <div class="new-chat-panel-info" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'">
              <div class="new-chat-panel-name">${sanitizeInput(r.fromName || cleanUsername(r.from))}</div>
              <div class="new-chat-panel-sub">${sanitizeInput(r.from)}</div>
            </div>
            <div style="display:flex;gap:0.3rem;">
              <button class="new-chat-panel-action accept" onclick="event.stopPropagation();acceptRequestFromPanel('${r.id}', '${r.from}')">
                <i class="fas fa-check"></i>
              </button>
              <button class="new-chat-panel-action decline" onclick="event.stopPropagation();declineRequestFromPanel('${r.id}')">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>
        `).join('');
      }
    }
    
    function setupPanelScroll() {
      DOM.newChatPanelList.addEventListener('scroll', function() {
        if (activePanelTab !== 'users') return;
        if (state.isLoadingUsers || state.allUsersLoaded) return;
        
        const scrollTop = this.scrollTop;
        const scrollHeight = this.scrollHeight;
        const clientHeight = this.clientHeight;
        
        if (scrollTop + clientHeight >= scrollHeight - 100) {
          loadPanelUsers();
        }
      });
    }
    
    // ============================================================
    // 23. LOAD REQUESTS
    // ============================================================
    
    async function loadRequests() {
      try {
        const q = query(
          collection(db, 'message_requests'),
          where('toId', '==', currentUserId),
          where('status', '==', 'pending')
        );
        
        const snapshot = await getDocs(q);
        state.pendingRequests = [];
        
        snapshot.forEach(doc => {
          const data = doc.data();
          state.pendingRequests.push({
            id: doc.id,
            from: data.from,
            fromName: data.fromName,
            fromAvatar: data.fromAvatar,
            fromId: data.fromId
          });
        });
        
        const count = state.pendingRequests.length;
        DOM.fabBadge.style.display = count > 0 ? 'flex' : 'none';
        DOM.fabBadge.textContent = count;
        DOM.panelRequestBadge.style.display = count > 0 ? 'inline' : 'none';
        DOM.panelRequestBadge.textContent = count;
        
      } catch (error) {
        handleError(error, 'loadRequests');
      }
    }
    
    // ============================================================
    // 24. CHAT ACTIONS FROM PANEL
    // ============================================================
    
    async function startChatFromPanel(partnerUserId) {
      closeNewChatPanel();
      
      if (!partnerUserId) {
        showToast('Invalid user');
        return;
      }
      
      const chatId = [currentUserId, partnerUserId].sort().join('_');
      
      try {
        await ensureChatExists(chatId, currentUserId, partnerUserId);
        await openChat(partnerUserId, chatId);
      } catch (error) {
        handleError(error, 'startChatFromPanel');
      }
    }
    
    window.startChatFromPanel = startChatFromPanel;
    
    async function acceptRequestFromPanel(requestId, fromUser) {
      try {
        await deleteDoc(doc(db, 'message_requests', requestId));
        await loadRequests();
        renderPanelList();
        showToast(`Accepted request from ${cleanUsername(fromUser)}`);
      } catch (error) {
        handleError(error, 'acceptRequestFromPanel');
      }
    }
    
    window.acceptRequestFromPanel = acceptRequestFromPanel;
    
    async function declineRequestFromPanel(requestId) {
      try {
        await deleteDoc(doc(db, 'message_requests', requestId));
        await loadRequests();
        renderPanelList();
        showToast('Request declined');
      } catch (error) {
        handleError(error, 'declineRequestFromPanel');
      }
    }
    
    window.declineRequestFromPanel = declineRequestFromPanel;
    
    // ============================================================
    // 25. PROFILE NAVIGATION
    // ============================================================
    
    function goToPartnerProfile() {
      if (state.currentPartner) {
        window.location.href = `profile.html?user=${encodeURIComponent(state.currentPartner)}`;
      }
    }
    
    window.goToPartnerProfile = goToPartnerProfile;
    
    // ============================================================
    // 26. KEYBOARD SHORTCUTS
    // ============================================================
    
    DOM.chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    // ============================================================
    // 27. CLOSE PANELS ON OUTSIDE CLICK
    // ============================================================
    
    document.addEventListener('click', function(e) {
      const panel = DOM.newChatPanel;
      const fab = DOM.fabMain;
      if (state.isPanelOpen && panel && fab && !panel.contains(e.target) && !fab.contains(e.target)) {
        closeNewChatPanel();
      }
    });
    
    DOM.chatSettingsOverlay.addEventListener('click', (e) => {
      if (e.target === DOM.chatSettingsOverlay) closeChatSettings();
    });
    
    // ============================================================
    // 28. ERROR BOUNDARY FOR UNCAUGHT ERRORS
    // ============================================================
    
    window.addEventListener('error', (event) => {
      console.error('Uncaught error:', event.error);
      showToast('Something went wrong. Please refresh the page.');
    });
    
    // ============================================================
    // 29. INITIALIZATION
    // ============================================================
    
    console.log('🚀 Chat App Initialized');
    console.log(`👤 User: ${currentUserId}`);
    
    loadChats();
    loadRequests();
    setupPanelScroll();
    listenForCalls();
    
    // ============================================================
    // 30. EXPOSE FUNCTIONS TO GLOBAL SCOPE
    // ============================================================
    
    // Keep existing function references for inline onclick handlers
    window.startCall = startCall;
    window.endCall = endCall;
    window.toggleMute = toggleMute;
    window.toggleSpeaker = toggleSpeaker;
    window.toggleVideo = toggleVideo;
    window.acceptIncomingCall = acceptIncomingCall;
    window.declineIncomingCall = declineIncomingCall;
    window.goBack = goBack;
    window.goToPartnerProfile = goToPartnerProfile;
    window.openChatSettings = openChatSettings;
    window.closeChatSettings = closeChatSettings;
    window.viewContact = viewContact;
    window.toggleMuteSetting = toggleMuteSetting;
    window.blockUser = blockUser;
    window.deleteChat = deleteChat;
    window.clearChat = clearChat;
    window.deleteMessage = deleteMessage;
    window.sendMessage = sendMessage;
    window.sendImage = sendImage;
    window.toggleVoiceRecording = toggleVoiceRecording;
    window.toggleNewChatPanel = toggleNewChatPanel;
    window.closeNewChatPanel = closeNewChatPanel;
    window.openNewChatPanel = openNewChatPanel;
    window.switchPanelTab = switchPanelTab;
    window.filterPanelUsers = filterPanelUsers;
    window.startChatFromPanel = startChatFromPanel;
    window.acceptRequestFromPanel = acceptRequestFromPanel;
    window.declineRequestFromPanel = declineRequestFromPanel;
    window.filterChats = filterChats;
    window.openChat = openChat;
    window.goBack = goBack;
    window.showToast = showToast;
    
    console.log('✅ Chat App Ready');
  </script>
</body>
</html>
