<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat · Choicho</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="CSS/main.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    .page {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      position: relative;
    }
    
    .scrollable-content {
      width: 100%;
      max-width: 100%;
      padding-bottom: 80px;
    }
    
    .chat-header {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 1rem;
      background: #000;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      width: 100%;
    }
    .chat-header.show { display: flex; }
    .chat-back {
      width: 2.4rem;
      height: 2.4rem;
      background: #1a1a1a;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #333;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chat-partner-info {
      flex: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chat-partner-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-partner-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .chat-partner-details {
      flex: 1;
      min-width: 0;
    }
    .chat-partner-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }
    .chat-partner-status {
      font-size: 0.65rem;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .chat-partner-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
    }
    .call-btns {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .call-btn {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .call-btn:active { transform: scale(0.95); }
    .call-btn.in-call {
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    
    .chat-settings-btn {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .chat-settings-btn:active { transform: scale(0.95); }
    
    .search-bar-container {
      padding: 0.3rem 1rem 0.4rem;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      width: 100vw;
      max-width: 100vw;
      margin-left: 0;
      margin-right: 0;
      box-sizing: border-box;
      display: block;
      position: relative;
      left: 0;
      right: 0;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: #111;
      border-radius: 2rem;
      padding: 0.2rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.08);
      transition: border 0.25s, background 0.25s;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      min-height: 36px;
    }
    .search-bar:focus-within {
      border-color: #FFFC00;
      background: #0a0a0a;
      box-shadow: 0 0 0 3px rgba(255,252,0,0.08);
    }
    .search-bar i {
      color: #666;
      margin-right: 0.5rem;
      font-size: 0.75rem;
      transition: color 0.25s;
      flex-shrink: 0;
    }
    .search-bar:focus-within i {
      color: #FFFC00;
    }
    .search-bar input {
      background: transparent;
      border: none;
      color: #fff;
      padding: 0.3rem 0;
      width: 100%;
      min-width: 0;
      font-size: 0.75rem;
      outline: none;
      font-weight: 400;
      letter-spacing: 0.2px;
      box-sizing: border-box;
    }
    .search-bar input::placeholder {
      color: #555;
      font-weight: 300;
      letter-spacing: 0.2px;
      font-size: 0.75rem;
    }
    .search-bar input::-webkit-search-cancel-button {
      -webkit-appearance: none;
      appearance: none;
    }
    
    .chat-list-full {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      width: 100%;
    }
    .chat-list-full.hidden { display: none; }
    .chat-list-header {
      padding: 0.5rem 1rem;
      font-size: 0.6rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .user-list-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      transition: background 0.2s;
      width: 100%;
    }
    .user-list-item:active { background: rgba(255,255,255,0.03); }
    .user-list-item.active { background: rgba(255,252,0,0.06); }
    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-info {
      flex: 1;
      min-width: 0;
    }
    .user-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-name {
      font-size: 0.85rem;
      color: #fff;
      font-weight: 500;
    }
    .user-time {
      font-size: 0.6rem;
      color: #555;
    }
    .user-msg-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
    }
    .user-last-msg {
      font-size: 0.7rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .user-last-msg.unread-msg {
      color: #fff;
      font-weight: 500;
    }
    .unread-count {
      background: #FFFC00;
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    .chat-view.show { display: flex; }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: #000;
      width: 100%;
    }
    .messages-container::-webkit-scrollbar { width: 0; }
    .message-wrapper {
      display: flex;
      max-width: 85%;
      animation: fadeInUp 0.25s;
    }
    .message-wrapper.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message-wrapper.received {
      align-self: flex-start;
    }
    .message-bubble {
      padding: 0.55rem 0.8rem;
      border-radius: 1.2rem;
      font-size: 0.85rem;
      line-height: 1.3;
      word-break: break-word;
    }
    .sent .message-bubble {
      background: #FFFC00;
      color: #000;
      border-bottom-right-radius: 0.3rem;
    }
    .received .message-bubble {
      background: #111;
      color: #fff;
      border-bottom-left-radius: 0.3rem;
    }
    .message-time {
      font-size: 0.55rem;
      margin-top: 0.1rem;
    }
    .sent .message-time {
      text-align: right;
      color: rgba(0,0,0,0.45);
    }
    .received .message-time {
      color: rgba(255,255,255,0.35);
    }
    .message-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 0.8rem;
      cursor: pointer;
    }
    .empty-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 0.8rem;
    }
    .chat-input-area {
      display: none;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.8rem;
      padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0.5rem));
      background: #000;
      border-top: 1px solid rgba(255,255,255,0.06);
      width: 100%;
    }
    .chat-input-area.show { display: flex; }
    .camera-btn-s, .mic-btn-s {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0a0a0a;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      min-width: 0;
    }
    .chat-input:focus { border-color: #FFFC00; }
    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #FFFC00;
      border: none;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .fab-container {
      position: fixed;
      bottom: 85px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    
    .fab-main {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #FFFC00;
      color: #000;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,252,0,0.3);
      transition: all 0.3s ease;
      position: relative;
    }
    .fab-main:active {
      transform: scale(0.9);
    }
    .fab-main .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: #fff;
      font-size: 0.5rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #000;
    }
    
    .fab-main i {
      font-size: 0.9rem !important;
    }
    
    /* Call Overlay */
    .call-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
    }
    .call-overlay.show {
      display: flex;
    }
    .call-overlay .call-avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #fff;
      margin-bottom: 1.5rem;
      border: 2px solid rgba(255,255,255,0.1);
    }
    .call-overlay .call-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .call-overlay .call-name {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }
    .call-overlay .call-status {
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .call-overlay .call-timer {
      color: #fff;
      font-size: 1.2rem;
      margin-bottom: 2rem;
      font-variant-numeric: tabular-nums;
    }
    .call-overlay .call-actions {
      display: flex;
      gap: 2rem;
    }
    .call-overlay .call-action-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .call-overlay .call-action-btn:active {
      transform: scale(0.9);
    }
    .call-overlay .call-action-btn.end-call {
      background: #ef4444;
      color: #fff;
    }
    .call-overlay .call-action-btn.end-call:hover {
      background: #dc2626;
    }
    .call-overlay .call-action-btn.mute-call {
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    .call-overlay .call-action-btn.mute-call:hover {
      background: rgba(255,255,255,0.2);
    }
    .call-overlay .call-action-btn.mute-call.muted {
      background: #ef4444;
      color: #fff;
    }
    
    /* ========== ULTRA GLASSMORPHISM ========== */
    .new-chat-panel {
      position: fixed;
      bottom: 150px;
      right: 20px;
      width: 350px;
      max-width: calc(100vw - 40px);
      max-height: 60vh;
      background: rgba(255, 255, 255, 0.05) !important;
      backdrop-filter: blur(40px) saturate(1.8) !important;
      -webkit-backdrop-filter: blur(40px) saturate(1.8) !important;
      border-radius: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.15) !important;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.1) !important;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 101;
    }
    .new-chat-panel.show {
      display: flex;
      animation: slideUp 0.3s ease;
    }
    
    .new-chat-panel-header {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.03);
    }
    .new-chat-panel-header h3 {
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .new-chat-panel-close {
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 1.2rem;
      transition: color 0.2s;
      background: none;
      border: none;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .new-chat-panel-close:hover { color: #fff; }
    
    .new-chat-panel-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255, 255, 255, 0.02);
    }
    .new-chat-panel-tab {
      flex: 1;
      text-align: center;
      padding: 0.6rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .new-chat-panel-tab.active {
      color: #fff;
      border-bottom-color: #FFFC00;
    }
    .new-chat-panel-tab .tab-badge {
      background: #ef4444;
      color: #fff;
      font-size: 0.5rem;
      border-radius: 10px;
      padding: 0.05rem 0.4rem;
      margin-left: 0.3rem;
    }
    
    .new-chat-panel-search {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(255, 255, 255, 0.02);
    }
    .new-chat-panel-search input {
      width: 100%;
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-size: 0.75rem;
      outline: none;
      box-sizing: border-box;
      backdrop-filter: blur(10px);
    }
    .new-chat-panel-search input:focus {
      border-color: #FFFC00;
      background: rgba(255, 255, 255, 0.1);
    }
    .new-chat-panel-search input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    
    .new-chat-panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.3rem 0;
      background: rgba(255, 255, 255, 0.02);
    }
    .new-chat-panel-list::-webkit-scrollbar {
      width: 3px;
    }
    .new-chat-panel-list::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
    }
    .new-chat-panel-list::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .new-chat-panel-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    }
    .new-chat-panel-item:active {
      background: rgba(255, 255, 255, 0.08);
    }
    .new-chat-panel-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #fff;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .new-chat-panel-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .new-chat-panel-info {
      flex: 1;
      min-width: 0;
    }
    .new-chat-panel-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .new-chat-panel-sub {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.4);
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    .new-chat-panel-action {
      padding: 0.25rem 0.8rem;
      border-radius: 1.5rem;
      font-size: 0.6rem;
      font-weight: 600;
      cursor: pointer;
      background: rgba(255,252,0,0.15);
      border: 1px solid rgba(255,252,0,0.3);
      color: #FFFC00;
      transition: all 0.2s;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
    }
    .new-chat-panel-action:active {
      transform: scale(0.95);
    }
    .new-chat-panel-action.accept {
      background: rgba(74,222,128,0.15);
      border-color: rgba(74,222,128,0.3);
      color: #4ade80;
    }
    .new-chat-panel-action.decline {
      background: rgba(239,68,68,0.15);
      border-color: rgba(239,68,68,0.3);
      color: #ef4444;
    }
    .new-chat-panel-empty {
      text-align: center;
      padding: 2rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    
    .panel-loading {
      text-align: center;
      padding: 1rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.7rem;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }
    .panel-loading i {
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 0.5rem;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .chat-settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .chat-settings-overlay.show { display: flex; }
    .chat-settings-modal {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      border-radius: 1.5rem;
      width: 100%;
      max-width: 400px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    .chat-settings-header {
      padding: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);

<body>

    <!-- Chat Input Area -->

          <div class="chat-settings-item" onclick="showToast('Search in conversation')">

        <a href="chat.html" class="active"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html"><i class="fas fa-user"></i></a>

  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { timeAgo, cleanUsername, getAvatarHTML, requireAuth } from './js/common.js';
    import { getCurrentUser } from './js/auth.js';
    import { collection, query, orderBy, onSnapshot, doc, getDoc, setDoc, addDoc, updateDoc, increment, serverTimestamp, where, getDocs, deleteDoc, limit, startAfter } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    
    if (!requireAuth()) window.location.replace('login.html');
    
    const currentUser = getCurrentUser();
    const currentUserId = currentUser.uid;
    let currentPartner = null;
    let currentChatId = null;
    let unsubMessages = null;
    let allUsers = [];
    let pendingRequests = [];
    let activePanelTab = 'users';
    let chatListData = [];
    let isMutedSetting = false;
    let isPanelOpen = false;
    let isCallActive = false;
    let callType = null;
    let callTimerInterval = null;
    let callSeconds = 0;
    let isMutedCall = false;
    let localStream = null;
    let peerConnection = null;
    
    // ========== TOAST FUNCTION ==========
    function showToast(message) {
      const toast = document.getElementById('toast');
      if (!toast) return;
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(toast._timeout);
      toast._timeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 2500);
    }
    
    // Make showToast globally available
    window.showToast = showToast;
    
    // ========== INFINITE SCROLL VARIABLES ==========
    let lastVisible = null;
    let isLoadingUsers = false;
    let allUsersLoaded = false;
    const PAGE_SIZE = 50;
    
    // ========== RAILWAY BACKEND CONFIGURATION ==========
    // Replace this with your actual Railway backend URL
    const BACKEND_URL = 'https://choicho-backend-production.up.railway.app';
    
    // ========== CALL FUNCTIONS ==========
    
    // Default STUN configuration (Fallback ആയി ഉപയോഗിക്കാൻ)
    let configuration = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' }
      ]
    };
    
    window.startCall = async function(type) {
      if (!currentPartner) {
        showToast('Please select a chat first');
        return;
      }
      
      if (isCallActive) {
        showToast('Call already in progress');
        return;
      }
      
      callType = type;
      isCallActive = true;
      
      try {
        // 1. ബാക്ക്എൻഡിൽ നിന്ന് സുരക്ഷിതമായി TURN ക്രെഡൻഷ്യലുകൾ ഫെച്ച് ചെയ്യുന്നു
        showToast('Fetching secure connection settings...');
        
        // Firebase Auth token എടുക്കുന്നു
        const idToken = await currentUser.getIdToken();
        
        try {
          const response = await fetch(`${BACKEND_URL}/turn`, {
            method: 'GET',
            headers: {
              'Authorization': `Bearer ${idToken}`,
              'Content-Type': 'application/json'
            }
          });
          
          if (response.ok) {
            const turnData = await response.json();
            if (turnData && turnData.iceServers) {
              configuration.iceServers = turnData.iceServers;
              console.log('Secure TURN credentials loaded successfully.');
            } else if (turnData && turnData.turn && turnData.turn.url) {
              configuration.iceServers = [
                { urls: turnData.turn.url },
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
              ];
            }
          } else {
            console.warn('Failed to fetch TURN credentials, using fallback STUN.');
          }
        } catch (fetchError) {
          console.error('Backend fetch error, falling back to STUN:', fetchError);
        }

        // 2. ക്യാമറ, മൈക്രോഫോൺ പെർമിഷൻ എടുക്കുന്നു
        const constraints = {
          audio: true,
          video: type === 'video'
        };
        
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        
        // 3. ലഭിച്ച പുതിയ സുരക്ഷിതമായ കോൺഫിഗറേഷൻ ഉപയോഗിച്ച് Peer Connection നിർമ്മിക്കുന്നു
        peerConnection = new RTCPeerConnection(configuration);
        
        // Local stream ട്രാക്കുകൾ കണക്ഷനിലേക്ക് ചേർക്കുന്നു
        localStream.getTracks().forEach(track => {
          peerConnection.addTrack(track, localStream);
        });
        
        // WebRTC Offer ക്രിയേറ്റ് ചെയ്യുന്നു
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        // Call Overlay സ്ക്രീനിൽ കാണിക്കുന്നു
        showCallOverlay(type);
        
        // കണക്ഷൻ സ്റ്റാറ്റസ് അപ്ഡേറ്റ് ചെയ്യുന്നു
        setTimeout(() => {
          if (isCallActive) {
            document.getElementById('callStatus').textContent = 'Connected';
            startCallTimer();
          }
        }, 2000);
        
        // Handle ICE candidates
        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            console.log('ICE candidate generated:', event.candidate);
          }
        };
        
        // Handle remote stream
        peerConnection.ontrack = (event) => {
          console.log('Remote track received');
        };
        
        // Connection state മാറ്റങ്ങൾ നിരീക്ഷിക്കുന്നു
        peerConnection.onconnectionstatechange = () => {
          console.log('Connection state:', peerConnection.connectionState);
          if (peerConnection.connectionState === 'failed' || 
              peerConnection.connectionState === 'disconnected' ||
              peerConnection.connectionState === 'closed') {
            endCall();
          }
        };
        
        // ബട്ടണുകളുടെ സ്റ്റൈൽ മാറ്റുന്നു
        document.getElementById('audioCallBtn').classList.add('in-call');
        document.getElementById('videoCallBtn').classList.add('in-call');
        
        showToast(`${type} call started`);
        
      } catch (error) {
        console.error('Call error:', error);
        isCallActive = false;
        showToast(`Failed to start ${type} call: ${error.message}`);
        endCall();
      }
    };
    
    function showCallOverlay(type) {
      const overlay = document.getElementById('callOverlay');
      const avatar = document.getElementById('callAvatar');
      const name = document.getElementById('callName');
      const status = document.getElementById('callStatus');
      
      avatar.innerHTML = currentPartner ? getAvatarHTML(currentPartner) : '<i class="fas fa-user"></i>';
      name.textContent = currentPartner ? cleanUsername(currentPartner) : 'Unknown';
      status.textContent = type === 'audio' ? 'Audio calling...' : 'Video calling...';
      
      overlay.classList.add('show');
      document.getElementById('floatingNav').style.display = 'none';
    }
    
    function startCallTimer() {
      callSeconds = 0;
      clearInterval(callTimerInterval);
      callTimerInterval = setInterval(() => {
        callSeconds++;
        const mins = String(Math.floor(callSeconds / 60)).padStart(2, '0');
        const secs = String(callSeconds % 60).padStart(2, '0');
        document.getElementById('callTimer').textContent = `${mins}:${secs}`;
      }, 1000);
    }
    
    window.endCall = function() {
      isCallActive = false;
      clearInterval(callTimerInterval);
      callSeconds = 0;
      document.getElementById('callTimer').textContent = '00:00';
      document.getElementById('callOverlay').classList.remove('show');
      document.getElementById('floatingNav').style.display = 'flex';
      
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      
      document.getElementById('audioCallBtn').classList.remove('in-call');
      document.getElementById('videoCallBtn').classList.remove('in-call');
      
      const muteBtn = document.getElementById('muteBtn');
      muteBtn.classList.remove('muted');
      muteBtn.querySelector('i').className = 'fas fa-microphone';
      isMutedCall = false;
      
      document.getElementById('callStatus').textContent = 'Connecting...';
      showToast('Call ended');
    };
    
    window.toggleMute = function() {
      if (!localStream) return;
      
      isMutedCall = !isMutedCall;
      const muteBtn = document.getElementById('muteBtn');
      
      localStream.getAudioTracks().forEach(track => {
        track.enabled = !isMutedCall;
      });
      
      if (isMutedCall) {
        muteBtn.classList.add('muted');
        muteBtn.querySelector('i').className = 'fas fa-microphone-slash';
        showToast('Microphone muted');
      } else {
        muteBtn.classList.remove('muted');
        muteBtn.querySelector('i').className = 'fas fa-microphone';
        showToast('Microphone unmuted');
      }
    };
    
    // ========== LOAD CHATS ==========
    async function loadChats() {
      try {
        const q = query(collection(db, 'chats'), orderBy('lastTime', 'desc'));
        onSnapshot(q, (snapshot) => {
          const chats = [];
          snapshot.forEach(doc => {
            const data = doc.data();
            const ids = doc.id.split('_');
            if (ids.includes(currentUserId)) {
              const partnerId = ids.find(i => i !== currentUserId);
              if (partnerId && data.lastMessage !== undefined) {
                chats.push({
                  partnerId: '@' + partnerId,
                  lastMsg: data.lastMessage || 'No messages',
                  lastTime: data.lastTime?.toDate() || new Date(),
                  unread: data[`unread_${currentUserId}`] || 0
                });
              }
            }
          });
          chatListData = chats;
          renderChatList(chats);
          document.getElementById('chatCount').textContent = chats.length ? `(${chats.length})` : '';
          applySearchFilter();
        });
      } catch (error) {
        console.error('Error loading chats:', error);
        showToast('Error loading chats');
      }
    }
    
    function renderChatList(chats) {
      const container = document.getElementById('chatList');
      if (!chats.length) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-comment-slash"></i><p>No messages yet</p><p style="font-size:0.65rem;margin-top:0.5rem;">Tap + to start a chat</p></div>';
        return;
      }
      container.innerHTML = chats.map(c => `
        <div class="user-list-item ${currentPartner === c.partnerId ? 'active' : ''}" data-partner="${c.partnerId}" onclick="openChat('${c.partnerId}')">
          <div class="user-avatar" onclick="event.stopPropagation();window.location.href='profile.html?user=${encodeURIComponent(c.partnerId)}'">
            ${getAvatarHTML(c.partnerId)}
          </div>
          <div class="user-info">
            <div class="user-name-row">
              <span class="user-name">${cleanUsername(c.partnerId)}</span>
              <span class="user-time">${timeAgo(c.lastTime)}</span>
            </div>
            <div class="user-msg-row">
              <span class="user-last-msg ${c.unread > 0 ? 'unread-msg' : ''}">${c.lastMsg.substring(0, 40)}</span>
              ${c.unread > 0 ? `<div class="unread-count">${c.unread}</div>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }
    
    // ========== SEARCH FILTER ==========
    window.filterChats = function() {
      applySearchFilter();
    };
    
    function applySearchFilter() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const items = document.querySelectorAll('#chatList .user-list-item');
      
      if (!search) {
        items.forEach(item => item.style.display = 'flex');
        return;
      }
      
      items.forEach(item => {
        const nameEl = item.querySelector('.user-name');
        const name = nameEl ? nameEl.textContent.toLowerCase() : '';
        const msgEl = item.querySelector('.user-last-msg');
        const msg = msgEl ? msgEl.textContent.toLowerCase() : '';
        const match = name.includes(search) || msg.includes(search);
        item.style.display = match ? 'flex' : 'none';
      });
    }
    
    // ========== OPEN CHAT ==========
    window.openChat = async function(partner) {
      currentPartner = partner;
      const partnerId = partner.replace('@','');
      currentChatId = [currentUserId, partnerId].sort().join('_');
      
      try {
        await updateDoc(doc(db, 'chats', currentChatId), { [`unread_${currentUserId}`]: 0 }).catch(() => {});
      } catch (error) {
        console.error('Error updating read status:', error);
      }
      
      document.getElementById('topIcons').style.display = 'none';
      document.getElementById('chatHeader').classList.add('show');
      document.getElementById('chatListFull').classList.add('hidden');
      document.getElementById('searchBarContainer').classList.add('hidden');
      document.getElementById('chatView').classList.add('show');
      document.getElementById('chatInputArea').classList.add('show');
      document.getElementById('floatingNav').style.display = 'none';
      document.getElementById('partnerName').textContent = cleanUsername(partner);
      
      document.getElementById('fabContainer').style.display = 'none';
      closeNewChatPanel();
      
      const avatarContainer = document.getElementById('partnerAvatar');
      avatarContainer.innerHTML = getAvatarHTML(partner);
      
      if (unsubMessages) unsubMessages();
      
      try {
        const q = query(collection(db, 'chats', currentChatId, 'messages'), orderBy('createdAt', 'asc'));
        unsubMessages = onSnapshot(q, (snapshot) => {
          const container = document.getElementById('messagesContainer');
          if (snapshot.empty) {
            container.innerHTML = '<div class="empty-chat">Send a message to start chatting!</div>';
            return;
          }
          container.innerHTML = '';
          snapshot.forEach(doc => {
            const msg = doc.data();
            const isSent = msg.sender === currentUserId;
            const div = document.createElement('div');
            div.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
            let time = msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            if (msg.imageUrl) {
              div.innerHTML = `<div class="message-bubble"><img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')"><div class="message-time">${time}</div></div>`;
            } else {
              div.innerHTML = `<div class="message-bubble">${escapeHTML(msg.text || '')}<div class="message-time">${time}</div></div>`;
            }
            container.appendChild(div);
          });
          container.scrollTop = container.scrollHeight;
        });
      } catch (error) {
        console.error('Error loading messages:', error);
        showToast('Error loading messages');
      }
    };
    
    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    // ========== SEND MESSAGE ==========
    window.sendMessage = async function() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      
      if (!text) {
        showToast('Please enter a message');
        return;
      }
      
      if (!currentChatId) {
        showToast('No chat selected');
        return;
      }
      
      input.value = '';
      input.disabled = true;
      
      try {
        const partnerId = currentPartner.replace('@','');
        const chatRef = doc(db, 'chats', currentChatId);
        
        await setDoc(chatRef, {
          lastMessage: text,
          lastTime: serverTimestamp(),
          [`unread_${partnerId}`]: increment(1)
        }, { merge: true });
        
        await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
          text: text,
          sender: currentUserId,
          createdAt: serverTimestamp()
        });
        
      } catch(error) {
        console.error('Send error:', error);
        showToast('Failed to send message');
        input.value = text;
      } finally {
        input.disabled = false;
        input.focus();
      }
    };
    
    window.sendImage = async function(e) {
      const file = e.target.files[0];
      if (!file || !currentChatId) {
        showToast('No image selected');
        return;
      }
      
      const reader = new FileReader();
      reader.onload = async function(ev) {
        try {
          const partnerId = currentPartner.replace('@','');
          const chatRef = doc(db, 'chats', currentChatId);
          
          await setDoc(chatRef, {
            lastMessage: '📷 Photo',
            lastTime: serverTimestamp(),
            [`unread_${partnerId}`]: increment(1)
          }, { merge: true });
          
          await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
            imageUrl: ev.target.result,
            sender: currentUserId,
            createdAt: serverTimestamp()
          });
          
          showToast('Image sent');
        } catch(error) {
          console.error('Image send error:', error);
          showToast('Failed to send image');
        }
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    };
    
    window.toggleVoice = function() {
      showToast('Voice message coming soon! 🎤');
    };
    
    // ========== GO BACK ==========
    window.goBack = function() {
      if (unsubMessages) {
        unsubMessages();
        unsubMessages = null;
      }
      if (isCallActive) {
        endCall();
      }
      currentPartner = null;
      currentChatId = null;
      document.getElementById('topIcons').style.display = 'flex';
      document.getElementById('chatHeader').classList.remove('show');
      document.getElementById('chatListFull').classList.remove('hidden');
      document.getElementById('searchBarContainer').classList.remove('hidden');
      document.getElementById('chatView').classList.remove('show');
      document.getElementById('chatInputArea').classList.remove('show');
      document.getElementById('floatingNav').style.display = 'flex';
      document.getElementById('fabContainer').style.display = 'flex';
      document.getElementById('messagesContainer').innerHTML = '<div class="empty-chat">Select a chat to start messaging</div>';
      applySearchFilter();
    };
    
    window.goToPartnerProfile = function() {
      if (currentPartner) window.location.href = `profile.html?user=${encodeURIComponent(currentPartner)}`;
    };
    
    // ========== FLOATING ACTION BUTTON FUNCTIONS ==========
    
    window.toggleNewChatPanel = function() {
      if (isPanelOpen) {
        closeNewChatPanel();
      } else {
        openNewChatPanel();
      }
    };
    
    function openNewChatPanel() {
      isPanelOpen = true;
      document.getElementById('newChatPanel').classList.add('show');
      document.getElementById('fabMain').innerHTML = '<i class="fas fa-times"></i>';
      lastVisible = null;
      allUsersLoaded = false;
      allUsers = [];
      loadPanelUsers();
    }
    
    window.closeNewChatPanel = function() {
      isPanelOpen = false;
      document.getElementById('newChatPanel').classList.remove('show');
      document.getElementById('fabMain').innerHTML = '<i class="fas fa-plus"></i>';
    };
    
    window.switchPanelTab = function(tab) {
      activePanelTab = tab;
      document.querySelectorAll('.new-chat-panel-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      if (tab === 'users') {
        lastVisible = null;
        allUsersLoaded = false;
        allUsers = [];
        loadPanelUsers();
      } else {
        renderPanelList();
      }
    };
    
    window.filterPanelUsers = function() {
      renderPanelList();
    };
    
    // ========== LOAD USERS WITH INFINITE SCROLL ==========
    async function loadPanelUsers() {
      if (activePanelTab !== 'users') return;
      if (isLoadingUsers || allUsersLoaded) return;
      
      isLoadingUsers = true;
      const container = document.getElementById('newChatPanelList');
      
      try {
        let q;
        if (lastVisible) {
          q = query(collection(db, 'users'), orderBy('createdAt', 'desc'), startAfter(lastVisible), limit(PAGE_SIZE));
        } else {
          q = query(collection(db, 'users'), orderBy('createdAt', 'desc'), limit(PAGE_SIZE));
        }
        
        const snapshot = await getDocs(q);
        
        if (snapshot.empty) {
          allUsersLoaded = true;
          if (allUsers.length === 0) {
            container.innerHTML = '<div class="new-chat-panel-empty"><i class="fas fa-user-slash"></i><p>No users found</p></div>';
          }
          return;
        }
        
        const newUsers = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          if (data.username && data.username !== currentUser.username) {
            newUsers.push({
              id: doc.id,
              username: data.username,
              name: data.name || cleanUsername(data.username),
              avatar: data.avatar
            });
          }
        });
        
        lastVisible = snapshot.docs[snapshot.docs.length - 1];
        allUsers = [...allUsers, ...newUsers];
        
        if (newUsers.length < PAGE_SIZE) {
          allUsersLoaded = true;
        }
        
        renderPanelList();
        
      } catch (error) {
        console.error('Error loading users:', error);
        container.innerHTML = '<div class="new-chat-panel-empty"><i class="fas fa-exclamation-triangle"></i><p>Error loading users</p></div>';
      } finally {
        isLoadingUsers = false;
      }
    }
    
    function setupPanelScroll() {
      const list = document.getElementById('newChatPanelList');
      list.addEventListener('scroll', function() {
        if (activePanelTab !== 'users') return;
        if (isLoadingUsers || allUsersLoaded) return;
        
        const scrollTop = this.scrollTop;
        const scrollHeight = this.scrollHeight;
        const clientHeight = this.clientHeight;
        
        if (scrollTop + clientHeight >= scrollHeight - 100) {
          loadPanelUsers();
        }
      });
    }
    
    // ========== LOAD REQUESTS ==========
    async function loadRequests() {
      try {
        pendingRequests = [];
        const q = query(collection(db, 'message_requests'), where('toId', '==', currentUserId), where('status', '==', 'pending'));
        const snapshot = await getDocs(q);
        snapshot.forEach(doc => {
          const data = doc.data();
          pendingRequests.push({
            id: doc.id,
            from: data.from,
            fromName: data.fromName,
            fromAvatar: data.fromAvatar,
            fromId: data.fromId
          });
        });
        
        const badge = document.getElementById('fabBadge');
        const panelBadge = document.getElementById('panelRequestBadge');
        if (pendingRequests.length > 0) {
          badge.style.display = 'flex';
          badge.textContent = pendingRequests.length;
          panelBadge.style.display = 'inline';
          panelBadge.textContent = pendingRequests.length;
        } else {
          badge.style.display = 'none';
          panelBadge.style.display = 'none';
        }
      } catch (error) {
        console.error('Error loading requests:', error);
      }
    }
    
    // ========== RENDER PANEL LIST ==========
    function renderPanelList() {
      const container = document.getElementById('newChatPanelList');
      const searchTerm = document.getElementById('panelSearchInput').value.toLowerCase();
      
      if (activePanelTab === 'users') {
        let filtered = allUsers;
        if (searchTerm) {
          filtered = allUsers.filter(u => 
            u.username.toLowerCase().includes(searchTerm) || 
            (u.name || '').toLowerCase().includes(searchTerm)
          );
        }
        
        if (filtered.length === 0 && !isLoadingUsers) {
          container.innerHTML = '<div class="new-chat-panel-empty"><i class="fas fa-user-slash"></i><p>No users found</p></div>';
          return;
        }
        
        let html = filtered.map(u => `
          <div class="new-chat-panel-item" onclick="startChatFromPanel('${u.username}')">
            <div class="new-chat-panel-avatar">
              ${u.avatar ? `<img src="${u.avatar}">` : '<i class="fas fa-user"></i>'}
            </div>
            <div class="new-chat-panel-info">
              <div class="new-chat-panel-name">${u.name || cleanUsername(u.username)}</div>
              <div class="new-chat-panel-sub">${u.username}</div>
            </div>
            <button class="new-chat-panel-action" onclick="event.stopPropagation();startChatFromPanel('${u.username}')">
              <i class="fas fa-comment"></i> Chat
            </button>
          </div>
        `).join('');
        
        if (!allUsersLoaded && !isLoadingUsers) {
          html += `<div class="panel-loading" id="panelLoadMore"><i class="fas fa-spinner"></i> Loading more users...</div>`;
        } else if (isLoadingUsers) {
          html += `<div class="panel-loading"><i class="fas fa-spinner"></i> Loading...</div>`;
        }
        
        container.innerHTML = html;
        
      } else {
        if (pendingRequests.length === 0) {
          container.innerHTML = '<div class="new-chat-panel-empty"><i class="fas fa-envelope-open"></i><p>No pending requests</p></div>';
          return;
        }
        
        container.innerHTML = pendingRequests.map(r => `
          <div class="new-chat-panel-item">
            <div class="new-chat-panel-avatar" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'">
              ${r.fromAvatar ? `<img src="${r.fromAvatar}">` : '<i class="fas fa-user"></i>'}
            </div>
            <div class="new-chat-panel-info" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'">
              <div class="new-chat-panel-name">${r.fromName || cleanUsername(r.from)}</div>
              <div class="new-chat-panel-sub">${r.from}</div>
            </div>
            <div style="display:flex;gap:0.3rem;">
              <button class="new-chat-panel-action accept" onclick="event.stopPropagation();acceptRequestFromPanel('${r.id}', '${r.from}')">
                <i class="fas fa-check"></i>
              </button>
              <button class="new-chat-panel-action decline" onclick="event.stopPropagation();declineRequestFromPanel('${r.id}')">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>
        `).join('');
      }
    }
    
    // ========== CHAT ACTIONS FROM PANEL ==========
    window.startChatFromPanel = async function(username) {
      closeNewChatPanel();
      const partnerId = username.replace('@', '');
      const chatId = [currentUserId, partnerId].sort().join('_');
      
      try {
        const chatRef = doc(db, 'chats', chatId);
        const chatSnap = await getDoc(chatRef);
        
        if (!chatSnap.exists()) {
          await setDoc(chatRef, {
            users: [currentUserId, partnerId],
            lastMessage: 'Chat started',
            lastTime: serverTimestamp(),
            [`unread_${partnerId}`]: 1,
            [`unread_${currentUserId}`]: 0
          });
        }
        
        await openChat(username);
      } catch(error) {
        console.error('Error starting chat:', error);
        showToast('Failed to start chat');
      }
    };
    
    window.acceptRequestFromPanel = async function(requestId, fromUser) {
      try {
        await deleteDoc(doc(db, 'message_requests', requestId));
        await loadRequests();
        renderPanelList();
        showToast(`Accepted request from ${cleanUsername(fromUser)}`);
      } catch(error) {
        console.error('Error accepting request:', error);
        showToast('Failed to accept request');
      }
    };
    
    window.declineRequestFromPanel = async function(requestId) {
      try {
        await deleteDoc(doc(db, 'message_requests', requestId));
        await loadRequests();
        renderPanelList();
        showToast('Request declined');
      } catch(error) {
        console.error('Error declining request:', error);
        showToast('Failed to decline request');
      }
    };
    
    // ========== CHAT SETTINGS ==========
    window.openChatSettings = function() {
      if (!currentPartner) {
        showToast('No chat selected');
        return;
      }
      document.getElementById('chatSettingsOverlay').classList.add('show');
    };
    
    window.closeChatSettings = function() {
      document.getElementById('chatSettingsOverlay').classList.remove('show');
    };
    
    window.viewContact = function() {
      closeChatSettings();
      if (currentPartner) {
        window.location.href = `profile.html?user=${encodeURIComponent(currentPartner)}`;
      }
    };
    
    window.toggleMuteSetting = function() {
      isMutedSetting = !isMutedSetting;
      const muteText = document.getElementById('muteText');
      if (isMutedSetting) {
        muteText.textContent = 'Unmute Notifications';
        showToast('Chat muted 🔕');
      } else {
        muteText.textContent = 'Mute Notifications';
        showToast('Chat unmuted 🔔');
      }
    };
    
    window.clearChat = function() {
      if (confirm('Clear all messages in this chat?')) {
        closeChatSettings();
        showToast('Chat cleared');
      }
    };
    
    window.blockUser = function() {
      if (confirm('Block this user?')) {
        closeChatSettings();
        showToast('User blocked 🚫');
        goBack();
      }
    };
    
    window.deleteChat = function() {
      if (confirm('Delete this chat permanently?')) {
        closeChatSettings();
        showToast('Chat deleted');
        goBack();
      }
    };
    
    // ========== EVENT LISTENERS ==========
    document.getElementById('chatSettingsOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('chatSettingsOverlay')) closeChatSettings();
    });
    
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendMessage();
      }
    });
    
    document.addEventListener('click', function(e) {
      const panel = document.getElementById('newChatPanel');
      const fab = document.getElementById('fabMain');
      if (isPanelOpen && panel && fab && !panel.contains(e.target) && !fab.contains(e.target)) {
        closeNewChatPanel();
      }
    });
    
    // ========== INITIALIZE ==========
    loadChats();
    loadRequests();
    setupPanelScroll();
  </script>
</body>
</html>
