<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat · Choicho</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="CSS/main.css">
  <style>
    .chat-header { display: none; align-items: center; gap: 0.6rem; padding: 0.8rem 1rem; background: #000; flex-shrink: 0; }
    .chat-header.show { display: flex; }
    .chat-back { width: 2.4rem; height: 2.4rem; background: #1a1a1a; border-radius: 50%; color: #fff; display: flex; align-items: center; justify-content: center; border: 1px solid #333; cursor: pointer; }
    .chat-partner-info { flex: 1; cursor: pointer; }
    .chat-partner-name { font-size: 0.95rem; font-weight: 600; color: #fff; }
    .chat-partner-status { font-size: 0.65rem; color: #4ade80; display: flex; align-items: center; gap: 0.2rem; }
    .call-btns { display: flex; gap: 0.5rem; }
    .call-btn { width: 2.2rem; height: 2.2rem; border-radius: 50%; background: rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; color: #fff; cursor: pointer; border: none; }
    .search-bar-container { padding: 0.3rem 1rem 0.5rem; background: #000; }
    .search-bar { display: flex; align-items: center; gap: 0.5rem; background: #111; border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; padding: 0.45rem 0.8rem; }
    .search-bar input { flex: 1; background: transparent; border: none; color: #fff; font-size: 0.8rem; outline: none; }
    .chat-list-full { display: flex; flex-direction: column; flex: 1; }
    .chat-list-full.hidden { display: none; }
    .user-list-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.7rem 1rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.02); }
    .user-avatar { width: 48px; height: 48px; border-radius: 50%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; overflow: hidden; flex-shrink: 0; }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { flex: 1; }
    .user-name { font-size: 0.85rem; color: #fff; font-weight: 500; }
    .user-last-msg { font-size: 0.7rem; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
    .unread-count { background: #FFFC00; color: #000; font-size: 0.6rem; min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; }
    .chat-view { display: none; flex-direction: column; flex: 1; }
    .chat-view.show { display: flex; }
    .messages-container { flex: 1; overflow-y: auto; padding: 0.8rem; display: flex; flex-direction: column; gap: 0.2rem; background: #000; }
    .message-wrapper { display: flex; max-width: 85%; animation: fadeInUp 0.25s; }
    .message-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
    .message-wrapper.received { align-self: flex-start; }
    .message-bubble { padding: 0.55rem 0.8rem; border-radius: 1.2rem; font-size: 0.85rem; }
    .sent .message-bubble { background: #FFFC00; color: #000; border-bottom-right-radius: 0.3rem; }
    .received .message-bubble { background: #111; color: #fff; border-bottom-left-radius: 0.3rem; }
    .message-time { font-size: 0.55rem; margin-top: 0.1rem; }
    .sent .message-time { justify-content: flex-end; color: rgba(0,0,0,0.45); }
    .chat-input-area { display: none; align-items: center; gap: 0.4rem; padding: 0.5rem 0.8rem; background: #000; border-top: 1px solid rgba(255,255,255,0.06); }
    .chat-input-area.show { display: flex; }
    .chat-input { flex: 1; padding: 0.6rem 1rem; border-radius: 1.5rem; border: 1px solid rgba(255,255,255,0.12); background: #0a0a0a; color: #fff; font-size: 0.85rem; outline: none; }
    .send-btn { width: 38px; height: 38px; border-radius: 50%; background: #FFFC00; border: none; color: #000; cursor: pointer; }
    .empty-chat { flex: 1; display: flex; align-items: center; justify-content: center; color: #333; font-size: 0.8rem; }
    .message-image { max-width: 200px; max-height: 200px; border-radius: 0.8rem; cursor: pointer; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @media (min-width: 1024px) { .chat-list-full, .chat-view { max-width: 550px; margin: 0 auto; width: 100%; } .scrollable-content { padding-left: 5.5rem; } }
  </style>
</head>
<body>
  <div class="page">
    <div class="scrollable-content">
      <div class="top-icons" id="topIcons">
        <div style="width:2.4rem;"></div>
        <span class="top-brand">Chats</span>
        <button class="corner-btn" onclick="window.location.href='search.html'"><i class="fas fa-plus"></i></button>
      </div>
      <div class="chat-header" id="chatHeader">
        <button class="chat-back" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
        <div class="chat-partner-info" onclick="goToPartnerProfile()"><div class="chat-partner-name" id="partnerName"></div><div class="chat-partner-status"><span class="dot"></span> online</div></div>
        <div class="call-btns"><button class="call-btn" onclick="startCall('audio')"><i class="fas fa-phone"></i></button><button class="call-btn" onclick="startCall('video')"><i class="fas fa-video"></i></button></div>
      </div>
      <div class="search-bar-container"><div class="search-bar"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search messages..." oninput="filterChats()"></div></div>
      <div class="chat-list-full" id="chatListFull"><div id="chatList"></div></div>
      <div class="chat-view" id="chatView"><div class="messages-container" id="messagesContainer"><div class="empty-chat">Select a chat</div></div></div>
    </div>
    <div class="chat-input-area" id="chatInputArea"><input type="text" class="chat-input" id="chatInput" placeholder="Message..."><button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button></div>
    <div class="toast" id="toast"></div>
    <nav class="floating-nav"><div class="nav-center"><a href="index.html"><i class="fas fa-home"></i></a><a href="web.html"><i class="fas fa-globe"></i></a><a href="reel.html"><i class="fas fa-film"></i></a><a href="chat.html" class="active"><i class="fas fa-comment-dots"></i></a><a href="profile.html"><i class="fas fa-user"></i></a><a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a><a href="search.html" class="nav-search"><i class="fas fa-search"></i></a></div></nav>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { showToast, timeAgo, cleanUsername, getAvatarHTML, requireAuth } from './js/common.js';
    import { getCurrentUser } from './js/auth.js';
    import { collection, query, orderBy, onSnapshot, doc, getDoc, setDoc, addDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    
    if (!requireAuth()) window.location.replace('login.html');
    
    const currentUser = getCurrentUser();
    const currentUserId = currentUser.uid;
    let currentPartner = null, currentChatId = null, unsubMessages = null;
    
    async function loadChats() {
      const q = query(collection(db, 'chats'), orderBy('lastTime', 'desc'));
      onSnapshot(q, (snapshot) => {
        const chats = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          const ids = doc.id.split('_');
          if (ids.includes(currentUserId)) {
            const partnerId = ids.find(i => i !== currentUserId);
            if (partnerId && data.lastMessage) chats.push({ partnerId: '@' + partnerId, lastMsg: data.lastMessage, lastTime: data.lastTime?.toDate() || new Date(), unread: data[`unread_${currentUserId}`] || 0 });
          }
        });
        renderChatList(chats);
      });
    }
    
    function renderChatList(chats) {
      const container = document.getElementById('chatList');
      if (!chats.length) { container.innerHTML = '<div style="text-align:center;color:#555;padding:3rem;">No messages yet</div>'; return; }
      container.innerHTML = chats.map(c => `<div class="user-list-item" onclick="openChat('${c.partnerId}')"><div class="user-avatar">${getAvatarHTML(c.partnerId)}</div><div class="user-info"><div class="user-name">${cleanUsername(c.partnerId)}</div><div class="user-last-msg">${c.lastMsg}</div></div>${c.unread > 0 ? `<div class="unread-count">${c.unread}</div>` : ''}</div>`).join('');
    }
    
    window.openChat = async function(partner) {
      currentPartner = partner;
      currentChatId = [currentUserId, partner.replace('@','')].sort().join('_');
      await updateDoc(doc(db, 'chats', currentChatId), { [`unread_${currentUserId}`]: 0 }).catch(()=>{});
      document.getElementById('topIcons').style.display = 'none';
      document.getElementById('chatHeader').classList.add('show');
      document.getElementById('chatListFull').style.display = 'none';
      document.getElementById('chatView').classList.add('show');
      document.getElementById('chatInputArea').classList.add('show');
      document.getElementById('partnerName').textContent = cleanUsername(partner);
      document.getElementById('floatingNav').style.display = 'none';
      if (unsubMessages) unsubMessages();
      const q = query(collection(db, 'chats', currentChatId, 'messages'), orderBy('createdAt', 'asc'));
      unsubMessages = onSnapshot(q, (snapshot) => {
        const container = document.getElementById('messagesContainer');
        container.innerHTML = '';
        snapshot.forEach(doc => {
          const msg = doc.data();
          const isSent = msg.sender === currentUserId;
          const div = document.createElement('div'); div.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
          let time = msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '';
          if (msg.imageUrl) div.innerHTML = `<div class="message-bubble"><img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')"><div class="message-time">${time}</div></div>`;
          else div.innerHTML = `<div class="message-bubble">${msg.text || ''}<div class="message-time">${time}</div></div>`;
          container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
      });
    };
    
    window.sendMessage = async function() {
      const input = document.getElementById('chatInput'), text = input.value.trim();
      if (!text || !currentChatId) return;
      input.value = '';
      try {
        const chatRef = doc(db, 'chats', currentChatId);
        await setDoc(chatRef, { lastMessage: text, lastTime: serverTimestamp(), [`unread_${currentPartner?.replace('@','')}`]: increment(1) }, { merge: true });
        await addDoc(collection(db, 'chats', currentChatId, 'messages'), { text, sender: currentUserId, createdAt: serverTimestamp() });
      } catch(e) { showToast('Failed to send'); }
    };
    
    window.goBack = function() {
      if (unsubMessages) unsubMessages();
      currentPartner = null; currentChatId = null;
      document.getElementById('topIcons').style.display = 'flex';
      document.getElementById('chatHeader').classList.remove('show');
      document.getElementById('chatListFull').style.display = 'flex';
      document.getElementById('chatView').classList.remove('show');
      document.getElementById('chatInputArea').classList.remove('show');
      document.getElementById('floatingNav').style.display = 'flex';
      document.getElementById('messagesContainer').innerHTML = '<div class="empty-chat">Select a chat</div>';
    };
    
    window.goToPartnerProfile = () => { if (currentPartner) window.location.href = `profile.html?user=${encodeURIComponent(currentPartner)}`; };
    window.startCall = (type) => showToast(`📞 ${type} call coming soon!`);
    window.filterChats = () => {};
    
    loadChats();
    document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
