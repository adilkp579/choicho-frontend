<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat · Choicho</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* reset & base */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .page {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      max-height: 900px;
      background: #000;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      border-radius: 0;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }
    @media (min-width: 600px) {
      .page { border-radius: 28px; height: 95vh; }
    }
    .scrollable-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* top header */
    .top-icons-chat {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 0.8rem 0.3rem 0.8rem;
      flex-shrink: 0;
      background: #000;
      position: relative;
      z-index: 20;
    }
    .top-icons-chat.hidden { display: none; }
    .corner-btn-left, .corner-btn-right {
      width: 2.4rem;
      height: 2.4rem;
      background: #1a1a1a;
      border-radius: 50%;
      border: 1px solid #333;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      font-size: 1rem;
    }
    .corner-btn-left:active, .corner-btn-right:active { transform: scale(0.94); background: #2a2a2a; }
    .heart-icon { color: #ef4444; }
    .plus-icon { color: #FFFC00; font-weight: 700; }
    .chat-brand {
      font-size: 2rem;
      font-weight: 700;
      font-family: 'Segoe Script', 'Brush Script MT', cursive;
      font-style: italic;
      letter-spacing: 2px;
      color: #fff;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      line-height: 1;
    }
    .top-right-group { display: flex; gap: 0.4rem; align-items: center; }

    /* chat header (when open) */
    .chat-header {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 1rem;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      z-index: 30;
    }
    .chat-header.show { display: flex; }
    .chat-back {
      width: 2.2rem; height: 2.2rem;
      background: #1a1a1a;
      border-radius: 50%;
      border: 1px solid #333;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chat-partner-info {
      flex: 1;
      cursor: pointer;
      min-width: 0;
      padding: 0.2rem 0.5rem;
      border-radius: 0.5rem;
    }
    .chat-partner-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .chat-partner-name i { font-size: 0.6rem; color: #3897f0; margin-left: 0.3rem; }
    .chat-partner-status {
      font-size: 0.6rem;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .chat-partner-status .dot { width: 6px; height: 6px; border-radius: 50%; background: #4ade80; }
    .call-btns { display: flex; gap: 0.5rem; }
    .call-btn {
      width: 2.2rem; height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: none;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* search */
    .search-bar-container {
      padding: 0.3rem 1rem 0.5rem 1rem;
      background: #000;
      flex-shrink: 0;
    }
    .search-bar-container.hidden { display: none; }
    .search-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 2rem;
      padding: 0.4rem 0.8rem;
      max-width: 500px;
      margin: 0 auto;
    }
    .search-bar:focus-within { border-color: #FFFC00; }
    .search-bar i { color: #666; font-size: 0.8rem; }
    .search-bar input {
      flex: 1;
      background: transparent;
      border: none;
      color: #fff;
      font-size: 0.8rem;
      outline: none;
      width: 100%;
    }
    .search-bar input::placeholder { color: #555; }
    .search-clear {
      color: #666;
      cursor: pointer;
      font-size: 0.7rem;
      display: none;
    }
    .search-clear.show { display: block; }

    /* chat list */
    .chat-list-full {
      flex: 1;
      overflow-y: auto;
      width: 100%;
    }
    .chat-list-full.hidden { display: none; }
    .chat-list-header {
      padding: 0.5rem 1rem;
      font-size: 0.6rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
    }
    .user-list-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      transition: background 0.15s;
    }
    .user-list-item:active { background: rgba(255,255,255,0.04); }
    .user-list-item.hidden { display: none !important; }
    .user-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .user-info { flex: 1; min-width: 0; }
    .user-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .user-name {
      font-size: 0.85rem;
      color: #fff;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-time { font-size: 0.6rem; color: #555; flex-shrink: 0; }
    .user-msg-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
      gap: 0.5rem;
    }
    .user-last-msg {
      font-size: 0.7rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .user-last-msg.unread-msg { color: #fff; font-weight: 500; }
    .unread-count {
      background: #FFFC00;
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    /* chat view */
    .chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    .chat-view.show { display: flex; }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: #000;
    }
    .messages-container::-webkit-scrollbar { width: 0; }
    .message-wrapper {
      display: flex;
      max-width: 85%;
      animation: fadeIn 0.2s;
    }
    .message-wrapper.sent { align-self: flex-end; flex-direction: row-reverse; }
    .message-wrapper.received { align-self: flex-start; }
    .message-bubble {
      padding: 0.55rem 0.8rem;
      border-radius: 1.2rem;
      font-size: 0.85rem;
      line-height: 1.3;
      word-break: break-word;
    }
    .sent .message-bubble { background: #FFFC00; color: #000; border-bottom-right-radius: 0.3rem; }
    .received .message-bubble { background: #111; color: #fff; border-bottom-left-radius: 0.3rem; }
    .message-time { font-size: 0.55rem; margin-top: 0.1rem; }
    .sent .message-time { text-align: right; color: rgba(0,0,0,0.45); }
    .received .message-time { color: rgba(255,255,255,0.35); }
    .message-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 0.8rem;
      cursor: pointer;
    }
    .empty-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 0.8rem;
      text-align: center;
      padding: 1rem;
    }

    /* input area */
    .chat-input-area {
      display: none;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.8rem;
      padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0.5rem));
      background: #000;
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .chat-input-area.show { display: flex; }
    .camera-btn-s, .mic-btn-s {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0a0a0a;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      min-width: 0;
    }
    .chat-input:focus { border-color: #FFFC00; }
    .send-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #FFFC00;
      border: none;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ===== NEW CHAT MODAL — ULTRA GLASSMORPHISM ===== */
    .new-chat-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(14px) saturate(1.4);
      -webkit-backdrop-filter: blur(14px) saturate(1.4);
      z-index: 500;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .new-chat-overlay.show { display: flex; }

    /* ✦ main glass card ✦ */
    .new-chat-modal {
      width: 100%;
      max-width: 420px;
      max-height: 85vh;
      background: rgba(20, 20, 30, 0.55);
      backdrop-filter: blur(28px) saturate(1.8);
      -webkit-backdrop-filter: blur(28px) saturate(1.8);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 30px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04) inset;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: glassIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      transition: all 0.2s;
    }
    @keyframes glassIn {
      0% { opacity: 0; transform: scale(0.94) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* tabs — glassy */
    .new-chat-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      background: rgba(255,255,255,0.02);
    }
    .new-chat-tab {
      flex: 1;
      text-align: center;
      padding: 0.9rem 0.5rem;
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      backdrop-filter: blur(4px);
    }
    .new-chat-tab.active {
      color: #fff;
      border-bottom-color: #FFFC00;
      background: rgba(255,252,0,0.04);
    }
    .new-chat-tab .badge {
      background: #ef4444;
      color: #fff;
      font-size: 0.55rem;
      border-radius: 12px;
      padding: 0.05rem 0.5rem;
      margin-left: 0.3rem;
      display: inline-block;
    }
    .new-chat-tab .badge.hidden { display: none; }

    /* search inside modal */
    .new-chat-search {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      flex-shrink: 0;
      background: rgba(0,0,0,0.15);
    }
    .new-chat-search input {
      width: 100%;
      padding: 0.6rem 1.2rem;
      border-radius: 2.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(8px);
      color: #fff;
      font-size: 0.8rem;
      outline: none;
      transition: all 0.2s;
    }
    .new-chat-search input:focus {
      border-color: #FFFC00;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 20px rgba(255,252,0,0.05);
    }
    .new-chat-search input::placeholder { color: rgba(255,255,255,0.3); }

    /* list — glass scroll */
    .new-chat-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.3rem 0;
      background: rgba(0,0,0,0.1);
    }
    .new-chat-list::-webkit-scrollbar { width: 3px; }
    .new-chat-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 6px; }

    .new-chat-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }
    .new-chat-item:active { background: rgba(255,255,255,0.05); }
    .new-chat-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #fff;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .new-chat-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .new-chat-info { flex: 1; min-width: 0; }
    .new-chat-name {
      font-size: 0.85rem;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.2px;
    }
    .new-chat-sub {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.4);
      margin-top: 1px;
    }
    .new-chat-actions {
      display: flex;
      gap: 0.4rem;
      flex-shrink: 0;
    }
    .new-chat-action {
      padding: 0.3rem 0.9rem;
      border-radius: 2rem;
      font-size: 0.6rem;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(4px);
      color: #aaa;
      transition: all 0.2s;
      letter-spacing: 0.2px;
    }
    .new-chat-action:active { transform: scale(0.94); }
    .new-chat-action.request-btn {
      background: rgba(139,92,246,0.12);
      border-color: rgba(139,92,246,0.25);
      color: #a78bfa;
    }
    .new-chat-action.requested {
      background: rgba(245,158,11,0.1);
      border-color: rgba(245,158,11,0.2);
      color: #f59e0b;
      cursor: default;
    }
    .new-chat-action.chat {
      background: rgba(255,252,0,0.1);
      border-color: rgba(255,252,0,0.2);
      color: #FFFC00;
    }
    .new-chat-action.accept {
      background: rgba(74,222,128,0.1);
      border-color: rgba(74,222,128,0.2);
      color: #4ade80;
    }
    .new-chat-action.decline {
      background: rgba(239,68,68,0.1);
      border-color: rgba(239,68,68,0.2);
      color: #ef4444;
    }

    .new-chat-close {
      text-align: center;
      padding: 0.7rem;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      border-top: 1px solid rgba(255,255,255,0.04);
      font-size: 0.7rem;
      flex-shrink: 0;
      backdrop-filter: blur(4px);
      background: rgba(0,0,0,0.1);
      transition: all 0.2s;
    }
    .new-chat-close:active { background: rgba(255,255,255,0.03); }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: rgba(255,255,255,0.3);
    }
    .empty-state i { font-size: 2rem; margin-bottom: 0.5rem; opacity: 0.6; }
    .empty-state p { font-size: 0.8rem; }

    /* toast */
    .toast {
      position: fixed;
      bottom: 120px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30,30,40,0.9);
      backdrop-filter: blur(16px);
      color: #fff;
      padding: 0.5rem 1.2rem;
      border-radius: 2.5rem;
      font-size: 0.75rem;
      z-index: 800;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .toast.show { opacity: 1; }

    /* floating nav */
    .floating-nav {
      position: fixed;
      bottom: max(0.8rem, env(safe-area-inset-bottom, 0.8rem));
      left: 50%;
      transform: translateX(-50%);
      width: 92%;
      max-width: 500px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 3rem;
      padding: 0.5rem 1rem;
      border: 1px solid rgba(255,255,255,0.04);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .floating-nav.hidden { display: none; }
    .nav-center {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 340px;
      gap: 0.2rem;
    }
    .nav-center a {
      color: rgba(255,255,255,0.6);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.4rem;
      height: 2.4rem;
      border-radius: 50%;
      transition: all 0.2s;
      text-decoration: none;
    }
    .nav-center a:hover { color: #fff; background: rgba(255,255,255,0.06); }
    .nav-center a.active { color: #fff; background: rgba(255,255,255,0.08); }

    /* responsive */
    @media (max-width: 480px) {
      .chat-brand { font-size: 1.6rem; }
      .corner-btn-left, .corner-btn-right { width: 2.2rem; height: 2.2rem; font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="scrollable-content">

    <!-- TOP HEADER -->
    <div class="top-icons-chat" id="topIconsChat">
      <a href="hart.html" class="corner-btn-left"><i class="fas fa-heart heart-icon"></i></a>
      <span class="chat-brand">Chats</span>
      <div class="top-right-group">
        <button class="corner-btn-right" id="newChatBtn"><i class="fas fa-plus plus-icon"></i></button>
        <a href="settings.html" class="corner-btn-right"><i class="fas fa-cog"></i></a>
      </div>
    </div>

    <!-- CHAT HEADER (open) -->
    <div class="chat-header" id="chatHeader">
      <button class="chat-back" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
      <div class="chat-partner-info" onclick="goToPartnerProfile()">
        <div class="chat-partner-name" id="partnerName">
          <span id="partnerNameText">User</span>
          <i class="fas fa-chevron-right"></i>
        </div>
        <div class="chat-partner-status"><span class="dot"></span> online <span class="view-profile" style="color:#666;font-size:0.55rem;margin-left:0.3rem;">• tap profile</span></div>
      </div>
      <div class="call-btns">
        <button class="call-btn" onclick="startCall('audio')"><i class="fas fa-phone-alt"></i></button>
        <button class="call-btn" onclick="startCall('video')"><i class="fas fa-video"></i></button>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="search-bar-container" id="searchBarContainer">
      <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search messages..." oninput="filterChats()">
        <i class="fas fa-times search-clear" id="searchClear" onclick="clearSearch()"></i>
      </div>
    </div>

    <!-- CHAT LIST -->
    <div class="chat-list-full" id="chatListFull">
      <div class="chat-list-header">Messages <span id="chatCount"></span></div>
      <div id="chatList"></div>
    </div>

    <!-- CHAT VIEW -->
    <div class="chat-view" id="chatView">
      <div class="messages-container" id="messagesContainer">
        <div class="empty-chat">Select a chat to start messaging</div>
      </div>
    </div>
  </div>

  <!-- CHAT INPUT -->
  <div class="chat-input-area" id="chatInputArea">
    <button class="camera-btn-s" onclick="document.getElementById('imageInput').click()"><i class="fas fa-camera"></i></button>
    <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
    <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
    <button class="mic-btn-s" onclick="toggleVoice()"><i class="fas fa-microphone"></i></button>
    <button class="send-btn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i></button>
  </div>

  <!-- ===== NEW CHAT MODAL — ULTRA GLASS ===== -->
  <div class="new-chat-overlay" id="newChatOverlay">
    <div class="new-chat-modal">
      <div class="new-chat-tabs">
        <div class="new-chat-tab active" data-tab="users" onclick="switchTab('users')">
          <i class="fas fa-users"></i> Users
        </div>
        <div class="new-chat-tab" data-tab="requests" onclick="switchTab('requests')">
          <i class="fas fa-envelope"></i> Requests
          <span class="badge hidden" id="requestBadge">0</span>
        </div>
      </div>
      <div class="new-chat-search">
        <input type="text" id="newChatSearch" placeholder="🔍 Search users..." oninput="filterNewChat()">
      </div>
      <div class="new-chat-list" id="newChatList"></div>
      <div class="new-chat-close" onclick="closeNewChat()"><i class="fas fa-times"></i> Close</div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <!-- FLOATING NAV -->
  <nav class="floating-nav" id="floatingNav">
    <div class="nav-center">
      <a href="index.html"><i class="fas fa-home"></i></a>
      <a href="web.html"><i class="fas fa-globe"></i></a>
      <a href="reel.html"><i class="fas fa-film"></i></a>
      <a href="chat.html" class="active"><i class="fas fa-comment-dots"></i></a>
      <a href="profile.html"><i class="fas fa-user"></i></a>
      <a href="upload.html"><i class="fas fa-plus"></i></a>
      <a href="search.html"><i class="fas fa-search"></i></a>
    </div>
  </nav>
</div>

<script>
  // ============================================================
  // MOCK / DEMO DATA — fully functional UI with glass modal
  // ============================================================
  const currentUserId = 'demo_user_123';
  let currentPartner = null;
  let currentChatId = null;
  let unsubMessages = null;

  // mock users
  const allUsers = [
    { id: 'u1', username: '@alex_m', name: 'Alex Morgan', avatar: '' },
    { id: 'u2', username: '@jordan_w', name: 'Jordan Wright', avatar: '' },
    { id: 'u3', username: '@taylor_r', name: 'Taylor Reed', avatar: '' },
    { id: 'u4', username: '@sam_k', name: 'Sam Klein', avatar: '' },
    { id: 'u5', username: '@morgan_l', name: 'Morgan Lee', avatar: '' },
  ];

  let pendingRequests = [];
  let sentRequests = ['@jordan_w']; // already requested
  let existingChatsMap = { '@alex_m': true, '@taylor_r': true };

  // mock chats
  const mockChats = [
    { partnerId: '@alex_m', lastMsg: 'Hey! How are you?', lastTime: new Date(Date.now() - 60000), unread: 2 },
    { partnerId: '@taylor_r', lastMsg: 'See you tomorrow', lastTime: new Date(Date.now() - 3600000), unread: 0 },
    { partnerId: '@sam_k', lastMsg: 'Yeah, sounds good', lastTime: new Date(Date.now() - 86400000), unread: 0 },
  ];

  // ===== helpers =====
  function cleanUsername(u) { return u ? u.replace('@','') : 'user'; }
  function timeAgo(d) { 
    const diff = Date.now() - d.getTime();
    if (diff < 60000) return 'now';
    if (diff < 3600000) return Math.floor(diff/60000)+'m';
    if (diff < 86400000) return Math.floor(diff/3600000)+'h';
    return Math.floor(diff/86400000)+'d';
  }
  function getAvatarHTML(username) {
    const initial = username ? username.charAt(1).toUpperCase() : '?';
    return `<span style="font-weight:600;font-size:1.1rem;">${initial}</span>`;
  }
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._hide);
    t._hide = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ===== render chat list =====
  function renderChatList(chats) {
    const container = document.getElementById('chatList');
    if (!chats.length) {
      container.innerHTML = `<div class="empty-state"><i class="fas fa-comment-slash"></i><p>No messages yet</p></div>`;
      return;
    }
    container.innerHTML = chats.map(c => `
      <div class="user-list-item ${currentPartner === c.partnerId ? 'active' : ''}" onclick="openChat('${c.partnerId}')">
        <div class="user-avatar" onclick="event.stopPropagation();window.location.href='profile.html?user=${encodeURIComponent(c.partnerId)}'">
          ${getAvatarHTML(c.partnerId)}
        </div>
        <div class="user-info">
          <div class="user-name-row">
            <span class="user-name">${cleanUsername(c.partnerId)}</span>
            <span class="user-time">${timeAgo(c.lastTime)}</span>
          </div>
          <div class="user-msg-row">
            <span class="user-last-msg ${c.unread > 0 ? 'unread-msg' : ''}">${c.lastMsg.substring(0,40)}</span>
            ${c.unread > 0 ? `<div class="unread-count">${c.unread}</div>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  function loadChats() {
    renderChatList(mockChats);
    document.getElementById('chatCount').textContent = mockChats.length ? `(${mockChats.length})` : '';
  }

  // ===== open chat =====
  window.openChat = function(partner) {
    currentPartner = partner;
    currentChatId = 'chat_' + partner.replace('@','');
    document.getElementById('topIconsChat').classList.add('hidden');
    document.getElementById('chatHeader').classList.add('show');
    document.getElementById('chatListFull').classList.add('hidden');
    document.getElementById('searchBarContainer').classList.add('hidden');
    document.getElementById('chatView').classList.add('show');
    document.getElementById('chatInputArea').classList.add('show');
    document.getElementById('floatingNav').style.display = 'none';
    document.getElementById('partnerNameText').textContent = cleanUsername(partner);

    const container = document.getElementById('messagesContainer');
    // mock messages
    const msgs = [
      { text: 'Hey there! 👋', sender: partner, createdAt: new Date(Date.now() - 120000) },
      { text: 'Hi! How are you?', sender: currentUserId, createdAt: new Date(Date.now() - 60000) },
      { text: 'I am good, you?', sender: partner, createdAt: new Date(Date.now() - 30000) },
    ];
    container.innerHTML = '';
    msgs.forEach(m => {
      const isSent = m.sender === currentUserId;
      const div = document.createElement('div');
      div.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
      const time = m.createdAt ? new Date(m.createdAt).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
      div.innerHTML = `<div class="message-bubble">${m.text}<div class="message-time">${time}</div></div>`;
      container.appendChild(div);
    });
    container.scrollTop = container.scrollHeight;
  };

  window.goBack = function() {
    currentPartner = null; currentChatId = null;
    document.getElementById('topIconsChat').classList.remove('hidden');
    document.getElementById('chatHeader').classList.remove('show');
    document.getElementById('chatListFull').classList.remove('hidden');
    document.getElementById('searchBarContainer').classList.remove('hidden');
    document.getElementById('chatView').classList.remove('show');
    document.getElementById('chatInputArea').classList.remove('show');
    document.getElementById('floatingNav').style.display = 'flex';
    document.getElementById('messagesContainer').innerHTML = '<div class="empty-chat">Select a chat to start messaging</div>';
  };

  window.goToPartnerProfile = function() {
    if (currentPartner) window.location.href = `profile.html?user=${encodeURIComponent(currentPartner)}`;
  };

  window.sendMessage = function() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text || !currentChatId) return;
    input.value = '';
    const container = document.getElementById('messagesContainer');
    const div = document.createElement('div');
    div.className = 'message-wrapper sent';
    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    div.innerHTML = `<div class="message-bubble">${text}<div class="message-time">${time}</div></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    // update last msg in list
    const item = document.querySelector(`.user-list-item[onclick*="${currentPartner}"]`);
    if (item) {
      const lastMsg = item.querySelector('.user-last-msg');
      if (lastMsg) lastMsg.textContent = text;
    }
    showToast('Message sent (demo)');
  };

  window.sendImage = function(e) {
    const file = e.target.files[0];
    if (!file || !currentChatId) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      const container = document.getElementById('messagesContainer');
      const div = document.createElement('div');
      div.className = 'message-wrapper sent';
      const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      div.innerHTML = `<div class="message-bubble"><img src="${ev.target.result}" class="message-image" onclick="window.open('${ev.target.result}')"><div class="message-time">${time}</div></div>`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
      showToast('Image sent (demo)');
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  window.toggleVoice = function() { showToast('Voice message coming soon! 🎤'); };
  window.startCall = function(type) { showToast(`📞 ${type} call coming soon!`); };
  window.filterChats = function() {
    const term = document.getElementById('searchInput').value.toLowerCase().trim();
    const items = document.querySelectorAll('.user-list-item');
    let visible = 0;
    items.forEach(el => {
      const name = el.querySelector('.user-name')?.textContent.toLowerCase() || '';
      const msg = el.querySelector('.user-last-msg')?.textContent.toLowerCase() || '';
      if (term === '' || name.includes(term) || msg.includes(term)) {
        el.classList.remove('hidden'); visible++;
      } else el.classList.add('hidden');
    });
    const container = document.getElementById('chatList');
    const empty = container.querySelector('.search-empty-state') || document.createElement('div');
    if (visible === 0 && term !== '') {
      empty.className = 'empty-state search-empty-state';
      empty.innerHTML = `<i class="fas fa-search"></i><p>No chats found for "${term}"</p>`;
      if (!container.querySelector('.search-empty-state')) container.appendChild(empty);
    } else if (container.querySelector('.search-empty-state')) {
      container.querySelector('.search-empty-state').remove();
    }
  };
  window.clearSearch = function() {
    document.getElementById('searchInput').value = '';
    document.getElementById('searchClear').classList.remove('show');
    filterChats();
  };
  document.getElementById('searchInput').addEventListener('input', function() {
    document.getElementById('searchClear').classList.toggle('show', this.value.length > 0);
  });
  document.getElementById('chatInput').addEventListener('keypress', e => { if (e.key === 'Enter') sendMessage(); });

  // ============================================================
  // NEW CHAT MODAL — GLASS
  // ============================================================
  let activeTab = 'users';
  let isModalOpen = false;

  function renderNewChatList() {
    const container = document.getElementById('newChatList');
    const search = document.getElementById('newChatSearch').value.toLowerCase().trim();

    if (activeTab === 'users') {
      let list = allUsers;
      if (search) list = list.filter(u => u.username.toLowerCase().includes(search) || (u.name||'').toLowerCase().includes(search));
      if (!list.length) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-user-slash"></i><p>${search ? 'No users found' : 'No users'}</p></div>`;
        return;
      }
      container.innerHTML = list.map(u => {
        const isChat = existingChatsMap[u.username] || false;
        const isReq = sentRequests.includes(u.username);
        let action = '';
        if (isChat) {
          action = `<button class="new-chat-action chat" onclick="event.stopPropagation();startChatWith('${u.username}')"><i class="fas fa-comment"></i> Chat</button>`;
        } else if (isReq) {
          action = `<button class="new-chat-action requested" disabled><i class="fas fa-clock"></i> Requested</button>`;
        } else {
          action = `<button class="new-chat-action request-btn" onclick="event.stopPropagation();sendChatRequest('${u.username}', this)"><i class="fas fa-paper-plane"></i> Request</button>`;
        }
        return `
          <div class="new-chat-item" onclick="window.location.href='profile.html?user=${encodeURIComponent(u.username)}'">
            <div class="new-chat-avatar">${u.avatar ? `<img src="${u.avatar}">` : '<i class="fas fa-user"></i>'}</div>
            <div class="new-chat-info">
              <div class="new-chat-name">${u.name || cleanUsername(u.username)}</div>
              <div class="new-chat-sub">${u.username}</div>
            </div>
            <div class="new-chat-actions">${action}</div>
          </div>
        `;
      }).join('');
    } else {
      if (!pendingRequests.length) {
        container.innerHTML = `<div class="empty-state"><i class="fas fa-envelope-open"></i><p>No pending requests</p></div>`;
        return;
      }
      container.innerHTML = pendingRequests.map(r => `
        <div class="new-chat-item">
          <div class="new-chat-avatar" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'"><i class="fas fa-user"></i></div>
          <div class="new-chat-info" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'">
            <div class="new-chat-name">${r.fromName || cleanUsername(r.from)}</div>
            <div class="new-chat-sub">${r.from}</div>
          </div>
          <div class="new-chat-actions">
            <button class="new-chat-action accept" onclick="event.stopPropagation();acceptRequest('${r.id}', '${r.from}')"><i class="fas fa-check"></i> Accept</button>
            <button class="new-chat-action decline" onclick="event.stopPropagation();declineRequest('${r.id}')"><i class="fas fa-times"></i> Decline</button>
          </div>
        </div>
      `).join('');
    }
  }

  window.sendChatRequest = function(username, btn) {
    if (sentRequests.includes(username)) { showToast('Already requested'); return; }
    sentRequests.push(username);
    showToast(`✅ Request sent to ${cleanUsername(username)}`);
    if (btn) { btn.textContent = '⏳ Requested'; btn.className = 'new-chat-action requested'; btn.disabled = true; }
    renderNewChatList();
  };

  window.acceptRequest = function(id, from) {
    pendingRequests = pendingRequests.filter(r => r.id !== id);
    showToast(`✅ Accepted request from ${cleanUsername(from)}`);
    existingChatsMap[from] = true;
    renderNewChatList();
    document.getElementById('requestBadge').classList.add('hidden');
    closeNewChat();
    openChat(from);
  };

  window.declineRequest = function(id) {
    pendingRequests = pendingRequests.filter(r => r.id !== id);
    showToast('Request declined');
    renderNewChatList();
    if (!pendingRequests.length) document.getElementById('requestBadge').classList.add('hidden');
  };

  window.startChatWith = function(username) {
    existingChatsMap[username] = true;
    closeNewChat();
    openChat(username);
  };

  document.getElementById('newChatBtn').addEventListener('click', function(e) {
    e.preventDefault();
    if (isModalOpen) return;
    isModalOpen = true;
    document.getElementById('newChatOverlay').classList.add('show');
    document.getElementById('newChatSearch').value = '';
    activeTab = 'users';
    document.querySelectorAll('.new-chat-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'users'));
    renderNewChatList();
    // mock pending requests
    if (!pendingRequests.length) {
      pendingRequests = [
        { id: 'req1', from: '@morgan_l', fromName: 'Morgan Lee', fromId: 'u5' }
      ];
      document.getElementById('requestBadge').textContent = '1';
      document.getElementById('requestBadge').classList.remove('hidden');
    }
    isModalOpen = false;
  });

  window.closeNewChat = function() {
    document.getElementById('newChatOverlay').classList.remove('show');
    isModalOpen = false;
  };
  window.switchTab = function(tab) {
    activeTab = tab;
    document.querySelectorAll('.new-chat-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    renderNewChatList();
  };
  window.filterNewChat = function() { renderNewChatList(); };

  document.getElementById('newChatOverlay').addEventListener('click', (e) => {
    if (e.target === document.getElementById('newChatOverlay')) closeNewChat();
  });

  // ===== INIT =====
  loadChats();
  // prefill request badge
  setTimeout(() => {
    if (pendingRequests.length) {
      document.getElementById('requestBadge').textContent = pendingRequests.length;
      document.getElementById('requestBadge').classList.remove('hidden');
    }
  }, 200);
</script>

</body>
</html>
