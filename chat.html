<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Chat · Choicho</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="CSS/main.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    .page {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden;
      position: relative;
    }
    
    .scrollable-content {
      width: 100%;
      max-width: 100%;
      padding-bottom: 80px;
    }
    
    .chat-header {
      display: none;
      align-items: center;
      gap: 0.6rem;
      padding: 0.8rem 1rem;
      background: #000;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      width: 100%;
    }
    .chat-header.show { display: flex; }
    .chat-back {
      width: 2.4rem;
      height: 2.4rem;
      background: #1a1a1a;
      border-radius: 50%;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #333;
      cursor: pointer;
      flex-shrink: 0;
    }
    .chat-partner-info {
      flex: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .chat-partner-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
    }
    .chat-partner-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .chat-partner-details {
      flex: 1;
      min-width: 0;
    }
    .chat-partner-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #fff;
    }
    .chat-partner-status {
      font-size: 0.65rem;
      color: #4ade80;
      display: flex;
      align-items: center;
      gap: 0.2rem;
    }
    .chat-partner-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
    }
    .call-btns {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .call-btn {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .call-btn:active { transform: scale(0.95); }
    
    /* Chat Settings Button */
    .chat-settings-btn {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .chat-settings-btn:active { transform: scale(0.95); }
    
    /* Search Bar - Reduced Height */
    .search-bar-container {
      padding: 0.3rem 1rem 0.4rem;
      background: #000;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      width: 100vw;
      max-width: 100vw;
      margin-left: 0;
      margin-right: 0;
      box-sizing: border-box;
      display: block;
      position: relative;
      left: 0;
      right: 0;
    }
    .search-bar {
      display: flex;
      align-items: center;
      background: #111;
      border-radius: 2rem;
      padding: 0.2rem 0.8rem;
      border: 1px solid rgba(255,255,255,0.08);
      transition: border 0.25s, background 0.25s;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      min-height: 36px;
    }
    .search-bar:focus-within {
      border-color: #FFFC00;
      background: #0a0a0a;
      box-shadow: 0 0 0 3px rgba(255,252,0,0.08);
    }
    .search-bar i {
      color: #666;
      margin-right: 0.5rem;
      font-size: 0.75rem;
      transition: color 0.25s;
      flex-shrink: 0;
    }
    .search-bar:focus-within i {
      color: #FFFC00;
    }
    .search-bar input {
      background: transparent;
      border: none;
      color: #fff;
      padding: 0.3rem 0;
      width: 100%;
      min-width: 0;
      font-size: 0.75rem;
      outline: none;
      font-weight: 400;
      letter-spacing: 0.2px;
      box-sizing: border-box;
    }
    .search-bar input::placeholder {
      color: #555;
      font-weight: 300;
      letter-spacing: 0.2px;
      font-size: 0.75rem;
    }
    .search-bar input::-webkit-search-cancel-button {
      -webkit-appearance: none;
      appearance: none;
    }
    
    .chat-list-full {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow-y: auto;
      width: 100%;
    }
    .chat-list-full.hidden { display: none; }
    .chat-list-header {
      padding: 0.5rem 1rem;
      font-size: 0.6rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
    }
    .user-list-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.7rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.02);
      transition: background 0.2s;
      width: 100%;
    }
    .user-list-item:active { background: rgba(255,255,255,0.03); }
    .user-list-item.active { background: rgba(255,252,0,0.06); }
    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      flex-shrink: 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-info {
      flex: 1;
      min-width: 0;
    }
    .user-name-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .user-name {
      font-size: 0.85rem;
      color: #fff;
      font-weight: 500;
    }
    .user-time {
      font-size: 0.6rem;
      color: #555;
    }
    .user-msg-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 2px;
    }
    .user-last-msg {
      font-size: 0.7rem;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }
    .user-last-msg.unread-msg {
      color: #fff;
      font-weight: 500;
    }
    .unread-count {
      background: #FFFC00;
      color: #000;
      font-size: 0.6rem;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .chat-view {
      display: none;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      width: 100%;
    }
    .chat-view.show { display: flex; }
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 0.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      background: #000;
      width: 100%;
    }
    .messages-container::-webkit-scrollbar { width: 0; }
    .message-wrapper {
      display: flex;
      max-width: 85%;
      animation: fadeInUp 0.25s;
    }
    .message-wrapper.sent {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .message-wrapper.received {
      align-self: flex-start;
    }
    .message-bubble {
      padding: 0.55rem 0.8rem;
      border-radius: 1.2rem;
      font-size: 0.85rem;
      line-height: 1.3;
      word-break: break-word;
    }
    .sent .message-bubble {
      background: #FFFC00;
      color: #000;
      border-bottom-right-radius: 0.3rem;
    }
    .received .message-bubble {
      background: #111;
      color: #fff;
      border-bottom-left-radius: 0.3rem;
    }
    .message-time {
      font-size: 0.55rem;
      margin-top: 0.1rem;
    }
    .sent .message-time {
      text-align: right;
      color: rgba(0,0,0,0.45);
    }
    .received .message-time {
      color: rgba(255,255,255,0.35);
    }
    .message-image {
      max-width: 200px;
      max-height: 200px;
      border-radius: 0.8rem;
      cursor: pointer;
    }
    .empty-chat {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 0.8rem;
    }
    .chat-input-area {
      display: none;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 0.8rem;
      padding-bottom: max(0.5rem, env(safe-area-inset-bottom, 0.5rem));
      background: #000;
      border-top: 1px solid rgba(255,255,255,0.06);
      width: 100%;
    }
    .chat-input-area.show { display: flex; }
    .camera-btn-s, .mic-btn-s {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.12);
      background: #0a0a0a;
      color: #fff;
      font-size: 0.85rem;
      outline: none;
      min-width: 0;
    }
    .chat-input:focus { border-color: #FFFC00; }
    .send-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #FFFC00;
      border: none;
      color: #000;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Floating Action Button - New Chat */
    .fab-container {
      position: fixed;
      bottom: 85px;
      right: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    
    .fab-main {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #FFFC00;
      color: #000;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255,252,0,0.3);
      transition: all 0.3s ease;
      position: relative;
    }
    .fab-main:active {
      transform: scale(0.9);
    }
    .fab-main .badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #ef4444;
      color: #fff;
      font-size: 0.55rem;
      font-weight: 700;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #000;
    }
    
    /* New Chat Panel */
    .new-chat-panel {
      position: fixed;
      bottom: 150px;
      right: 20px;
      width: 350px;
      max-width: calc(100vw - 40px);
      max-height: 60vh;
      background: rgba(20,20,20,0.95);
      backdrop-filter: blur(30px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 101;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
    }
    .new-chat-panel.show {
      display: flex;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
    
    .new-chat-panel-header {
      padding: 0.8rem 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .new-chat-panel-header h3 {
      color: #fff;
      font-size: 0.9rem;
      font-weight: 600;
    }
    .new-chat-panel-close {
      color: #666;
      cursor: pointer;
      font-size: 1.2rem;
      transition: color 0.2s;
      background: none;
      border: none;
    }
    .new-chat-panel-close:hover { color: #fff; }
    
    .new-chat-panel-tabs {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .new-chat-panel-tab {
      flex: 1;
      text-align: center;
      padding: 0.6rem;
      color: rgba(255,255,255,0.4);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }
    .new-chat-panel-tab.active {
      color: #fff;
      border-bottom-color: #FFFC00;
    }
    .new-chat-panel-tab .tab-badge {
      background: #ef4444;
      color: #fff;
      font-size: 0.5rem;
      border-radius: 10px;
      padding: 0.05rem 0.4rem;
      margin-left: 0.3rem;
    }
    
    .new-chat-panel-search {
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .new-chat-panel-search input {
      width: 100%;
      padding: 0.4rem 0.8rem;
      border-radius: 2rem;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 0.75rem;
      outline: none;
      box-sizing: border-box;
    }
    .new-chat-panel-search input:focus {
      border-color: #FFFC00;
    }
    .new-chat-panel-search input::placeholder {
      color: #555;
    }
    
    .new-chat-panel-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.3rem 0;
    }
    .new-chat-panel-item {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.6rem 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .new-chat-panel-item:active {
      background: rgba(255,255,255,0.05);
    }
    .new-chat-panel-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2a2a2a, #1a1a1a);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      color: #fff;
      overflow: hidden;
      flex-shrink: 0;
    }
    .new-chat-panel-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .new-chat-panel-info {
      flex: 1;
      min-width: 0;
    }
    .new-chat-panel-name {
      font-size: 0.8rem;
      font-weight: 600;
      color: #fff;
    }
    .new-chat-panel-sub {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.4);
    }
    .new-chat-panel-action {
      padding: 0.25rem 0.8rem;
      border-radius: 1.5rem;
      font-size: 0.6rem;
      font-weight: 600;
      cursor: pointer;
      background: rgba(255,252,0,0.15);
      border: 1px solid rgba(255,252,0,0.3);
      color: #FFFC00;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .new-chat-panel-action:active {
      transform: scale(0.95);
    }
    .new-chat-panel-action.accept {
      background: rgba(74,222,128,0.15);
      border-color: rgba(74,222,128,0.3);
      color: #4ade80;
    }
    .new-chat-panel-action.decline {
      background: rgba(239,68,68,0.15);
      border-color: rgba(239,68,68,0.3);
      color: #ef4444;
    }
    .new-chat-panel-empty {
      text-align: center;
      padding: 2rem;
      color: #555;
      font-size: 0.8rem;
    }
    
    /* Chat Settings Modal */
    .chat-settings-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 600;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .chat-settings-overlay.show { display: flex; }
    .chat-settings-modal {
      background: rgba(20,20,20,0.95);
      backdrop-filter: blur(30px);
      border-radius: 1.5rem;
      width: 100%;
      max-width: 400px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }
    .chat-settings-header {
      padding: 1rem;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .chat-settings-header h3 {
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
    }
    .chat-settings-close {
      color: #666;
      cursor: pointer;
      font-size: 1.2rem;
      transition: color 0.2s;
      background: none;
      border: none;
    }
    .chat-settings-close:hover { color: #fff; }
    .chat-settings-body {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }
    .chat-settings-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.8rem 1rem;
      cursor: pointer;
      transition: background 0.2s;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .chat-settings-item:active {
      background: rgba(255,255,255,0.05);
    }
    .chat-settings-item i {
      width: 24px;
      color: #666;
      font-size: 1rem;
    }
    .chat-settings-item .item-text {
      flex: 1;
      font-size: 0.85rem;
    }
    .chat-settings-item .item-sub {
      color: #666;
      font-size: 0.7rem;
    }
    .chat-settings-item.danger {
      color: #ef4444;
    }
    .chat-settings-item.danger i {
      color: #ef4444;
    }
    
    /* Remove any max-width constraints for full width */
    @media (min-width: 1024px) {
      .scrollable-content { 
        padding-left: 5.5rem; 
        width: 100%;
        max-width: 100%;
      }
      .chat-list-full, .chat-view { 
        max-width: 100%; 
        margin: 0; 
        width: 100%;
      }
      .search-bar-container {
        max-width: 100vw;
        width: 100vw;
      }
    }
    
    /* Ensure full width on all devices */
    .search-bar-container,
    .search-bar,
    .search-bar input {
      max-width: 100% !important;
      width: 100% !important;
    }
    
    .search-bar-container {
      padding-left: 1rem;
      padding-right: 1rem;
    }
    
    /* Hide FAB when chat is open */
    .chat-view.show ~ .fab-container {
      display: none;
    }
    .chat-view.show ~ .new-chat-panel {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="scrollable-content">
      <!-- Top Icons -->
      <div class="top-icons" id="topIcons">
        <a href="heart.html" class="corner-btn" title="Likes">
          <i class="fas fa-heart"></i>
        </a>
        <span class="top-brand">Chats</span>
        <a href="settings.html" class="corner-btn" title="Settings">
          <i class="fas fa-cog"></i>
        </a>
      </div>
      
      <!-- Chat Header -->
      <div class="chat-header" id="chatHeader">
        <button class="chat-back" onclick="goBack()">
          <i class="fas fa-arrow-left"></i>
        </button>
        <div class="chat-partner-info" onclick="goToPartnerProfile()">
          <div class="chat-partner-avatar" id="partnerAvatar">
            <i class="fas fa-user"></i>
          </div>
          <div class="chat-partner-details">
            <div class="chat-partner-name" id="partnerName"></div>
            <div class="chat-partner-status">
              <span class="dot"></span> online
            </div>
          </div>
        </div>
        <div class="call-btns">
          <button class="call-btn" onclick="startCall('audio')">
            <i class="fas fa-phone"></i>
          </button>
          <button class="call-btn" onclick="startCall('video')">
            <i class="fas fa-video"></i>
          </button>
          <button class="chat-settings-btn" onclick="openChatSettings()">
            <i class="fas fa-ellipsis-v"></i>
          </button>
        </div>
      </div>
      
      <!-- Search Bar -->
      <div class="search-bar-container" id="searchBarContainer">
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="Search..." oninput="filterChats()">
        </div>
      </div>
      
      <!-- Chat List -->
      <div class="chat-list-full" id="chatListFull">
        <div class="chat-list-header">
          Messages <span id="chatCount"></span>
        </div>
        <div id="chatList"></div>
      </div>
      
      <!-- Chat View -->
      <div class="chat-view" id="chatView">
        <div class="messages-container" id="messagesContainer">
          <div class="empty-chat">Select a chat to start messaging</div>
        </div>
      </div>
    </div>
    
    <!-- Floating Action Button - New Chat -->
    <div class="fab-container" id="fabContainer">
      <button class="fab-main" id="fabMain" onclick="toggleNewChatPanel()">
        <i class="fas fa-plus"></i>
        <span class="badge" id="fabBadge" style="display:none;">0</span>
      </button>
    </div>
    
    <!-- New Chat Panel -->
    <div class="new-chat-panel" id="newChatPanel">
      <div class="new-chat-panel-header">
        <h3>New Chat</h3>
        <button class="new-chat-panel-close" onclick="closeNewChatPanel()">✕</button>
      </div>
      <div class="new-chat-panel-tabs">
        <div class="new-chat-panel-tab active" data-tab="users" onclick="switchPanelTab('users')">
          <i class="fas fa-users"></i> Users
        </div>
        <div class="new-chat-panel-tab" data-tab="requests" onclick="switchPanelTab('requests')">
          <i class="fas fa-envelope"></i> Requests
          <span class="tab-badge" id="panelRequestBadge" style="display:none;">0</span>
        </div>
      </div>
      <div class="new-chat-panel-search">
        <input type="text" id="panelSearchInput" placeholder="Search users..." oninput="filterPanelUsers()">
      </div>
      <div class="new-chat-panel-list" id="newChatPanelList"></div>
    </div>
    
    <!-- Chat Input Area -->
    <div class="chat-input-area" id="chatInputArea">
      <button class="camera-btn-s" id="cameraBtn" onclick="document.getElementById('imageInput').click()">
        <i class="fas fa-camera"></i>
      </button>
      <input type="file" id="imageInput" accept="image/*" style="display:none" onchange="sendImage(event)">
      <input type="text" class="chat-input" id="chatInput" placeholder="Message...">
      <button class="mic-btn-s" id="micBtn" onclick="toggleVoice()">
        <i class="fas fa-microphone"></i>
      </button>
      <button class="send-btn" onclick="sendMessage()">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
    
    <!-- Chat Settings Modal -->
    <div class="chat-settings-overlay" id="chatSettingsOverlay">
      <div class="chat-settings-modal">
        <div class="chat-settings-header">
          <h3>Chat Settings</h3>
          <button class="chat-settings-close" onclick="closeChatSettings()">✕</button>
        </div>
        <div class="chat-settings-body">
          <div class="chat-settings-item" onclick="viewContact()">
            <i class="fas fa-user"></i>
            <span class="item-text">View Contact</span>
            <span class="item-sub">›</span>
          </div>
          <div class="chat-settings-item" onclick="showToast('Media shared with this chat')">
            <i class="fas fa-image"></i>
            <span class="item-text">Media</span>
            <span class="item-sub">›</span>
          </div>
          <div class="chat-settings-item" onclick="showToast('Search in conversation')">
            <i class="fas fa-search"></i>
            <span class="item-text">Search in Conversation</span>
            <span class="item-sub">›</span>
          </div>
          <div class="chat-settings-item" onclick="toggleMute()">
            <i class="fas fa-bell"></i>
            <span class="item-text" id="muteText">Mute Notifications</span>
            <span class="item-sub">›</span>
          </div>
          <div class="chat-settings-item" onclick="showToast('Wallpaper changed')">
            <i class="fas fa-palette"></i>
            <span class="item-text">Change Wallpaper</span>
            <span class="item-sub">›</span>
          </div>
          <div class="chat-settings-item" onclick="clearChat()">
            <i class="fas fa-trash-alt"></i>
            <span class="item-text">Clear Chat</span>
            <span class="item-sub">›</span>
          </div>
          <div class="chat-settings-item danger" onclick="blockUser()">
            <i class="fas fa-ban"></i>
            <span class="item-text">Block User</span>
            <span class="item-sub">›</span>
          </div>
          <div class="chat-settings-item danger" onclick="deleteChat()">
            <i class="fas fa-trash"></i>
            <span class="item-text">Delete Chat</span>
            <span class="item-sub">›</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="toast" id="toast"></div>
    
    <nav class="floating-nav" id="floatingNav">
      <div class="nav-center">
        <a href="index.html"><i class="fas fa-home"></i></a>
        <a href="web.html"><i class="fas fa-globe"></i></a>
        <a href="reel.html"><i class="fas fa-film"></i></a>
        <a href="chat.html" class="active"><i class="fas fa-comment-dots"></i></a>
        <a href="profile.html"><i class="fas fa-user"></i></a>
        <a href="upload.html" class="nav-upload"><i class="fas fa-plus"></i></a>
        <a href="search.html" class="nav-search"><i class="fas fa-search"></i></a>
      </div>
    </nav>
  </div>

  <script type="module">
    import { db } from './js/firebase-config.js';
    import { showToast, timeAgo, cleanUsername, getAvatarHTML, requireAuth } from './js/common.js';
    import { getCurrentUser } from './js/auth.js';
    import { collection, query, orderBy, onSnapshot, doc, getDoc, setDoc, addDoc, updateDoc, increment, serverTimestamp, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
    
    if (!requireAuth()) window.location.replace('login.html');
    
    const currentUser = getCurrentUser();
    const currentUserId = currentUser.uid;
    let currentPartner = null;
    let currentChatId = null;
    let unsubMessages = null;
    let allUsers = [];
    let pendingRequests = [];
    let activePanelTab = 'users';
    let chatListData = [];
    let isMuted = false;
    let isPanelOpen = false;
    
    // Load chats list
    async function loadChats() {
      const q = query(collection(db, 'chats'), orderBy('lastTime', 'desc'));
      onSnapshot(q, (snapshot) => {
        const chats = [];
        snapshot.forEach(doc => {
          const data = doc.data();
          const ids = doc.id.split('_');
          if (ids.includes(currentUserId)) {
            const partnerId = ids.find(i => i !== currentUserId);
            if (partnerId && data.lastMessage !== undefined) {
              chats.push({
                partnerId: '@' + partnerId,
                lastMsg: data.lastMessage || 'No messages',
                lastTime: data.lastTime?.toDate() || new Date(),
                unread: data[`unread_${currentUserId}`] || 0
              });
            }
          }
        });
        chatListData = chats;
        renderChatList(chats);
        document.getElementById('chatCount').textContent = chats.length ? `(${chats.length})` : '';
        applySearchFilter();
      });
    }
    
    function renderChatList(chats) {
      const container = document.getElementById('chatList');
      if (!chats.length) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-comment-slash"></i><p>No messages yet</p><p style="font-size:0.65rem;margin-top:0.5rem;">Tap + to start a chat</p></div>';
        return;
      }
      container.innerHTML = chats.map(c => `
        <div class="user-list-item ${currentPartner === c.partnerId ? 'active' : ''}" data-partner="${c.partnerId}" onclick="openChat('${c.partnerId}')">
          <div class="user-avatar" onclick="event.stopPropagation();window.location.href='profile.html?user=${encodeURIComponent(c.partnerId)}'">
            ${getAvatarHTML(c.partnerId)}
          </div>
          <div class="user-info">
            <div class="user-name-row">
              <span class="user-name">${cleanUsername(c.partnerId)}</span>
              <span class="user-time">${timeAgo(c.lastTime)}</span>
            </div>
            <div class="user-msg-row">
              <span class="user-last-msg ${c.unread > 0 ? 'unread-msg' : ''}">${c.lastMsg.substring(0, 40)}</span>
              ${c.unread > 0 ? `<div class="unread-count">${c.unread}</div>` : ''}
            </div>
          </div>
        </div>
      `).join('');
    }
    
    // SEARCH FILTER
    window.filterChats = function() {
      applySearchFilter();
    };
    
    function applySearchFilter() {
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const items = document.querySelectorAll('#chatList .user-list-item');
      
      if (!search) {
        items.forEach(item => item.style.display = 'flex');
        return;
      }
      
      items.forEach(item => {
        const nameEl = item.querySelector('.user-name');
        const name = nameEl ? nameEl.textContent.toLowerCase() : '';
        const msgEl = item.querySelector('.user-last-msg');
        const msg = msgEl ? msgEl.textContent.toLowerCase() : '';
        const match = name.includes(search) || msg.includes(search);
        item.style.display = match ? 'flex' : 'none';
      });
    }
    
    // Open chat with user
    window.openChat = async function(partner) {
      currentPartner = partner;
      currentChatId = [currentUserId, partner.replace('@','')].sort().join('_');
      
      await updateDoc(doc(db, 'chats', currentChatId), { [`unread_${currentUserId}`]: 0 }).catch(() => {});
      
      document.getElementById('topIcons').style.display = 'none';
      document.getElementById('chatHeader').classList.add('show');
      document.getElementById('chatListFull').classList.add('hidden');
      document.getElementById('searchBarContainer').classList.add('hidden');
      document.getElementById('chatView').classList.add('show');
      document.getElementById('chatInputArea').classList.add('show');
      document.getElementById('floatingNav').style.display = 'none';
      document.getElementById('partnerName').textContent = cleanUsername(partner);
      
      // Hide FAB when chat is open
      document.getElementById('fabContainer').style.display = 'none';
      closeNewChatPanel();
      
      // Set partner avatar
      const avatarContainer = document.getElementById('partnerAvatar');
      avatarContainer.innerHTML = getAvatarHTML(partner);
      
      if (unsubMessages) unsubMessages();
      const q = query(collection(db, 'chats', currentChatId, 'messages'), orderBy('createdAt', 'asc'));
      unsubMessages = onSnapshot(q, (snapshot) => {
        const container = document.getElementById('messagesContainer');
        if (snapshot.empty) {
          container.innerHTML = '<div class="empty-chat">Send a message to start chatting!</div>';
          return;
        }
        container.innerHTML = '';
        snapshot.forEach(doc => {
          const msg = doc.data();
          const isSent = msg.sender === currentUserId;
          const div = document.createElement('div');
          div.className = `message-wrapper ${isSent ? 'sent' : 'received'}`;
          let time = msg.createdAt ? new Date(msg.createdAt.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
          if (msg.imageUrl) {
            div.innerHTML = `<div class="message-bubble"><img src="${msg.imageUrl}" class="message-image" onclick="window.open('${msg.imageUrl}')"><div class="message-time">${time}</div></div>`;
          } else {
            div.innerHTML = `<div class="message-bubble">${escapeHTML(msg.text || '')}<div class="message-time">${time}</div></div>`;
          }
          container.appendChild(div);
        });
        container.scrollTop = container.scrollHeight;
      });
    };
    
    function escapeHTML(str) {
      if (!str) return '';
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
    
    // Send message
    window.sendMessage = async function() {
      const input = document.getElementById('chatInput');
      const text = input.value.trim();
      if (!text || !currentChatId) return;
      input.value = '';
      try {
        const chatRef = doc(db, 'chats', currentChatId);
        await setDoc(chatRef, {
          lastMessage: text,
          lastTime: serverTimestamp(),
          [`unread_${currentPartner?.replace('@','')}`]: increment(1)
        }, { merge: true });
        await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
          text: text,
          sender: currentUserId,
          createdAt: serverTimestamp()
        });
      } catch(e) { showToast('Failed to send'); }
    };
    
    // Send image
    window.sendImage = async function(e) {
      const file = e.target.files[0];
      if (!file || !currentChatId) return;
      const reader = new FileReader();
      reader.onload = async function(ev) {
        try {
          const chatRef = doc(db, 'chats', currentChatId);
          await setDoc(chatRef, {
            lastMessage: '📷 Photo',
            lastTime: serverTimestamp(),
            [`unread_${currentPartner?.replace('@','')}`]: increment(1)
          }, { merge: true });
          await addDoc(collection(db, 'chats', currentChatId, 'messages'), {
            imageUrl: ev.target.result,
            sender: currentUserId,
            createdAt: serverTimestamp()
          });
        } catch(e) { showToast('Failed to send image'); }
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    };
    
    // Voice recording
    window.toggleVoice = function() {
      showToast('Voice message coming soon! 🎤');
    };
    
    // Go back to chat list
    window.goBack = function() {
      if (unsubMessages) unsubMessages();
      currentPartner = null;
      currentChatId = null;
      document.getElementById('topIcons').style.display = 'flex';
      document.getElementById('chatHeader').classList.remove('show');
      document.getElementById('chatListFull').classList.remove('hidden');
      document.getElementById('searchBarContainer').classList.remove('hidden');
      document.getElementById('chatView').classList.remove('show');
      document.getElementById('chatInputArea').classList.remove('show');
      document.getElementById('floatingNav').style.display = 'flex';
      document.getElementById('fabContainer').style.display = 'flex';
      document.getElementById('messagesContainer').innerHTML = '<div class="empty-chat">Select a chat to start messaging</div>';
      applySearchFilter();
    };
    
    window.goToPartnerProfile = function() {
      if (currentPartner) window.location.href = `profile.html?user=${encodeURIComponent(currentPartner)}`;
    };
    
    window.startCall = function(type) {
      showToast(`📞 ${type} call coming soon!`);
    };
    
    // ========== FLOATING ACTION BUTTON FUNCTIONS ==========
    
    window.toggleNewChatPanel = function() {
      if (isPanelOpen) {
        closeNewChatPanel();
      } else {
        openNewChatPanel();
      }
    };
    
    function openNewChatPanel() {
      isPanelOpen = true;
      document.getElementById('newChatPanel').classList.add('show');
      document.getElementById('fabMain').innerHTML = '<i class="fas fa-times"></i>';
      loadPanelUsers();
    }
    
    window.closeNewChatPanel = function() {
      isPanelOpen = false;
      document.getElementById('newChatPanel').classList.remove('show');
      document.getElementById('fabMain').innerHTML = '<i class="fas fa-plus"></i>';
    };
    
    window.switchPanelTab = function(tab) {
      activePanelTab = tab;
      document.querySelectorAll('.new-chat-panel-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.tab === tab);
      });
      renderPanelList();
    };
    
    window.filterPanelUsers = function() {
      renderPanelList();
    };
    
    async function loadPanelUsers() {
      await loadAllUsers();
      await loadRequests();
      renderPanelList();
    }
    
    async function loadAllUsers() {
      allUsers = [];
      const q = query(collection(db, 'users'), orderBy('createdAt', 'desc'), limit(100));
      const snapshot = await getDocs(q);
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.username !== currentUser.username) {
          allUsers.push({
            id: doc.id,
            username: data.username,
            name: data.name || cleanUsername(data.username),
            avatar: data.avatar
          });
        }
      });
    }
    
    async function loadRequests() {
      pendingRequests = [];
      const q = query(collection(db, 'message_requests'), where('toId', '==', currentUserId), where('status', '==', 'pending'));
      const snapshot = await getDocs(q);
      snapshot.forEach(doc => {
        const data = doc.data();
        pendingRequests.push({
          id: doc.id,
          from: data.from,
          fromName: data.fromName,
          fromAvatar: data.fromAvatar,
          fromId: data.fromId
        });
      });
      
      // Update badges
      const badge = document.getElementById('fabBadge');
      const panelBadge = document.getElementById('panelRequestBadge');
      if (pendingRequests.length > 0) {
        badge.style.display = 'flex';
        badge.textContent = pendingRequests.length;
        panelBadge.style.display = 'inline';
        panelBadge.textContent = pendingRequests.length;
      } else {
        badge.style.display = 'none';
        panelBadge.style.display = 'none';
      }
    }
    
    function renderPanelList() {
      const container = document.getElementById('newChatPanelList');
      const searchTerm = document.getElementById('panelSearchInput').value.toLowerCase();
      
      if (activePanelTab === 'users') {
        let filtered = allUsers.filter(u => 
          u.username.toLowerCase().includes(searchTerm) || 
          (u.name || '').toLowerCase().includes(searchTerm)
        );
        
        if (filtered.length === 0) {
          container.innerHTML = '<div class="new-chat-panel-empty"><i class="fas fa-user-slash"></i><p>No users found</p></div>';
          return;
        }
        
        container.innerHTML = filtered.map(u => `
          <div class="new-chat-panel-item" onclick="startChatFromPanel('${u.username}')">
            <div class="new-chat-panel-avatar">
              ${u.avatar ? `<img src="${u.avatar}">` : '<i class="fas fa-user"></i>'}
            </div>
            <div class="new-chat-panel-info">
              <div class="new-chat-panel-name">${u.name || cleanUsername(u.username)}</div>
              <div class="new-chat-panel-sub">${u.username}</div>
            </div>
            <button class="new-chat-panel-action" onclick="event.stopPropagation();startChatFromPanel('${u.username}')">
              <i class="fas fa-comment"></i> Chat
            </button>
          </div>
        `).join('');
      } else {
        if (pendingRequests.length === 0) {
          container.innerHTML = '<div class="new-chat-panel-empty"><i class="fas fa-envelope-open"></i><p>No pending requests</p></div>';
          return;
        }
        
        container.innerHTML = pendingRequests.map(r => `
          <div class="new-chat-panel-item">
            <div class="new-chat-panel-avatar" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'">
              ${r.fromAvatar ? `<img src="${r.fromAvatar}">` : '<i class="fas fa-user"></i>'}
            </div>
            <div class="new-chat-panel-info" onclick="window.location.href='profile.html?user=${encodeURIComponent(r.from)}'">
              <div class="new-chat-panel-name">${r.fromName || cleanUsername(r.from)}</div>
              <div class="new-chat-panel-sub">${r.from}</div>
            </div>
            <div style="display:flex;gap:0.3rem;">
              <button class="new-chat-panel-action accept" onclick="event.stopPropagation();acceptRequestFromPanel('${r.id}', '${r.from}')">
                <i class="fas fa-check"></i>
              </button>
              <button class="new-chat-panel-action decline" onclick="event.stopPropagation();declineRequestFromPanel('${r.id}')">
                <i class="fas fa-times"></i>
              </button>
            </div>
          </div>
        `).join('');
      }
    }
    
    window.startChatFromPanel = async function(username) {
      closeNewChatPanel();
      const partnerId = username.replace('@', '');
      const chatId = [currentUserId, partnerId].sort().join('_');
      
      const chatRef = doc(db, 'chats', chatId);
      const chatSnap = await getDoc(chatRef);
      
      if (!chatSnap.exists()) {
        await setDoc(chatRef, {
          users: [currentUserId, partnerId],
          lastMessage: 'Chat started',
          lastTime: serverTimestamp(),
          [`unread_${partnerId}`]: 1
        });
      }
      
      await openChat(username);
    };
    
    window.acceptRequestFromPanel = async function(requestId, fromUser) {
      await deleteDoc(doc(db, 'message_requests', requestId));
      await loadRequests();
      renderPanelList();
      showToast(`Accepted request from ${cleanUsername(fromUser)}`);
    };
    
    window.declineRequestFromPanel = async function(requestId) {
      await deleteDoc(doc(db, 'message_requests', requestId));
      await loadRequests();
      renderPanelList();
      showToast('Request declined');
    };
    
    // Close panel on outside click
    document.addEventListener('click', function(e) {
      const panel = document.getElementById('newChatPanel');
      const fab = document.getElementById('fabMain');
      if (isPanelOpen && !panel.contains(e.target) && !fab.contains(e.target)) {
        closeNewChatPanel();
      }
    });
    
    // ========== CHAT SETTINGS FUNCTIONS ==========
    
    window.openChatSettings = function() {
      if (!currentPartner) {
        showToast('No chat selected');
        return;
      }
      document.getElementById('chatSettingsOverlay').classList.add('show');
    };
    
    window.closeChatSettings = function() {
      document.getElementById('chatSettingsOverlay').classList.remove('show');
    };
    
    window.viewContact = function() {
      closeChatSettings();
      if (currentPartner) {
        window.location.href = `profile.html?user=${encodeURIComponent(currentPartner)}`;
      }
    };
    
    window.toggleMute = function() {
      isMuted = !isMuted;
      const muteText = document.getElementById('muteText');
      if (isMuted) {
        muteText.textContent = 'Unmute Notifications';
        showToast('Chat muted 🔕');
      } else {
        muteText.textContent = 'Mute Notifications';
        showToast('Chat unmuted 🔔');
      }
    };
    
    window.clearChat = function() {
      if (confirm('Clear all messages in this chat?')) {
        closeChatSettings();
        showToast('Chat cleared');
      }
    };
    
    window.blockUser = function() {
      if (confirm('Block this user?')) {
        closeChatSettings();
        showToast('User blocked 🚫');
        goBack();
      }
    };
    
    window.deleteChat = function() {
      if (confirm('Delete this chat permanently?')) {
        closeChatSettings();
        showToast('Chat deleted');
        goBack();
      }
    };
    
    document.getElementById('chatSettingsOverlay').addEventListener('click', (e) => {
      if (e.target === document.getElementById('chatSettingsOverlay')) closeChatSettings();
    });
    
    document.getElementById('chatInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    
    loadChats();
    loadAllUsers();
    loadRequests();
  </script>
</body>
</html>
